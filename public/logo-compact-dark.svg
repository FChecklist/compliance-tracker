<svg width="100%" viewBox="0 0 700 140" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>VERIDIAN AI — Compact Dark</title>
  <desc>Compact wordmark for dark navbars and headers</desc>
  <defs>
    <linearGradient id="vLeftCD" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="vRightCD" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <clipPath id="clipLeftTopCD">
      <rect x="-100" y="345" width="1400" height="900"/>
    </clipPath>
    <clipPath id="clipRightTopCD">
      <rect x="-100" y="455" width="1400" height="900"/>
    </clipPath>
  </defs>

  <svg x="8" y="8" width="124" height="124" viewBox="0 0 1200 1200">
    <line x1="16" y1="34" x2="600" y2="970" stroke="url(#vLeftCD)" stroke-width="190" stroke-linecap="round" clip-path="url(#clipLeftTopCD)"/>
    <line x1="600" y1="970" x2="1136" y2="146" stroke="url(#vRightCD)" stroke-width="190" stroke-linecap="round" clip-path="url(#clipRightTopCD)"/>
    <g fill="url(#vRightCD)">
      <rect x="924" y="349" width="92" height="92" rx="18" transform="rotate(-25 970 395)"/>
      <rect x="980" y="305" width="70" height="70" rx="14" transform="rotate(15 1015 340)"/>
      <rect x="1024" y="264" width="52" height="52" rx="11" transform="rotate(-10 1050 290)"/>
      <rect x="1056" y="226" width="38" height="38" rx="8" transform="rotate(20 1075 245)"/>
    </g>
  </svg>

  <text x="152" y="90" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="66" font-weight="800" letter-spacing="-1">
    <tspan fill="#FFFFFF">VERIDIAN </tspan><tspan fill="#2DD4BF">AI</tspan>
  </text>
</svg>
