<svg width="100%" viewBox="0 0 700 140" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Veridian AI — Compact Dark</title>
  <desc>Compact wordmark for dark headers — DIAN in white for visibility</desc>

  <!-- VERI in bright teal -->
  <text x="50" y="110"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="76" font-weight="700" letter-spacing="-1"
        fill="#1D9E75">VERI<tspan fill="#1D9E75">_</tspan></text>

  <!-- DIAN in white (for dark backgrounds) -->
  <text x="277" y="110"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="76" font-weight="700" letter-spacing="-1"
        fill="#FFFFFF">DIAN<tspan fill="#F4A922">__</tspan></text>

  <!-- AI in gold -->
  <text x="537" y="110"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="76" font-weight="700" letter-spacing="-1"
        fill="#F4A922">AI</text>
</svg>