# ============================================================================
# VERIDIAN AI OS -- MACHINE-READABLE CONSTITUTION
# ============================================================================
# Added 2026-07-14 (Owner directive: "recheck the VERIDIAN AI OS and its
# constitution... written in machine language for agents to understand, not
# in english"). This file is the single structured entry point answering
# "what IS VERIDIAN AI OS and how does it work" -- every field below is
# {ask: <owner's stated intent>, ref: <real file(s) that back it>,
# status: <ENFORCED|PARTIALLY_ENFORCED|POLICY_ONLY|NOT_YET_BUILT|
# NOT_YET_TRACKED>, note: <gap detail, only where status is not ENFORCED>}.
# Where a claim and a cited file disagree, THE FILE IS GROUND TRUTH -- fix or
# remove the claim here.
#
# THIS DOES NOT REPLACE the 6 existing prose constitution documents
# (VERIDIAN_AI_CONSTITUTION.md, VERIDIAN_DMP_DCF_CONSTITUTION.md,
# VERIDIAN_TASK_GOVERNANCE_CONSTITUTION.md, VERI_CHAT_GOVERNANCE.md,
# VAIOS_ARCHITECTURE_STRATEGY.md, ai-os/BRAIN.md). Those were re-read in full
# 2026-07-14 before writing this file and found to be honestly
# cross-referenced, not contradictory -- each states its own supersession
# relationship, each marks its own enforcement status per section, none
# silently duplicates another's content. What was missing was ONE place an
# agent can machine-parse the Owner's actual operating objectives against
# real status, without reading 2,000+ lines of prose first. This file is
# that place -- it references the 6 prose docs by section, it does not
# restate their content.
#
# ONE REAL TERMINOLOGY COLLISION FOUND AND RESOLVED IN THIS PASS: see
# ai_orchestra_tiers.terminology_collision below.
# ============================================================================

