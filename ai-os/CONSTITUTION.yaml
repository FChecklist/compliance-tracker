maintenance_rule: "When any cited mechanism changes in a way that would flip a status value above, update this file in the SAME PR, not a follow-up -- cite the change under amendment_log with a date and one-line reason. When a POLICY_ONLY/NOT_YET_BUILT/NOT_YET_TRACKED rule gets built, move its status here AND log the real PR number as evidence. If a future session finds a claim here that no longer matches the cited file, that is drift in THIS document, not a hidden intentional inaccuracy -- fix it or remove it, the same rule every superseded source document held itself to."
