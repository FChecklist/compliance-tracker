      source: "AGENTS.md Operating Rule 11"

# ============================================================================
# 4. HUMAN / AI BOUNDARY
# ============================================================================
human_ai_boundary:
  rule: "Decisions and approvals stay human until explicitly delegated to VERIDIAN AI OS for that specific work/function. Delegation is scoped per module/function and revocable."
  status: PARTIALLY_ENFORCED
  mechanism: "approval_preferences table (scopeType: communication_type|conversation|task|workflow, decision: always_approve|always_reject, revocable)"
  gap: "no generic cross-module 'has delegation been granted for X' check exists -- delegation is per-feature today, not a unified authority model"
  rules:
    - id: HAB-01
      rule: "Legal, financial, compliance, HR, or destructive operations require human approval when configured by policy."
      status: ENFORCED
      mechanism: "approvalRequests mechanism -- Worker Agent proposals, Board/Policy publish flows"
      gap: "not extended to every category named -- no generic 'this looks financial, require approval' classifier; today it's per-feature"
      source: "VERIDIAN_AI_CONSTITUTION.md #20"
    - id: HAB-02
      rule: "Deletion, archival, bulk updates, or irreversible changes require permission verification, business justification, confirmation, approval workflow (where applicable), and audit logging."
      status: PARTIALLY_ENFORCED
      mechanism: "src/lib/high-impact-action-detector.ts -- 9 categories (delete/archive/payment/approval/rejection/compliance_submission/access_changes/data_export/configuration_changes) require explicit confirmation. checkHighImpactConfirmation() (added 2026-07-18) is now the one reusable function implementing the confirm-gate itself -- task-service.ts's createTask (the only real caller of this gate at the time of that change) calls it instead of reimplementing detect-and-shape logic inline."
      gap: "checkHighImpactConfirmation() closes the 'reimplemented per module' half of the gap for its first adopter, but is not wired as unconditional middleware across every route -- verified 2026-07-18 that task-service.ts's createTask was in fact the ONLY real confirm-gate implementation in the codebase (chat-service.ts/task-execution-engine.ts/the AI dispatch route call detectHighImpactAction only for model-escalation risk signaling, not a confirm gate), so there was no second implementation to reconcile against yet. Still not a single unified gate spanning every high-impact route -- that requires either a broader Intent Engine (already a deferred Phase 3 item per this file's own header) or auditing every route individually, neither done here."
      source: "VERIDIAN_AI_CONSTITUTION.md #11, VERIDIAN_TASK_GOVERNANCE_CONSTITUTION.md #12"
    - id: HAB-03
      rule: "VERI (the assistant) shall never auto-create, auto-assign, or auto-send anything without approval, and shall never claim to have completed an action it did not take."
      status: ENFORCED
      mechanism: "high-impact-action-detector.ts confirmation gate; src/lib/ai-reply-gate.ts blocks false completion claims"
      source: "VERI_CHAT_GOVERNANCE.md #4"
    - id: HAB-04
      rule: "The approval interaction offers a real menu (Approve Once / Edit & Approve / Reject / Always Approve for this communication type / etc.), persisted per user, revocable -- not a binary Confirm/Cancel decided fresh every time."
      status: ENFORCED
      mechanism: "approval_preferences table + extended confirmation dialog checking it first"
      gap: "the full communication-type catalog (task updates/MoM/customer updates/vendor communications) as distinct dispatchable message types is not built -- this ships the underlying approval mechanism, not every content type that will use it"
      source: "VERI_CHAT_GOVERNANCE.md 'VERI-Assisted Communication Protocol'"

# ============================================================================
# 5. SOFTWARE-FIRST EXECUTION
# ============================================================================
software_first:
  rule: "Predictive/repetitive work is done by deterministic software first. AI is the fallback, not the default. If no software exists for a need, AI designs/tests/implements it based on user requirement."
  rules:
    - id: SF-01
      rule: "Dispatch order: deterministic software path first (executeEngineDispatch/executeStructuredDispatch), AI free-text planning fallback only if no deterministic path exists."
      status: ENFORCED
      mechanism: "src/lib/task-execution-engine.ts"
      source: "VERIDIAN_DMP_DCF_CONSTITUTION.md #12"
    - id: SF-02
      rule: "AI autonomously designs and ships wholly new software/capabilities end-to-end when none exists for a stated need."
      status: POLICY_ONLY
      gap: "closest real mechanism: capability-audit-service.ts's Auditor -> Higher-AI escalation proposes a capability, but every proposal is still human-reviewed/merged, not autonomous end-to-end"
      source: "VERIDIAN_DMP_DCF_CONSTITUTION.md core principle"

