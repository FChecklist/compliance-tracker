      mechanism: "GET /api/capability-tree -> buildCapabilityTree()"
      source: "VERIDIAN_DMP_DCF_CONSTITUTION.md #4-5"
    - id: DMP-02
      rule: "No activity may exist without a Dynamic Chain classification."
      status: PARTIALLY_ENFORCED
      mechanism: "dispatchInstruction() resolves selected path to a leaf, re-verified server-side in task-service.ts::createTask()"
      gap: "true only for tasks/conversations created through the Chain Selector -- NOT true for chats generally, reports, or workflows (zero capability-tree lookup in sendMessage()/generateAiReply())"
      source: "VERIDIAN_DMP_DCF_CONSTITUTION.md #1-3"
    - id: DMP-03
      rule: "A Dynamic Chain identity is persisted on the activity it classifies (Dynamic Chain ID), so permissions/approvals/notifications/audit/KPIs can eventually all derive from one chain reference."
      status: PARTIALLY_ENFORCED
      mechanism: "dynamic_chains table + nullable dynamicChainId columns on tasks and conversations, wired at NEW creation only"
      gap: "only carries workerAgentId/engineKey/fixedInputs (dispatch routing) today -- permissions/approvals/notifications/audit/KPIs still governed by their own separate mechanisms, not unified under the chain yet"
      source: "VERIDIAN_DMP_DCF_CONSTITUTION.md #6, 'Dynamic Chain as Primary System Object'"
    - id: DMP-04
      rule: "When no existing chain/option fits ('My Option Is Not Available'), the system captures the requirement, searches for a near-match, and on no match proposes a new capability for human approval -- never silently fails."
      status: ENFORCED
      mechanism: "src/lib/services/fde-service.ts::submitFdeRequest()/proposeWorkerAgent(), wired into ChainRows as a leaf"
      gap: "FDE proposes a single workerAgents row, not a full Dynamic Chain bundle (module/rules/permissions/workflow/KPIs)"
      source: "VERIDIAN_DMP_DCF_CONSTITUTION.md #15"
    - id: DMP-05
      rule: "Per-screen adaptive Dynamic Mode Pills (context reflows as the user navigates modules) and a Global + personalized User Library of frequently-used chains."
      status: NOT_YET_BUILT
      gap: "confirmed zero 'library' concept anywhere in codebase; per-screen automatic pill realignment is a full frontend-architecture change spanning every page, not attempted piecemeal"
      source: "VERIDIAN_DMP_DCF_CONSTITUTION.md #7-9"
    - id: DMP-06
      rule: "A Dynamic Chain Master Directory (DCMD) -- a graph of chain relationships (chain->module, chain->approval-required, chain->report) -- with duplicate/broken/obsolete chain detection."
      status: POLICY_ONLY
      mechanism: "entity_relationships table exists as ready graph substrate (sourceType/sourceId -> relationshipType -> targetType/targetId), deliberately shipped with zero consumers wired in yet"
      gap: "no entity_relationships rows written for chain relationships yet; capability-registry-service.ts::findSimilarCapabilities()/auditDuplicateCapabilities() already does duplicate detection for worker agents/automation rules/modules, not yet extended to dynamic_chains"
      source: "VERIDIAN_DMP_DCF_CONSTITUTION.md 'Dynamic Chain Master Directory'"

# ============================================================================
# 7. VERI IDENTITY AND VERI CHAT
# ============================================================================
veri_identity:
  customer_facing_name: "VERI -- Your Assistant"
  terminology_rule: "VERI (the assistant, its own dedicated 1:1 thread at /veri-ai) is NOT VERI Chat (the multi-party human/guest messaging platform). Wave 37 deliberately split these. VERI participates IN VERI Chat as an invitable member when a human adds it. VERI Chat is not VERI; VERI is not replaced by joining VERI Chat."
  rules:
    - id: VERI-01
      rule: "VERI's own dedicated 1:1 thread identity and welcome copy."
      status: ENFORCED
      mechanism: "chat-service.ts's generateAiReply()"
      source: "VERI_CHAT_GOVERNANCE.md #1"
    - id: VERI-02
      rule: "VERI, once invited into a group conversation, may read (subject to the same RLS/permission checks as every participant) and, on request, summarize or identify action items. VERI never proactively/unpromptedly joins a conversation or generates unsolicited replies there."
      status: PARTIALLY_ENFORCED
      mechanism: "reuses generateAiReply()'s LLM machinery + policy-enforcement-engine.ts's gate + structured-message.ts's summary message type"
      gap: "proactive/unprompted participation (VERI jumping in without being asked) NOT shipped -- only answer-when-addressed"
      source: "VERI_CHAT_GOVERNANCE.md #2-3"
    - id: VERI-03
      rule: "VERI never auto-creates/assigns/sends without approval." # duplicate of HAB-03, kept for section completeness
      status: ENFORCED
      mechanism: "see HAB-03"
      source: "VERI_CHAT_GOVERNANCE.md #4"
    - id: VERI-04
      rule: "New conversations require at least a 2-level Dynamic Mode Pill / Chain Selector before creation."
      status: POLICY_ONLY
      gap: "no conversation-creation flow currently requires ANY chain selection -- deferred, a real UX change to a live messaging surface, needs its own scoped wave"
      source: "VERI_CHAT_GOVERNANCE.md #5"
    - id: VERI-05
      rule: "VERI shall never impersonate, never modify user intent, never send to an unauthorized recipient, and every VERI-initiated action is traceable."
      status: ENFORCED
      mechanism: "RLS + requireAuth() (unauthorized-recipient prevention, structural); audit_logs/orchestraExecutions (traceability); policy-enforcement-engine.ts (blocks prompt-injection attempts to escalate VERI's scope)"
      source: "VERI_CHAT_GOVERNANCE.md 'Mandatory Governance Rules'"

