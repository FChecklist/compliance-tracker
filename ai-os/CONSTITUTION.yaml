browser_client_architecture:
  page_agent:
    ask: "PageAgent not to be used in VERIDIAN AI OS"
    ref: "REMOVED 2026-07-14 (compliance-tracker PR TBD, branch worktree-remove-pageagent) -- Owner directive: \"remove PageAgent it doesn fit VERIDIAN\", superseding the earlier open question below."
    status: RESOLVED_REMOVED
    what_was_done: "Deleted src/components/PageAgentInitializer.tsx, src/components/PersonalAiConfigSection.tsx, src/app/api/page-agent/{config,proxy}/route.ts, src/app/api/settings/page-agent-config/route.ts, src/lib/personal-model-resolver.ts. Edited src/components/AppShell.tsx (removed mount), src/lib/db/schema.ts (dropped personalModelConfig table export + organisations.pageAgentEnabled column export), src/app/api/me/route.ts + src/lib/queries/use-me.ts (removed pageAgentEnabled field), src/app/(app)/settings/page.tsx (removed the 'My AI'/PageAgent org-toggle section entirely), package.json (removed the page-agent npm dependency). New migration drizzle/0196_remove_pageagent.sql applied live: DROP TABLE compliance.personal_model_config, DROP COLUMN compliance.organisations.page_agent_enabled. VERIDIAN_AI_CONSTITUTION.md's Policy Enforcement Engine section updated: 3 wired call sites -> 2 (VERI Chat, VERI FDE), with a dated 'PageAgent Removal' note left as historical record. Live-data check before removal confirmed safety: personal_model_config had 0 rows; only 1/16 orgs had page_agent_enabled=true and it was never functionally consulted (PAGE_AGENT_ENABLED=false had already kill-switched every call site since before Wave 45)."
    former_reality: "Before this removal, PageAgent was NOT a stub -- it was globally mounted (loaded on every page via AppShell.tsx) and was one of 3 surfaces gated by the Policy Enforcement Engine. It let an AI model send DOM-control instructions to the live page. It had, however, already been fully non-functional in production since before Wave 45 due to its own PAGE_AGENT_ENABLED=false kill-switch -- this removal deleted dead code, not live behavior."

  litert_js:
    ask: "LiteJS [confirmed by Owner-provided URLs: LiteRT.js] to be used"
    ref: "GAP-LITERT-EDGE-INFERENCE (MASTER-TRACKER.yaml) -- full re-evaluation there, referenced not duplicated here. Also see developers.googleblog.com/en/litertjs-googles-high-performance-web-ai-inference/ and github.com/google-ai-edge/litert (Owner-provided, fetched 2026-07-14)."
    status: OWNER_DIRECTIVE_RECEIVED_NOT_YET_BUILT
    note: "Confirmed production-grade (Apache-2.0, Google-maintained, active). Real current strength: object detection/depth estimation/image upscaling/embeddings-vector-search, hardware-accelerated in-browser (WASM/WebGPU/WebNN). Still NOT suitable for in-browser LLM chat -- that's a separate product, LiteRT-LM.js, not evaluated. Most promising real lead found: its embeddings/vector-search capability as a candidate mechanism for the chat-instruction-learning gap (see learning_and_umr.chat_instruction_word_level_learning_for_reuse below) -- a real pairing, not yet scoped or built."
    explicitly_not_the_same_as: "VERIDIAN's VCEL calculators (src/lib/engines/*.ts -- EMI/GST/depreciation/etc.) are plain deterministic math, not ML models. They need zero LiteRT.js dependency to move client-side -- just a port of existing TS logic. Do not force LiteRT.js into the 'most-used calculator loads in browser' ask below; it solves a different problem (ML model inference, not arbitrary business math)."

  more_information_in_browser:
    ask: "the user-side browser to have more information for faster work"
    ref: "NONE -- general architectural direction, not yet a scoped mechanism"
    status: POLICY_ONLY
    note: "Directionally consistent with the other items in this section (caching, client-side calculators, DMP in-browser) -- treat as the umbrella principle these more specific asks implement, not a separate mechanism to build on its own."

  most_used_calculator_in_browser:
    ask: "most-used calculator by user to load in browser"
    ref: "src/lib/engines/*.ts -- ~25 VCEL calculator engines, ALL server-only today (confirmed: zero client-side execution of any engine)"
    status: NOT_YET_BUILT
    note: "See litert_js.explicitly_not_the_same_as above -- this is a port-existing-deterministic-logic-to-client task, not an ML/LiteRT.js task. Needs: (1) usage-frequency tracking per user per calculator (doesn't exist -- dynamic_chains/capability-tree has no usage-count mechanism today), (2) confirming which engines are safe to run client-side (pure math, no DB/RLS/org-data dependency) vs. must stay server-side (anything touching live org data), (3) an actual client-side bundle/loading mechanism."

  dmp_dcf_in_browser:
    ask: "Dynamic Mode Pill + Dynamic Option Selection to be in browser for the user"
    ref: "src/components/veri-chat/VeriComposer.tsx, capability-tree-service.ts::buildCapabilityTree()"
    status: PARTIALLY_ENFORCED
    note: "The RENDERING already happens in-browser (VeriComposer.tsx is a real client component). What's NOT yet true: the tree is recomputed server-side and fetched fresh on every page load -- no client-side cache, no SWR/react-query or equivalent (confirmed: zero hits for either in veri-chat-context.tsx). If the ask is 'keep the resolved tree cached client-side between loads,' that's the same gap as browser_cache_for_speed below, not a separate one."

  browser_cache_for_speed:
    ask: "most work to be loaded in the browser cache for fast work"
    ref: "CORRECTED 2026-07-14 -- an earlier pass of this file wrongly claimed 'zero localStorage usage anywhere in src/'. Re-verified by direct grep: 4 real, narrow uses exist -- GlobalChatDock.tsx (per-user chat-draft persistence, orchestra_changes.md Wave 96), OnboardingChecklist.tsx (completion/dismissal state), resizable.tsx (react-resizable-panels' own panel-size persistence), visitor-id.ts/VisitorIntelligence.tsx/signup/page.tsx (anonymous pre-login visitor id). Zero indexedDB or serviceWorker usage anywhere -- that part of the original claim holds."
    status: NOT_YET_BUILT
    note: "The 4 existing uses are all small, single-purpose UI-state keys (draft text, checklist flags, panel width, a visitor id) -- NONE of them implement 'cache resolved work/calculator output/capability-tree structure for fast repeat access,' which is what this ask actually means. So the CONCLUSION is unchanged (this specific caching architecture doesn't exist) but the REASONING was wrong -- localStorage as a primitive is already proven safe here (each use wraps reads/writes in try/catch for private-browsing/unavailable-storage graceful degradation, per GlobalChatDock.tsx's own comment), which actually LOWERS the barrier to building this: there's a working, established pattern to extend, not a first-of-its-kind mechanism to invent from nothing."

  cross_session_cache_persistence:
    ask: "if user opens a new browser [tab/window], the cache to automatically work for that session on the same machine"
    ref: "NONE"
    status: NOT_YET_BUILT
    note: "The specific requirement (persists across separate browser tabs/windows on the same device, not just within one tab's memory) rules out plain in-memory JS state and sessionStorage (both scoped to a single tab). IndexedDB is the right primitive for this -- NOT localStorage, which is size-limited and string-only and a poor fit for caching structured tree/calculator data. Not yet decided or built; recommend deciding this alongside browser_cache_for_speed as one coherent design, not two separate ones."

