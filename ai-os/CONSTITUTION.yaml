ai_orchestra_tiers:
  ask: "4 levels of AI orchestra. Software checks first if user/software can do it; if not, escalates lower AI -> middle AI -> higher AI. Models change over time via the AI router."
  terminology_collision: "'Orchestra LAYER' (src/lib/orchestra-model-resolver.ts) and 'AI Orchestra TIER/LEVEL' (this section) are TWO DIFFERENT CONCEPTS that both use the word 'orchestra' -- do not conflate them. Orchestra LAYER = a per-FEATURE customer-facing routing KEY (e.g. task_oa, chat_oa) that resolves to a provider/model via resolveModelConfig() (page_agent_oa was a 3rd example until PageAgent's 2026-07-14 removal -- the layer-key concept itself is unaffected) -- answers 'which model handles THIS FEATURE for THIS ORG.' AI Orchestra TIER/LEVEL (below) = the 4-rung escalation hierarchy of which model handles a request based on difficulty/risk, independent of which feature it's for -- answers 'which model is TRUSTED for work THIS HARD.' A future agent reading 'Orchestra' in this codebase must check which meaning the source actually means before acting on it."
  models_will_change: "AI router (roster.ts / model-tier-eligibility.ts / orchestra-model-resolver.ts) is the single source of truth for CURRENT model identities -- this file references it, never hardcodes a value that could drift"
  software_checks_before_ai:
    status: ENFORCED
    ref: "task-execution-engine.ts's executeEngineDispatch/executeStructuredDispatch run before any LLM call"
  escalation_ladder_ref: "src/lib/escalation-ladder.ts -- 2 DELIBERATELY UN-MERGED ladders: (a) CSEO->COO->SuperBoss failure-routing, (b) a separate L0-L5 staffing-hierarchy ladder from a different source document. Do not merge them -- the file's own header explains why merging loses information."
  levels:
    - level: 1
      name: lower
      model: "openai/gpt-oss-120b"
      role: "narrow, tightly-tightened instructions; monitoring; platform-default execution tier"
      ref: "src/lib/orchestra-model-resolver.ts::PLATFORM_DEFAULT_MODEL"
      status: ENFORCED
    - level: 2
      name: middle
      model: "deepseek/deepseek-v4-pro"
      role: "specific instructions, limited thinking -- 1st-level analysis, approval, audit, governance, report analysis"
      ref: "src/lib/ai-team/roster.ts::DEEPSEEK_V4_PRO -- wired to chief_audit_officer, governance_backend_engineer"
      status: ENFORCED_FOR_NAMED_ROLES
      note: "not a platform-wide auto-assigned tier for ALL '1st-level analysis' work -- still assigned role-by-role in roster.ts, not a generic tier rule"
    - level: 3
      name: higher
      model: "z-ai/glm-5.2"
      role: "everything"
      ref: "src/lib/model-tier-eligibility.ts::JUDGMENT_ELIGIBLE"
      status: ENFORCED
      resolved_2026-07-14: "openai/gpt-5.5 was previously also JUDGMENT_ELIGIBLE (escalation_second_opinion, security_threat_analyst -- a deliberate cross-vendor independent-review pattern). Owner decision: removed -- real cost concern (gpt-5.5 is expensive) plus a real safety concern (an unbounded GLM-5.2-escalates-to-gpt-5.5-for-cross-reference pattern is not something to leave standing by default). Both roles now run on GLM-5.2 like every other judgment-tier role. GLM-5.2 is the sole higher-tier model, matching this ladder exactly, no exception. See roster.ts's GPT_55 constant comment and model-tier-eligibility.ts's JUDGMENT_ELIGIBLE comment for the full reasoning trail."
    - level: 4
      name: super_boss
      model: "Claude Desktop (Sonnet 5.0) -- the Owner's own interactive session"
      role: "everything; orchestrates every other agent"
      ref: "AGENTS.md 'Super Boss' role"
      status: ENFORCED
