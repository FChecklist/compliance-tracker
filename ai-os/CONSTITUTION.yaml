# Rewritten 2026-07-14 (Owner directive: "recheck the VERIDIAN AI OS...
# remove conflicts, duplication, confusion... only 1 constitution... machine
# language... no assumption, audit everything"). This supersedes the prior
# version of this file (which was a reconciliation POINTER to 6 prose docs)
# and supersedes, as AUTHORITY, all of the following documents, which had
# each independently declared themselves "the constitution" or a
# "constitutional document" with no single one of them actually being sole:
#   VERIDIAN_AI_CONSTITUTION.md, VERIDIAN_TASK_GOVERNANCE_CONSTITUTION.md,
#   VERIDIAN_AUDIT_ORGANIZATION.md, VERIDIAN_DMP_DCF_CONSTITUTION.md,
#   VERI_CHAT_GOVERNANCE.md, MASTER_AI_OS_ARCHITECTURE.md, SENTINEL.md,
#   ai-os/sentinel/SENTINEL.yaml, VAIOS_ARCHITECTURE_STRATEGY.md.
#
# THOSE 9 DOCUMENTS ARE NOT DELETED. Each carries the full narrative
# reasoning, worked examples, and file:line evidence trail this file
# deliberately does NOT restate (machine language, not prose, per this
# amendment's own mandate). Each now carries an AUTHORITY_NOTE banner
# (see doc_authority_map below) stating this file wins on any conflict.
# Read this file to know THE RULE. Read the cited source doc for WHY.
#
# SCHEMA (every rule below uses this shape, no exceptions):
#   id: <STABLE_ID>              -- namespaced, never reused, amendments cite this
#   rule: <one sentence, imperative, machine-parseable>
#   status: ENFORCED | PARTIALLY_ENFORCED | POLICY_ONLY | NOT_APPLICABLE_YET
#           | NOT_YET_BUILT | RESOLVED_REMOVED
#   mechanism: <file:function or file:line -- omitted only if status is
#               POLICY_ONLY/NOT_APPLICABLE_YET/NOT_YET_BUILT with nothing to cite>
#   gap: <what part is NOT true yet -- omitted only if status is ENFORCED>
#   source: <which prose doc's section this rule was extracted from>
#
# GROUND TRUTH RULE: if this file and a cited mechanism disagree, the code is
# right and this file is wrong -- fix or remove the claim, do not fix the code
# to match stale documentation.
# ============================================================================

