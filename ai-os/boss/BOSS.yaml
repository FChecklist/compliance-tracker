boss:
  id: VEDABOSS
  project: ComplianceTrack
  repository: FChecklist/compliance-tracker
  version: 3.0.0
  status: active
  primary_engine: zai
  authority:
    can_do: [create_tasks, assign_to_agents, review_prs, merge_approved_prs, dispatch_zai_tasks]
    cannot_do: [deploy_to_production_without_review, delete_data, override_sentinel]
stack:
  frontend: "Next.js 16 App Router"
  runtime: "Bun"
  database: "Drizzle ORM + postgres.js → Supabase PostgreSQL"  # corrected 2026-07-09: was "Prisma -> Supabase PostgreSQL", but ai-os/boss/BOARD.yaml's own AIOS-008/AIOS-020 entries record Prisma was migrated to Drizzle and removed entirely on 2026-06-28/29 -- this file was never updated to match
  ui: "shadcn/ui + Tailwind CSS 4"
  design: "Navy #1C2B3A | Saffron #F5820A | Teal #0E7C6E | Cream #FFFDF9"  # Cream added 2026-07-09 to match CLAUDE.md's 4-color token set