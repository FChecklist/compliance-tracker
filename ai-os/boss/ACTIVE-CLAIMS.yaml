# ============================================================================
# ACTIVE CLAIMS REGISTRY -- read this BEFORE picking any new gap/task to work
# on in this repo (or in veda-advisors / projexa). Created 2026-07-14 in
# direct response to the Owner naming 4 parallel Claude sessions working
# across this codebase at once, with no existing mechanism for one session
# to see what another is actively touching before it starts new work.
#
# THIS FILE IS NOT A SUBSTITUTE FOR GIT'S OWN SAFETY (worktree isolation +
# PR/CI + branch protection already prevent silent data loss -- see
# AGENTS.md Rule 6 and [[fchecklist_worktree_isolation_required]]). It exists
# to prevent a DIFFERENT problem git can't solve on its own: two sessions
# independently choosing to build the SAME gap at the same time, wasting a
# full agent-hours cycle on duplicate/conflicting work that then has to be
# thrown away or painfully reconciled after the fact.
#
# PROTOCOL (every session, every time, no exceptions):
#   1. BEFORE selecting a gap/task from ai-os/MASTER-TRACKER.yaml (or any
#      other source) to work on: `git pull origin main` this file fresh,
#      read every entry under `active:` below, and do NOT start work on a
#      gap/file-area another entry already claims, unless that entry's
#      `claimed_at` is more than 4 hours stale with no matching open PR
#      (check `gh pr list`) -- treat a stale claim as abandoned, not binding.
#   2. IMMEDIATELY when you start real work (dispatching a sub-agent, or
#      starting to edit yourself): add a new entry under `active:` with your
#      session label, what you're claiming (gap id + real file/directory
#      scope, not just a vague area), and a timestamp. Commit and push this
#      addition on its own, fast, BEFORE the actual work PR -- don't batch it
#      with the real change, so other sessions see the claim as early as
#      possible.
#   3. WHEN your work merges (or you abandon it), move your entry from
#      `active:` to `recently_completed:` (keep the last ~15 entries there,
#      drop older ones -- this is a rolling log, not permanent history;
#      MASTER-TRACKER.yaml's closed_priorities is the permanent record).
#   4. If you discover an active claim that conflicts with what you were
#      about to do, do NOT silently work around it or silently pick a
#      different gap without saying so -- note it in your own session's
#      final report to your Owner/user, the same honesty standard this
#      whole initiative already holds for owner-blocked items.
#   5. Sessions cannot literally message each other -- this file IS the
#      message. Keep entries short, factual, and file/directory-scoped so a
#      session with zero other context can act on them correctly.
# ============================================================================

