  - id: WAVE-178
    title: "Worker Agent Phase-1 auto-dispatch threshold correction (0.9 -> 0.95) + llm-response-cache wired into /api/ai/orchestrate -- both items found MOSTLY already done, narrow real gaps closed"
    doer:
      agent: "claude-code (sub-agent, worktree feat/worker-agent-dispatch-classify-audit), dispatched by Super Boss supervisor"
      date: "2026-07-14"
      pr: "TBD -- see PR opened from feat/worker-agent-dispatch-classify-audit"
      summary: >
        Item A (Worker Agent Library Phase 1 auto-dispatch): investigation
        found this was NOT a gap at all -- PR #51 ("AI Workforce: Phase 1
        of Worker Agent Dispatch (READ-ONLY actions only)") already wired
        real auto-dispatch into fde-service.ts's high-confidence-match
        branch (src/lib/services/fde-service.ts:127-146): when the top
        semantic match is a worker_agent, it reuses task-execution-engine.ts's
        exported dispatchTool() to actually run the matched capability and
        append real JSON output to the response, gated through the
        pre-existing purpose-bound-ai.ts DOMAIN_ALLOWED_TOOLS allowlist
        (isToolAllowedForDomain, src/lib/purpose-bound-ai.ts:84-88) which
        deliberately excludes every write action (update_compliance_status,
        create_compliance_item, confirm_gst_batch, generate_gst_return,
        generate_gst_ai_review are all explicitly commented as excluded on
        purpose) -- so "read-only actions only" was already a real,
        server-enforced guarantee, not a documentation promise. The one
        genuine gap: HIGH_CONFIDENCE_THRESHOLD (fde-service.ts:41) was still
        0.9, the originally-proposed value the Owner explicitly corrected to
        0.95 on 2026-07-10 when signing off on Phase 1. Fixed: bumped the
        single shared constant to 0.95 (it gates both the no-LLM
        "already covered" short-circuit and the worker-agent auto-dispatch
        branch together -- the Owner's sign-off was never asked to split
        them into two separate thresholds).

        Item B (llm-response-cache wiring): grepped all importers of
        src/lib/llm-response-cache.ts across the repo -- only
        fde-service.ts and src/app/api/internal/loops/run/route.ts used it
        before this change; chat-service.ts, task-execution-engine.ts, and
        /api/ai/orchestrate/route.ts all independently called callLLM/
        callLLMJson directly, confirming the gap was real. Read the cache
        module's own header carefully before wiring anything -- it states
        explicitly it is "deliberately OPT-IN, not automatic at every
        existing call site," safe only where "the caller has already
        judged the exact same (org, provider, model, systemPrompt,
        userMessage) tuple is likely to repeat." Applying that test
        honestly to each of the 3 named call sites: (1) /api/ai/orchestrate/route.ts
        is a genuine fit -- its userMessage embeds Math.floor()-granularity
        fields (daysOverdue/daysUntilDeadline) that only change once per
        calendar day, so a duplicate webhook delivery or repeat UI open of
        the same item's AI panel the same day produces a byte-identical
        tuple; wired callLLMJsonCached in, matching fde-service.ts's exact
        usage pattern (org-scoped, `cached` flag threaded into
        recordOrchestraExecution's output). (2) chat-service.ts's sendMessage
        was deliberately NOT wired -- its callLLM call passes a `history`
        array that grows every turn, but the cache key (orgId|provider|model|
        systemPrompt|userMessage) does not include history at all, so caching
        here would risk serving a reply from one conversation's context into
        an unrelated later conversation that happens to send the same literal
        message (e.g. "yes"). (3) task-execution-engine.ts's planning call
        (callLLMJson at line ~2259) was deliberately NOT wired -- its
        userMessage is a specific task's title+description, essentially
        never a verbatim repeat, and more importantly the existing
        SyntaxError-retry logic (lines ~2276-2284) deliberately re-issues the
        identical call hoping for a non-truncated response; callLLMJsonCached
        writes its raw content to the cache BEFORE attempting JSON.parse, so
        wiring this specific site would have cached the truncated/malformed
        first response and made the "retry once, usually succeeds" self-heal
        permanently fail instead. Both non-wirings are architecture-fit
        decisions grounded in the cache module's own documented safety bar,
        not scope-cutting.

        No new table, service, embedding pipeline, or worker-agent runner
        was created -- both fixes reuse existing infrastructure exactly as
        instructed (dispatchTool/isToolAllowedForDomain for Item A,
        callLLMJsonCached for Item B). Total diff: 2 files touched
        (src/lib/services/fde-service.ts, src/app/api/ai/orchestrate/route.ts),
        34 lines changed. bunx tsc --noEmit clean, `bun run lint` 0 errors
        (3 pre-existing unrelated warnings), `bun test` 1098 pass / 0 fail
        across 83 files.

