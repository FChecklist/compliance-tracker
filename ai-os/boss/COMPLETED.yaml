  - id: WAVE-147
    title: "Phase 3 foundational substrate: graph store, event bus, software-first reply gate (Phase3_Design_by_Claude.md), plus a CodeQL-flagged ReDoS fix in Phase 2's prompt-normalizer.ts"
    doer:
      agent: claude-code
      date: "2026-07-09"
      pr: TBD
      summary: >
        Boss directive: "you can parallelly start also on phase 3 yourself to
        complete it" while z.ai finished Phase 2's cross-audit. Design doc
