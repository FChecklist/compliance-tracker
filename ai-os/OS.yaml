# VERIDIAN AI OS -- entry point / "start here" index.
#
# Gap closure, 2026-07-13 (Boss directive, metadata/drift investigation):
# this file was previously a 9-line stub, itself stale and inaccurate
# (claimed "db: Prisma/SQLite -> PostgreSQL" -- wrong; this codebase uses
# Drizzle exclusively, zero Prisma, per CLAUDE.md's own explicit rule).
# Investigation confirmed there is genuinely NO single unified metadata
# store for this project -- 8+ separate documents each cover a different
# facet (rules vs. what-exists vs. what-should-exist vs. gaps vs.
# completed-log vs. point-in-time health), and MASTER-TRACKER.yaml's own
# header explicitly declines to fold several of them in, for real,
# documented reasons. Merging them into one file would undo those
# deliberate decisions, not fix a gap.
#
# What this file is instead, honestly: the one place that lists every
# other governance/tracking document and what it's actually for, so
# "which file do I check for X" has one answer. scripts/check-metadata-
# index-coverage.mjs enforces that every real governance file below is
# either indexed here or explicitly exempted -- the same registered/
# exempted, nothing-in-neither pattern asset-registry-coverage.yaml
# already uses for database tables, applied here to documents.
#
# This is also, honestly, the closest thing to a "VERIDIAN Brain" pointer
# that exists today. A separate `veridian-brain` GitHub repo exists but is
# a confirmed empty scaffold (README + package.json only, nothing
# extracted from this codebase yet -- see ai-os/system-tree/40-veridian-
# brain.yaml). This file is not that repo and does not claim to be a
# working cognitive architecture -- it is an index, kept honest by CI.

id: AIOS-CT
name: VERIDIAN AI Operating System (compliance-tracker)
version: 3.0.0
repo: FChecklist/compliance-tracker
stack:
  frontend: "Next.js 16 App Router"
  runtime: "Bun"
  db: "Drizzle ORM + postgres.js -> Supabase PostgreSQL (compliance schema) -- zero Prisma, see CLAUDE.md"
  ui: "shadcn/ui"
  styling: "Tailwind CSS 4"
primary_engine: shared (zai + claude-code) # matches ai-os/LIFECYCLE.yaml's own "engine" field -- not zai-only, corrected from the previous stale value

# ==========================================================================
# GOVERNANCE INDEX -- every real governance/tracking document, one line
# each. If a document isn't in this list, it's either not governance-scoped
# (product docs, specs) or a genuine gap -- check `exempted` below before
# assuming the latter.
# ==========================================================================
index:
  rules_and_authorization:
    - path: CLAUDE.md
      covers: "Codebase orientation + hard rules (Drizzle-only, requireAuth() required, DO-NOT-TOUCH paths). Auto-injected into every Claude Code session's system prompt by the CLI itself."
    - path: AGENTS.md
      covers: "Which AI agents are authorized (Super Boss / Z.ai GLM / Claude Code Secondary), what each can/cannot do, numbered Operating Rules (branch protection, audit requirements, guardrail-change authorization). NOT auto-injected into the z.ai/OpenRouter dispatch pipeline by the platform itself -- scripts/ai-workforce-agent.mjs's fetchGovernancePreamble() now reads and prepends both this file and CLAUDE.md to every z.ai dispatch's system prompt, closing that gap as of 2026-07-13."
    - path: ai-os/sentinel/SENTINEL.yaml
      covers: "Supreme governance rules (validation_rules, e.g. no direct DB access from UI, all changes logged). Never bypassed per AGENTS.md."
    - path: ai-os/boss/BOSS.yaml
      covers: "VEDABOSS project-governance identity/authority definition."
    - path: ai-os/boss/ROSTER.yaml
      covers: "The 3 top-level agent identities (VEDABOSS/ZAI/SENTINEL) -- verified accurate against AGENTS.md 2026-07-09."
    - path: ai-os/engines/ENGINES.yaml
      covers: "Z.ai + Claude Code full-access agent authorization record, dated 2026-06-28 -- overlaps in purpose with AGENTS.md/ROSTER.yaml; AGENTS.md is the actively-maintained one with the numbered Operating Rules, treat this as a historical authorization record."
    - path: ai-os/SELF-CHECK.md
      covers: "GAP-UNIFIED-SOT-REMAINDER (c) mid-session drift: fixed 5-question checklist a session re-affirms periodically (not read-once-at-start like CLAUDE.md). Re-injected on a real cadence for the headless ai-workforce-agent.mjs dispatch path via loop-prevention.ts's shouldPromptSelfCheck(); no equivalent hook exists for the interactive Claude Code/Desktop path -- see VERIDIAN_TASK_GOVERNANCE_CONSTITUTION.md's 'Mid-Session Self-Check' section for the honest per-path breakdown."

  work_tracking:
    - path: ai-os/boss/ACTIVE-CLAIMS.yaml
      covers: "Real-time registry of what each parallel session is actively working on right now, added 2026-07-14 after the Owner confirmed 4 parallel Claude sessions active across this codebase with no way to see each other's in-flight work. Read FIRST, before MASTER-TRACKER.yaml, before picking any gap -- prevents duplicate/colliding work, not data loss (that's Rule 6's PR/CI gate, unaffected). Rolling log, not permanent history -- see its own header for the claim/release protocol."
    - path: ai-os/MASTER-TRACKER.yaml
      covers: "THE single tracker for open items / gaps / work-in-progress. Consolidated 2026-07-12 from 17 prior scattered tracker files (archived, not deleted). Update discipline documented in the file's own header."
    - path: ai-os/boss/COMPLETED.yaml
      covers: "Append-only doer+auditor completion log, per AGENTS.md Rule 7(d) -- every completed task gets a real entry here, by both whoever did it and whoever audited it. Different purpose from MASTER-TRACKER.yaml (a pending-work list) -- this is a permanent historical record, never edited after the fact, only appended to."
    - path: ai-os/boss/BOARD.yaml
      covers: "Older task board. Self-declared stale in its own header since 2026-07-09 (stopped tracking ~114 waves ago) -- superseded by COMPLETED.yaml. Kept for historical reference only, not maintained."
    - path: PLATFORM_STRATEGY.md
      covers: "Living strategic-direction + architecture-decision document at repo root -- 'what VERIDIAN is becoming and what has to be built to get there.' Each major evaluated technology/feature gets its own numbered section (evaluated -> design -> explicitly deferred)."
    - path: ai-os/STATUS-REPORT.md
      covers: "Point-in-time (as of its own 'updated' date) percent-complete rollup reconciling Tree 1 (requirements) against Tree 3 (what's built). Re-derive, don't trust blindly, if significant time has passed."
    - path: ai-os/DCMD-SCHEMA-DESIGN.md
      covers: "Priority 14, GAP-DCMD: per-sub-field architecture design (column vs. entity_relationships graph edge) for the source doc's 9 named DCMD rich-schema fields (business/classification/inputs/outputs/software/AI/workflow/governance/knowledge). Records which sub-fields got real chokepoint wiring vs. schema-only this pass, and 3 candidate graph edges investigated and ruled out for lack of a real chokepoint -- read this before proposing new dynamic_chains columns or entity_relationships edge types for chains."
    - path: ai-os/priority18b_stage0_design.md
      covers: "Priority 18b design doc (design only, not implemented): self-serve, no-admin-approval stage-0 VERI Chat registration off a shared conversation link, passwordless email/Gmail magic-link identity, an inbox strictly scoped to direct messages/assigned to-dos/assigned instructions addressed to that user (not general org channels), and a growth-loop recommendation modeled on the existing Sales Engine referral-link mechanism. Flags one real open decision for the Owner/supervisor (single-org-per-email v1 scope vs. a real multi-org stage-0 membership table) rather than deciding it silently -- read this before implementing Priority 18b."
    - path: ai-os/priority21_workspace_memory_design.md
      covers: "Priority 21, Layer 2 Workspace Memory design + real feasibility check for @memvid/sdk (a genuinely heavy install-time dependency tree -- langchain/llamaindex/OCR/onnxruntime-node, ~392 MB new node_modules weight -- but its actual v1 call surface, create/open with kind: 'basic', never executes those code paths at runtime; also surfaces a default-on external telemetry call, mitigated via MEMVID_TELEMETRY=0). Covers the RLS-safe capsule schema (workspace_memory_capsule_events), export/import flows (additive-only import, never a silent overwrite), and explicitly flags the cross-device sync TRANSPORT (manual download/upload vs. the existing Content Pipeline Google Drive connector vs. a new first-party sync endpoint) as an open Owner decision, not picked silently -- read this before extending Layer 2 or picking a transport."
    - path: ai-os/priority22_ling_trial_findings.md
      covers: "Priority 22 workstream 1: real OpenRouter API comparison (latency/cost/quality/failure-behavior) between inclusionai/ling-2.6-1t and deepseek/deepseek-v4-pro on 3 governance_backend_engineer/chief_audit_officer/chief_operating_officer-shaped backend prompts (corrects the dispatch brief's inaccurate claim about which roster.ts roles run which model -- neither senior_backend_engineer/devops_engineer/architecture_compliance_reviewer nor a QA Engineer/AI Response Validator role are actually on DeepSeek; deepseek/deepseek-r1-0528 does not exist in roster.ts at all). Confirms Ling-2.6-1T is single-provider (Novita only, vs. deepseek-v4-pro's 16) -- a structurally worse version of the 2026-07-10 GLM-5.2/DeepInfra incident, with zero fallback available. Recommendation: do NOT adopt for the 3 real deepseek-v4-pro roles -- 2 of 3 test prompts surfaced real correctness gaps despite Ling being ~5x faster/cheaper. No roster.ts/model-tier-eligibility.ts change made -- read this before proposing Ling-2.6-1T for any roster role."
    - path: ai-os/priority22_officecli_feasibility.md
      covers: "Priority 22 workstream 2: real feasibility check of iOfficeAI/OfficeCLI as a replacement for this repo's mammoth (docx-read)/pptxgenjs (pptx-export) usage. Corrects several prior sessions' copy-forwarded claim that this dependency pair is broken on origin/main -- a fresh isolated bun install/tsc/next build all passed cleanly this session. GO for the mammoth call site (server-side, low risk); conditional-GO for pptxgenjs (its real call site is client-side/in-browser, so replacing it means a real architecture change, not a drop-in swap). No code implemented this pass -- feasibility only, read this before starting any real OfficeCLI integration work."

  what_should_exist_vs_what_does:
    - path: ai-os/audit-tree/
      covers: "Tree 1 -- what the 9 source requirement documents say VERIDIAN should be (01-09 per-document trees + 10-merged-tree.yaml)."
    - path: ai-os/system-tree/
      covers: "Tree 3 -- what's actually built in the live codebase, per real file/route grep (10-13 = compliance-tracker governance/API/DB/UI, 20/30/40 = PROJEXA/veda-advisors/veridian-brain, 50-merged-tree.yaml = the merge)."
    - path: ai-os/tree4-unified/
      covers: "Tree 1 + Tree 3 merge and the original gap backlog this analysis produced -- mostly archived into MASTER-TRACKER.yaml now (see that file's meta.source_files_archived list); 50-completion-plan/ is historical."

  health_and_compliance:
    - path: ai-os/sentinel/HEALTH.yaml
      covers: "Point-in-time spot-check (CI green, no committed secrets) -- explicitly NOT a continuous monitor per its own note. Re-run before trusting if time has passed since last_check."
    - path: ai-os/sentinel/VIOLATIONS.yaml
      covers: "Point-in-time spot-check scan results, same 'not a full sweep' caveat as HEALTH.yaml."
    - path: ai-os/registry/asset-registry-coverage.yaml
      covers: "UMR (Universal Metadata Registry) coverage manifest -- every DB table must be listed registered or exempted, enforced by scripts/check-asset-registry-coverage.mjs on every PR. Row-level registration is genuinely automatic (a live Postgres trigger, zero human/AI touch per row); table-level onboarding is auto-VERIFIED but not auto-performed -- a new table needs a one-time migration + registry entry before the trigger covers it."
    - path: ai-os/registry/ARTIFACTS.yaml
      covers: "Enterprise Asset Registry scaffold. NOT YET POPULATED -- a real, named, still-open gap, not silently dropped."
    - path: ai-os/registry/maintainability-scorecard.md
      covers: "VERIDIAN Review Framework gap-closure (2026-07-18): pointer + methodology doc for the consolidated Maintainability score (guardrail-violation rate + continuous-improvement backlog + dependency health, all real signals already persisted elsewhere) -- live number via GET /api/ai/team/maintainability-dashboard (veridian_admin-only), computed by src/lib/services/maintainability-dashboard-service.ts. This doc is not itself a data snapshot -- query the API for the current score."
    - path: ai-os/registry/stale-doc-manifest.yaml
      covers: "GAP-UNIFIED-SOT-REMAINDER (b) quarantine manifest -- every root-level stale doc moved to docs/archive/ plus every file already under the tree4-unified/audit-tree archive dirs, each must carry the exact ARCHIVED/STALE banner, enforced by scripts/check-doc-quarantine-banner.mjs on every PR."
    - path: ai-os/LIFECYCLE.yaml
      covers: "Which of the 11 lifecycle stages (UNDERSTAND..IMPROVE) the project is currently in. Currently MONITOR (ongoing operation, not a one-time build)."
    - path: scripts/check-doc-cross-references.mjs
      covers: "Gap closure, 2026-07-13: link-validity check for the 6 entry-point governance docs (CLAUDE.md, AGENTS.md, this file, docs/master/INDEX.md, ai-os/BRAIN.md, VERIDIAN_TASK_GOVERNANCE_CONSTITUTION.md) -- verifies every file path they name (YAML `path:` keys, markdown links, or backtick-quoted paths in prose) still resolves on disk, enforced on every PR. Distinct from the other 4 coverage gates in this section: those check registration coverage (is X registered in a registry); this checks link validity (does a path someone actually named still exist)."

  brain_pointer:
    - path: ai-os/CONSTITUTION.yaml
      covers: "v2.0, 2026-07-14 (Owner directive: 'only 1 constitution... machine language... no assumption, audit everything'). THE SOLE CONSTITUTION for VERIDIAN AI OS -- every rule/guardrail from 9 previously-separate 'constitutional' documents (VERIDIAN_AI_CONSTITUTION.md, VERIDIAN_TASK_GOVERNANCE_CONSTITUTION.md, VERIDIAN_AUDIT_ORGANIZATION.md, VERIDIAN_DMP_DCF_CONSTITUTION.md, VERI_CHAT_GOVERNANCE.md, MASTER_AI_OS_ARCHITECTURE.md, SENTINEL.md, ai-os/sentinel/SENTINEL.yaml, VAIOS_ARCHITECTURE_STRATEGY.md) now lives here with a stable ID, machine-first, no narrative prose. Read this FIRST, before BRAIN.md or any prose doc. Those 9 docs keep their full narrative/evidence content and each now carries an AUTHORITY NOTE pointing back here -- read them for WHY, this file for the RULE."
    - path: ai-os/BRAIN.md
      covers: "PLATFORM_STRATEGY.md Sec31.4 Phase A item (2): the single plain-language 'what VERIDIAN AI OS is and how it works end-to-end' document that did not exist before 2026-07-13 -- traces a real request flow (VeriComposer -> POST /api/tasks -> resolveModelConfig -> callLLM) and an AI Dev Team dispatch flow, then names the 5 real separate systems (roster.ts, orchestra-model-resolver.ts+model-tier-eligibility.ts, embeddings.ts, activity_log, escalation-ladder.ts+monitor-protocol.ts) that compose into something brain-like without being one. Every claim cites a real file it was read from; start here before system-tree/ or OS.yaml itself."
    - path: ai-os/system-tree/40-veridian-brain.yaml
      covers: "Confirmed status of the separate veridian-brain repo -- empty scaffold, not yet extracted from this codebase. Read this before assuming 'the Brain' is a working system anywhere."

  monitoring_health_check:
    - path: /api/ai/team/governance-health
      covers: "Real, queryable governance health endpoint (veridian_admin-gated): Reasoning Quality / Dependency Health / Compliance scores from real reviewer outcomes, plus (as of 2026-07-13) stuckActivities -- AI Team dispatches that have sat in a non-terminal lifecycle stage past a stated threshold with nobody having closed them out."

  exempted:
    # Real product/spec/reference docs that are NOT governance-scoped --
    # listed here so check-metadata-index-coverage.mjs's scan doesn't flag
    # them as an oversight. Add a real reason when adding an entry, same
    # discipline as asset-registry-coverage.yaml's own exempted list.
    - path: docs/
      reason: "Product technical-spec documents (ComplianceTrack_TechSpec_*.docx etc), not AI-OS governance. Corrected 2026-07-14 (DEBT-06, ai-os/CONSTITUTION.yaml): this exemption does NOT extend to docs/master/ specifically -- scripts/check-doc-cross-references.mjs already treats docs/master/INDEX.md as 1 of its 6 real governance entry points, so it was never actually exempt in practice; this note now says so explicitly instead of silently contradicting that script's own behavior."
    - path: ai-os/OS.yaml
      reason: "This file is the index itself -- it does not need to index itself."
