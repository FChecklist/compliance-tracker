  - table: approval_workflow_instances
    reason: "Priority 4 domain B reviewed 2026-07-12: has org_id but no single display-name column (only entityType/entityId compound identity, workflowDefinitionId, status) -- the generic trigger's name_column pointer can't express a composed name. It is a per-run instance of approval_workflow_definitions (which IS registered), analogous to a log/instance record rather than a named asset."
