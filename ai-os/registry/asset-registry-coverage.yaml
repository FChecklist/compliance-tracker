    reason: "Priority 4 domain B reviewed 2026-07-12: no org_id column at all (scoped only via parent stepInstanceId -> workflowInstanceId -> org_id chain) -- registering with org_column=NULL would wrongly mark it platform-tier and leak across tenants, so it stays exempted per the cross-tenant-leak rule rather than force a bad mapping."
