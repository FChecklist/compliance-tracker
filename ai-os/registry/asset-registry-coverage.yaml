# Priority 4 (09-priority4-umr-universal-tracker.yaml): the CI-enforced
# coverage manifest for scripts/check-asset-registry-coverage.mjs. Every
# table in src/lib/db/schema.ts must appear in EXACTLY one of the two lists
# below -- `registered` (a compliance.asset_registration_config row + the
# auto_register_asset trigger are attached, see drizzle/0152's pattern) or
# `exempted` (a real, specific reason this table is deliberately NOT an
# asset in the UMR sense -- a join table, an audit/event log, etc.). A new
# table that appears in neither list fails CI -- this is the mechanical half
# of the Owner's "non-negotiable" requirement, the same enforcement class
# as check-guardrail-presence.mjs.
#
# One-time grandfather pass (2026-07-12): all 388 tables that existed before
# Priority 4 started are seeded into `exempted` with a generic
# not-yet-reviewed reason, EXCEPT the tables Priority 4's own domain
# dispatches move into `registered` in their own PRs. This grandfathering is
# the same pattern Rule 9's guardrail-presence check already uses: past debt
# is not retroactively demanded, but every table added AFTER this point must
# make a real choice, and every table this pass DOES review gets a real,
# specific answer, not the generic placeholder.

registered:
  - table: departments
    reason: "domain C (drizzle/0155): org-scoped org-chart unit -- auto_register_asset_trg attached, name_column=name, owner_column=head_id"
  - table: committees
    reason: "domain C (drizzle/0155): org-scoped governance body -- auto_register_asset_trg attached, name_column=name, purpose_column=charter, owner_column=chair_id"
  - table: module_registry
    reason: "domain C (drizzle/0155): PLATFORM-WIDE by design (no org_id column -- single catalog of every module the whole platform offers) -- org_column=NULL is correct here, auto_register_asset_trg attached"
  - table: product_branches
    reason: "domain C (drizzle/0155): PLATFORM-WIDE by design (no org_id column -- \"belongs to no single org\" per the table's own header comment) -- org_column=NULL is correct here, auto_register_asset_trg attached"
  - table: products
    reason: "domain C (drizzle/0155): org-scoped (Wave 19) -- an org's own internal PMS product catalog, distinct from the platform-wide product_branches above -- auto_register_asset_trg attached"
  - table: webhooks
    reason: "domain C (drizzle/0155): org-scoped outbound integration config -- trigger only copies name/module/owner/org/status, never the `secret` or `url` columns, so no signing-secret leak into the registry -- auto_register_asset_trg attached"
  - table: subscription_plans
    reason: "domain C (drizzle/0155): PLATFORM-WIDE by design (no org_id column -- shared pricing-plan catalog every org reads the same rows from) -- org_column=NULL is correct here, auto_register_asset_trg attached"
