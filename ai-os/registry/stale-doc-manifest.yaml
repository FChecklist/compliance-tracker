# GAP-UNIFIED-SOT-REMAINDER (b) (ai-os/MASTER-TRACKER.yaml): the mechanical
# half of the root-level stale-doc quarantine pass. Every file listed below
# MUST carry the exact quarantine banner -- checked by
# scripts/check-doc-quarantine-banner.mjs, same enforcement class as
# check-asset-registry-coverage.mjs and check-guardrail-presence.mjs: a
# reviewable-diff guarantee via PR/CI, not a runtime-unbypassable lock.
#
# The banner, verbatim, for .md files:
#   > **ARCHIVED / STALE — do not treat as current.** See docs/master/INDEX.md or ai-os/MASTER-TRACKER.yaml for current status.
# and for .yaml files (comment form, same two sentences split across two lines):
#   # ARCHIVED / STALE — do not treat as current.
#   # See docs/master/INDEX.md or ai-os/MASTER-TRACKER.yaml for current status.
#
# Owner authorization (2026-07-13, quoted in the PR description that created
# this manifest): "our system has become huge and complicated. without
# proper metadata architecture, it cannot be managed" -- an explicit request
# to find and fix gap-analysis-report duplication, not create yet another
# competing tracker. PR #250 (merged same thread) is the precedent for
# touching ai-os/ under this directive.
#
# Two groups:
#   - moved: root-level dated one-off status/gap-analysis/study files that
#     were undifferentiated and grep/glob-discoverable before a future
#     session would find ai-os/MASTER-TRACKER.yaml -- git-mv'd into
#     docs/archive/ during this pass (git history preserved via `git mv`,
#     nothing deleted). Each was confirmed stale either by an explicit
#     docs/master/INDEX.md 🔴/RESOLVED/superseded tag, or (for files that
#     postdate INDEX.md's 2026-07-09 snapshot) by its own header stating a
#     completed, point-in-time status. Two filename-pattern matches
#     (Study_by_Claude.md, Study_by_zaizlm5.2.md) were deliberately NOT
#     moved despite matching the "Study_by_*.md" pattern, because AGENTS.md
#     Rule 7 and the Super Boss role description cite them by name as the
#     historical source of a still-referenced process -- AGENTS.md is on
#     CLAUDE.md's do-not-touch list, so its citations cannot be repaired if
#     broken; leaving the files in place was the safer call.
#   - already_archived: files under
#     ai-os/tree4-unified/50-completion-plan/archive/ and
#     ai-os/audit-tree/archive/ that were already correctly quarantined by
#     directory placement (and are CI-ignored by
#     check-metadata-index-coverage.mjs's IGNORE_NAMES=["archive", ...]) --
#     only bannered in place here, not moved again.

