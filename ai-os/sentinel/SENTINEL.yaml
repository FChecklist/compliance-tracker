# ─── Validation Rules ──────────────────────────────────────────
validation_rules:
  security:
    - { id: SE-001, rule: "No secrets committed to source code", severity: critical, auto_block: true }
    - { id: SE-002, rule: "All authenticated routes must verify session", severity: critical, auto_block: true }
    - { id: SE-003, rule: "No .env files committed", severity: critical, auto_block: true }

  architecture:
    - { id: AR-001, rule: "No direct DB access from UI components", severity: critical, auto_block: true }
    - { id: AR-002, rule: "No circular dependencies", severity: high, auto_block: false }
    - { id: AR-003, rule: "All API routes must handle errors gracefully", severity: high, auto_block: false }

  agent_conduct:
    - { id: AC-001, rule: "All changes must be made via PR (except admin bypasses)", severity: high, auto_block: false }
    - { id: AC-002, rule: "All changes must be logged in BOARD.yaml or COMPLETED.yaml", severity: medium, auto_block: false }
    - { id: AC-003, rule: "No agent may override SENTINEL rules without VEDABOSS directive", severity: critical, auto_block: true }

# ─── Sentinel Log Location ─────────────────────────────────────
logging:
  violations: ai-os/sentinel/VIOLATIONS.yaml
  health: ai-os/sentinel/HEALTH.yaml
  audit: GitHub Actions (sentinel.yml workflow)

# ─── Related Monitors (cross-reference, NOT a supersession) ────
# Added 2026-07-13 (GAP-UNIFIED-SOT-REMAINDER Wave-2 slice; owner directive
# that day asked for monitoring/status to be real and automatic, not
# manual-trigger-only). SENTINEL above validates a genuinely different
# surface -- point-in-time spot checks at PR/commit time (CI green, no
# secrets, agent conduct via validation_rules). It says nothing about
# whether an AI Dev Team dispatch, once started, actually completes.
# dispatch_completion_monitor (below) is the mechanism that watches THAT --
# ongoing drift/completion over time, not a commit-time gate. Neither
# supersedes the other; both are real, both stay.
related_monitors:
  - id: dispatch_completion_monitor
    what: "Tier-3 (GPT-OSS-120B) monitor classifying whether a stuck AI Dev Team dispatch (an activity_log row past its staleAfterMs in a non-terminal lifecycle_stage) shows real completion signs or looks abandoned."
    registry: compliance.monitor_agents (drizzle/0174_dispatch_completion_monitor.sql)
    code: src/lib/monitors/dispatch-completion-monitor.ts
    cron: /api/internal/dispatch-completion-monitor/run (see vercel.json)
    digest: compliance.monitor_execution_log (drizzle/0175_monitor_execution_log.sql) -- one row per cron sweep, cross-referenced back to this file in that route's own header comment
    relationship_to_sentinel: "Different surface, not a supersession -- SENTINEL's validation_rules (SE-*/AR-*/AC-*) are point-in-time PR/commit checks; this monitor watches ongoing AI Dev Team dispatch completion drift after a dispatch has already started. Cross-linked from src/app/api/internal/dispatch-completion-monitor/run/route.ts's own header comment."