meta:
  id: STANDING-TASK-DIRECTIVE
  version: 1.0
  effective_date: "2026-07-21"
  source: "Owner directive, 2026-07-21 (chat)"
  usage: "Cite ai-os/STANDING_DIRECTIVE.yaml (or say 'check STANDING_DIRECTIVE.yaml') alongside any task to invoke the full protocol below."

precheck:
  items:
    - ai-os/MASTER_INDEX.yaml
    - system_index (superboss-register.py check-duplicate)
  rule: zero_duplication_mandatory

execution:
  location: ssh_only
  target: VERIDIAN-DEV
  ip: 167.233.220.35
  auth: claude_code_cli_subscription
  local_execution: forbidden

guardrails:
  mandatory:
    - ai-os/RULES_ARTICLES_198.json
    - ai-os/AI_ENGINEERING_POLICY.yaml
  automation_scope_boundary: ai-os/AI_ENGINEERING_POLICY.yaml#automation_scope_boundary
