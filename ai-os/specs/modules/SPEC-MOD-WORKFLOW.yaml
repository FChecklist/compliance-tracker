id: SPEC-MOD-WORKFLOW
module: MOD-WORKFLOW
boss: VEDABOSS
status: DRAFT
priority: MEDIUM
created: "2026-06-26"

business:
  objective: "Implement multi-step approval workflows for compliance evidence, ensuring proper review before marking controls compliant"
  stakeholders: [compliance officers, managers, admins]

requirements:
  functional:
    - "Define approval workflow: who approves in what order"
    - "Submitter uploads evidence and submits for approval"
    - "Approvers notified via email and in-app"
    - "Approver can approve, reject with comment, or request changes"
    - "Escalation if approver does not respond within configured SLA"
    - "Workflow history visible on control record"
  technical:
    - "workflows, workflow_steps, workflow_instances tables"
    - "State machine: draft > submitted > in-review > approved/rejected"
  non_functional:
    performance: "Workflow state transitions <200ms"
    security: "Only designated approvers can approve"

security:
  requirements:
    - "Only designated approvers can change approval status"
    - "All approval decisions logged with timestamp and user"
  fraud_scenarios:
    - "Self-approval: submitter cannot approve own submission"

acceptance_criteria:
  - given: "A compliance officer submits evidence"
    when: "They click Submit for Approval"
    then: "Approver receives notification and can approve/reject"
  - given: "A submitter"
    when: "They attempt to approve their own submission"
    then: "System returns 403 Forbidden"

tests:
  unit:
    - "Workflow state machine transitions"
    - "Self-approval prevention"
  integration:
    - "Submit triggers approver notification"
    - "Approval updates control status"
  e2e:
    - "Full submit and approve workflow"

sentinel_validation_rules:
  - rule: "Self-approval must be blocked at API level"
    severity: critical

success_metrics:
  - metric: "Average approval cycle time"
    target: "<24h"

rollback_strategy: "Reset workflow instance to draft; evidence retained"