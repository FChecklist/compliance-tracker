id: SPEC-MOD-COMPLIANCE
module: MOD-COMPLIANCE
boss: VEDABOSS
status: DRAFT
priority: HIGH
created: "2026-06-26"

business:
  objective: "Track regulatory compliance requirements (GDPR, ISO 27001, SOC 2), assign owners, and monitor status towards certification"
  stakeholders: [admins, compliance officers, auditors]

requirements:
  functional:
    - "Add compliance frameworks: GDPR, ISO 27001, SOC 2, custom"
    - "Each framework has controls/requirements with description and evidence type"
    - "Assign control owner (user) and due date"
    - "Track status: not-started, in-progress, compliant, non-compliant"
    - "Compliance score dashboard (% of controls compliant)"
    - "Attach evidence documents to controls"
  technical:
    - "frameworks, controls, control_assignments tables"
    - "File upload for evidence via Supabase Storage"
  non_functional:
    performance: "Compliance score calculated in <1s for 500 controls"
    security: "Evidence files access-controlled by org"

security:
  requirements:
    - "Evidence files only accessible within org"
    - "Control status changes create audit log entries"
  fraud_scenarios:
    - "Backdating evidence: timestamps server-set and immutable"

acceptance_criteria:
  - given: "An org with GDPR framework added"
    when: "Admin views compliance dashboard"
    then: "All GDPR controls are listed with status and owner"
  - given: "A control marked compliant"
    when: "Auditor views audit trail"
    then: "Change history with user, timestamp, and before/after values is visible"

tests:
  unit:
    - "Compliance score calculation correct"
    - "Control status state machine valid"
  integration:
    - "Framework import populates all controls"
    - "Evidence upload links to control"
  e2e:
    - "Add framework and mark first control compliant"

sentinel_validation_rules:
  - rule: "Control status changes must create audit log entries"
    severity: critical

success_metrics:
  - metric: "Time to first compliance score"
    target: "<5 minutes after framework setup"

rollback_strategy: "Archive framework; control data retained"