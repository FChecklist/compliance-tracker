id: SPEC-MOD-ORG
module: MOD-ORG
boss: VEDABOSS
status: DRAFT
priority: HIGH
created: "2026-06-26"

business:
  objective: "Enable organisations to onboard, structure departments, manage members, and configure their compliance workspace"
  stakeholders: [admins, managers]

requirements:
  functional:
    - "Create organisation with name, industry, size"
    - "Invite members via email with assigned role"
    - "Create and manage departments within org"
    - "Deactivate/remove members"
    - "Org settings: timezone, notification preferences, branding"
    - "Member list with roles and last active"
  technical:
    - "orgs table with soft delete"
    - "departments table linked to org"
    - "org_members junction with role field"
  non_functional:
    performance: "Member list loads <500ms for up to 1000 members"
    security: "Only org admin can modify org settings"

security:
  requirements:
    - "Only org admin can invite/remove members or change roles"
    - "All org changes logged to audit trail"
  fraud_scenarios:
    - "Uninvited user joining org: invite tokens expire in 48h and are single-use"

acceptance_criteria:
  - given: "An org admin"
    when: "They invite a user by email"
    then: "User receives invitation email and joins org on acceptance"

tests:
  unit:
    - "Org creation validates required fields"
    - "Department CRUD operations"
  integration:
    - "Invite flow creates pending member record"
    - "Accepted invite assigns correct role"
  e2e:
    - "Admin creates org and invites first member"

sentinel_validation_rules:
  - rule: "Org-level operations must verify admin role"
    severity: critical

success_metrics:
  - metric: "Invite acceptance rate"
    target: ">80%"

rollback_strategy: "Soft delete org; data retained for 30 days"