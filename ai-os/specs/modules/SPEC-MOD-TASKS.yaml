id: SPEC-MOD-TASKS
module: MOD-TASKS
boss: VEDABOSS
status: DRAFT
priority: HIGH
created: "2026-06-26"

business:
  objective: "Create, assign, and track compliance tasks linked to controls, with deadlines and status tracking"
  stakeholders: [managers, employees, compliance officers]

requirements:
  functional:
    - "Create tasks linked to compliance controls"
    - "Assign task to user with due date and priority"
    - "Task statuses: open, in-progress, review, completed, overdue"
    - "Comments and attachments on tasks"
    - "My Tasks view filtered to current user"
    - "Overdue task alerts"
  technical:
    - "tasks table with control_id FK, assignee_id, status, due_date"
    - "task_comments and task_attachments tables"
  non_functional:
    performance: "Task list renders <300ms"
    security: "Only assignee or admin can update task"

security:
  requirements:
    - "Only assignee, manager, or admin can modify task"
    - "Task changes logged to audit trail"
  fraud_scenarios:
    - "Marking incomplete task as complete: requires evidence attachment for compliant controls"

acceptance_criteria:
  - given: "A manager"
    when: "They create a task and assign it"
    then: "Assignee sees task in their My Tasks view with due date"
  - given: "A task past its due date"
    when: "The system runs daily check"
    then: "Task status changes to overdue and assignee is notified"

tests:
  unit:
    - "Task status transitions valid"
    - "Overdue detection logic"
  integration:
    - "Task creation linked to control"
    - "Overdue task triggers notification"
  e2e:
    - "Create, assign, and complete a task"

sentinel_validation_rules:
  - rule: "Task status changes must be audit logged"
    severity: error

success_metrics:
  - metric: "Task completion rate"
    target: ">85% on time"

rollback_strategy: "Revert task; control status updated to reflect"