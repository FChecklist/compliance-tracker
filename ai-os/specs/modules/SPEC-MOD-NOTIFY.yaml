id: SPEC-MOD-NOTIFY
module: MOD-NOTIFY
boss: VEDABOSS
status: DRAFT
priority: MEDIUM
created: "2026-06-26"

business:
  objective: "Keep users informed of task assignments, due dates, and approval requests via email and in-app notifications"
  stakeholders: [all users]

requirements:
  functional:
    - "In-app notification bell with unread count"
    - "Email notifications for: task assigned, task due soon (48h), task overdue, approval required, control status change"
    - "Weekly digest email with overdue items"
    - "User notification preferences (which types, email/in-app)"
    - "Mark notifications read/all-read"
  technical:
    - "notifications table with user_id, type, read, data JSONB"
    - "Email via Resend or Postmark"
    - "Background job for scheduled notifications"
  non_functional:
    performance: "Email delivered <30s, in-app <1s"
    security: "No PII in notification subjects (in case of email forwarding)"

security:
  requirements:
    - "Notification content scoped to recipient only"
    - "Unsubscribe links in all emails"
  fraud_scenarios:
    - "Email spoofing: use verified sending domain with SPF/DKIM"

acceptance_criteria:
  - given: "A task assigned to a user"
    when: "The assignment is saved"
    then: "User receives email and in-app notification within 30s"

tests:
  unit:
    - "Notification preference filtering"
    - "Unread count calculation"
  integration:
    - "Task assignment triggers notification creation"
    - "Email delivery confirmed"
  e2e:
    - "Notification bell updates on new assignment"

sentinel_validation_rules:
  - rule: "Email notifications must include unsubscribe link"
    severity: error

success_metrics:
  - metric: "Email delivery rate"
    target: ">99%"

rollback_strategy: "Disable email channel; in-app notifications unaffected"