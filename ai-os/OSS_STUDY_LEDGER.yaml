    license: AGPL-3.0
    verdict: study_ideas_only_no_code
    reused_in: none_yet
    notes: "Network-copyleft -- study UI/data-grid patterns only, never copy source."
    source: ARCH-06
  - project: appsmith/appsmith
    license: AGPL-3.0
    verdict: study_ideas_only_no_code
    reused_in: none_yet
    notes: "Network-copyleft -- low-code builder UX patterns, study only."
    source: ARCH-06
