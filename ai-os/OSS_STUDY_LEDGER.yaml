# ============================================================================
# VERIDIAN AI OS -- OPEN-SOURCE STUDY / REUSE LICENSE LEDGER
# ============================================================================
# audit198 gap closure, 2026-07-21 (RULE-072, RULE-073, ai-os/RULES_ARTICLES_198.json):
#   RULE-072: "The platform shall continuously study industry-leading
#     products, open-source projects, and proven business practices to
#     accelerate development without unnecessarily reinventing existing
#     solutions."
#   RULE-073: "Whenever legally permissible, open-source software, reusable
#     libraries, templates, frameworks, APIs, and community-supported
#     components shall be preferred to reduce development effort, cost,
#     and delivery time."
#
# This is the structured artifact ai-os/CONSTITUTION.yaml's ARCH-06 already
# calls for in prose ("Every vertical's research pass produces a per-repo
# license-plus-verdict table before any code is written against a studied
# project's ideas") but did not yet exist as a queryable table -- ARCH-06's
# own `note` field held the same data as a single unstructured sentence.
# This file turns that prose into real per-project rows; it does not
# invent new research, it structures research the Owner/prior sessions
# already did and ARCH-06/ARCH-07 already ratified (ai-os/CONSTITUTION.yaml
# lines ~559-567, sourced from MASTER_AI_OS_ARCHITECTURE.md #6/#7).
#
# SCHEMA (every entry below uses this shape):
#   project:  <name>
#   license:  <SPDX-ish license identifier as documented in CONSTITUTION.yaml>
#   verdict:  safe_to_reuse_code | study_ideas_only_no_code | data_model_shape_reference_only | do_not_run_as_live_service
#   reused_in: <this repo's real call site/module that benefited from studying
#               this project, or "none_yet" if study-only so far -- never
#               fabricated, updated only when a real PR cites the project>
#   notes:    <short, factual>
#   source:   <constitution id this was reconciled from>
#
# language_rule: short structured values only, matching CONSTITUTION.yaml's
#   own convention -- no narrative prose beyond this header.
# ============================================================================

meta:
  id: OSS-STUDY-LEDGER
  version: 1.0
  effective_date: "2026-07-21"
  reconciled_from:
    - "ai-os/CONSTITUTION.yaml#ARCH-06"
    - "ai-os/CONSTITUTION.yaml#ARCH-07"
  update_rule: >-
    Add a new entry (or update reused_in) whenever a real PR studies or
    reuses ideas/patterns from an open-source project. Never mark
    safe_to_reuse_code for an AGPL/BUSL/SSPL project -- see
    ai-os/CONSTITUTION.yaml ARCH-06's known-risk list, which this file
    extends, not replaces.

projects:
