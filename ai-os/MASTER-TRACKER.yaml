    - id: OPEN-02
      name: "veda-advisors PR #15 needs Owner review approval"
      detail: "Fully CI-green (12/12 checks). veda-advisors' branch protection requires 1 approving review + enforce_admins:true, no bypass. The session's gh auth is the same account (FChecklist) that authored the PR -- GitHub blocks self-approval."
      next_step: "Owner (or any account other than FChecklist) approves and merges https://github.com/FChecklist/veda-advisors/pull/15."
      first_raised: "Priority 7"

