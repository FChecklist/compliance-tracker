      next_step: "Owner creates a GitHub PAT (repo scope) and runs `vercel env add GITHUB_DISPATCH_PAT production`, or sets it via the Vercel dashboard. Cannot be done by an agent -- distinct from the write-only PAT_FCHECKLIST GitHub secret, whose value can never be read back to reuse."
