        2. Generate a new Composio API key, revoke the old one (Composio dashboard).
        3. Check every repo/workflow reusing the old PAT (GitHub Secrets PAT_FCHECKLIST across compliance-tracker/veda-advisors/projexa) before rotating, or CI breaks everywhere it's used.
