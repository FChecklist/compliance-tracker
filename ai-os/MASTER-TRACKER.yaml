      why: "Pre-existing (2026-06-28) multi-agent governance infrastructure named explicitly in AGENTS.md Rule 3, used by z.ai too, not just this session's work. Already self-declared stale/superseded by COMPLETED.yaml in its own header -- left as-is, not this file's job to fix."
    - file: ai-os/boss/COMPLETED.yaml
      why: "Required doer+auditor completion LOG per AGENTS.md Rule 7(d), append-only audit trail across all agents. Different purpose than a gap/pending tracker -- this file references it, doesn't replace it."
    - file: ai-os/system-tree/*.yaml
      why: "Tree 1 -- 'what actually exists in code' reference, not a gap/pending list."

