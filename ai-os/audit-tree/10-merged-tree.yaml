# MERGED / DEDUPLICATED TREE -- Round 2
#
# Purpose: a standalone reorganization of the 01-09 per-document trees into
# one non-duplicative structure, organized by DOMAIN (concept) rather than
# by source document. This file does NOT re-derive anything from the live
# codebase -- that comparison happens later, separately. Every branch below
# is fully traceable back to the atomic items in 01-09-*.yaml via the
# `sources` field (format "docfile:part name"); nothing here is invented,
# only re-organized, merged, and tightened.
#
# Deduplication method: where two or more source documents state the same
# requirement (verbatim or materially equivalent), one canonical branch is
# kept and all contributing sources are listed. Where two documents define
# the SAME kind of thing with DIFFERENT vocabularies (e.g. 04's 9 approval
# options vs 05's 16 decision options), that is flagged explicitly as a
# reconciliation item, not silently merged, since collapsing them without
# resolving the vocabulary mismatch would lose information.
#
# Structure: domain -> branch -> sub_branch. Each sub_branch carries a
# `requirement` (the tightened, narrow statement), `sources` (traceability),
# and -- wherever the source material specifies them with a distinct
# input/process/output/guardrail shape -- explicit `guardrail:`, `input:`,
# and `output:` fields. Not every sub_branch has these: many source items
# are pure policy/identity statements with no literal input-output shape,
# and fabricating one would misrepresent the source. Where a sub_branch has
# none of the three, that is a deliberate reflection of the source material,
# not an oversight. A `duplication_resolved` note on a branch explains what
# was merged into it and why.
#
# ROUND 2 CHANGELOG (fixes applied after AUDIT-ROUND-1.md; see that file for
# full finding text):
#  - Finding 1: added guardrail/input/output fields to sub-branches with a
#    genuine I/O shape (D4.B1, D5.B3, D5.B5, D9, D12, D13, D15.B1.S1, D17,
#    D21, D24, D26.B3).
#  - Finding 2: footer counts corrected to mechanically-verified totals.
#  - Findings 3-4: citation-string typos fixed (Guardrails 21-29, D5.B4.S2).
#  - Finding 5: 9 missing content topics added (see excluded_meta_content
#    below for the 14 legitimately-dropped preamble/meta parts, now logged
#    explicitly instead of silently absent).
#  - Finding 6: D2.B3.S3 now cross-references D3 for model allocation.
#  - Fresh round-2 pass (not from Round 1's audit, found independently):
#    Email Intelligence was split incoherently -- its work-detection half
#    was filed under D10 (Communication Governance) while its sibling
#    sections (MoM Intelligence, Document Intelligence) were filed under
#    D21 (Intelligent Work Detection). Moved the detection half to D21,
#    kept the send/draft half in D10, cross-referenced both ways.
#  - Fresh round-2 pass: added D24<->D13 (predefined-text mechanisms) and
#    D25<->D3 (software-first principle) cross-references that Round 1
#    did not flag.

