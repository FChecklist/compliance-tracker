          - id: D4.B1.S4
            requirement: "Output field group -- what the object produced."
            output: "Deliverables, Confidence Score, Evidence, Logs, Audit Trail, Completion Report. Confidence Score gates the audit path per D15.B1.S1 (below 95% forces the L1 audit gate)."
