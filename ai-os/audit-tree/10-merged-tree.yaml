            requirement: "Input field group -- what the object is asking for."
            input: "Objective, Business Context, Scope, Expected Result, Success Criteria, Dependencies, Risks, Assumptions, Constraints, Reference Documents, Knowledge Sources, Allowed Tools, Allowed Models. Required before D4.B2's lifecycle can leave the 'Task Request' stage."
