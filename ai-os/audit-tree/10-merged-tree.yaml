            requirement: "Identity field group -- who/what/when this object is."
            output: "Task/Work ID, Version, Timestamp, Request Source, Priority, Department, Module, Owner, Responsible AI, Supervisor AI, Approver, Dynamic Chain ID (see D5). Populated once at object creation, mutable only via a governed state transition (D4.B3)."
