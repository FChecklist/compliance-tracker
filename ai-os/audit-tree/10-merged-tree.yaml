            input: "Current State, Remaining Work, Known Risks, Open Issues, Next Responsible AI, Acceptance Checklist."
            output: "Confirmation Required -- explicit acceptance by the receiving agent before ownership legally transfers (see D17 for the full protocol)."
            sources: ["01:Every Task MUST Contain -- Handover fields"]
          - id: D4.B1.S6
            requirement: "Closure field group -- what the object taught the organization."
            output: "Lessons Learned, Performance Metrics, Suggested Improvements, Knowledge Updates, Reusable Components, Loop Engineering Suggestions -- all six feed directly into D16's continuous-improvement cycle as its per-object input."
            sources: ["01:Every Task MUST Contain -- Closure fields"]
      - id: D4.B2
        name: "Universal Task Lifecycle (18 stages)"
        sub_branches:
          - id: D4.B2.S1
            requirement: "Every object passes through, in order, with no stage skippable: Task Request -> Classification -> Risk Assessment -> Instruction Validation -> Resource Allocation -> Execution -> Continuous Monitoring -> Self Validation -> Peer Validation -> Escalation (if required) -> Completion -> Documentation -> Learning Capture -> Process Improvement -> Knowledge Update -> Performance Scoring -> Directory Update -> Continuous Loop Engineering -> Closed."
            sources: ["01:Universal Task Lifecycle (18 stages)"]
      - id: D4.B3
        name: "Universal Work States (~30 states, 8 categories)"
        sub_branches:
          - id: D4.B3.S1
            requirement: "Every Work Object exists in exactly one governed, permission-controlled, auditable state at a time, drawn from 8 categories: Planning (5 states), Action (8), Review (8), Approval (6), Completion (3), Exception (6), plus Deleted/Archived. Every state transition is governed and auditable."
            sources: ["05:4. Universal Work States (~30 states across 8 categories)"]
      - id: D4.B4
        name: "AI Handover Protocol"
        duplication_resolved: "Merged into D17 (see below) -- kept as a cross-reference here since it's part of the object's lifecycle."
        sub_branches:
          - id: D4.B4.S1
            requirement: "See D17 -- structured handover is mandatory before ownership transfer; 'Done' alone is never sufficient."
            sources: ["01:Mandatory AI Handover Protocol"]
      - id: D4.B5
        name: "Origin sources for object creation"
        sub_branches:
          - id: D4.B5.S1
            requirement: "A Work Object/Task may originate from: VERI, Human user, AI Agent, API, Software Module, VERI Chat, Email, Uploaded File, MoM, Meeting Transcript, Voice Notes, OCR, Scanned Documents, Reports, Dashboards, Customer/Vendor Requests, Scheduled Jobs, Third-party Systems, External Integrations."
            sources: ["05:3. Universal Work Object"]
      - id: D4.B6
        name: "Customer/business task governance (application of D4 to customer actions)"
        sub_branches:
          - id: D4.B6.S1
            requirement: "Customer actions (Create Invoice, Approve Leave, Create Project, Generate Report, Upload Document, Run Payroll, etc.) follow the exact same lifecycle: Task -> Validation -> Audit -> Learning -> Improvement -> Knowledge -> Performance. Not a separate lifecycle -- an instantiation of D4.B2/D15 for customer-originated objects."
            sources: ["01:Customer Task Governance"]
      - id: D4.B7
        name: "Work Object as single source of truth (architectural recommendation)"
        sub_branches:
          - id: D4.B7.S1
            requirement: "RECOMMENDATION: to be genuinely AI-native, To Do, Minutes of Meeting, Email, Reviews, Approvals, and Reports should NOT be treated as separate modules -- they should all become different VIEWS of the same underlying Work Object (D4.B1). A meeting creates Work Objects, an email updates Work Objects, an approval changes a Work Object's state (D4.B3), a report summarizes Work Objects, VERI Chat discusses Work Objects. Claimed benefit: single source of truth, eliminates duplicate tracking across the platform. This is the single most concrete architectural recommendation in the corpus regarding D4 and should be treated as a design constraint on any module that touches Work Objects (D10, D21, D23, D25), not merely an aspiration."
            guardrail: "Any new module or feature that creates its own independent tracking table for a work-adjacent concept (a separate 'reviews' table, a separate 'approvals' table not keyed to a Work Object ID) violates this recommendation."
            sources: ["05:Closing addendum 1 -- 'One enhancement I'd add' (Work Object as single source of truth)"]

  - id: D5
    name: "Dynamic Mode Pills & Dynamic Chain Framework (DMP-DCF)"
    branches:
      - id: D5.B1
        name: "Core framework -- vision, purpose, core principle"
        sub_branches:
          - id: D5.B1.S1
            requirement: "DMP-DCF is the universal business classification/execution/orchestration/intelligence framework and operating language of VERIDIAN AI OS -- every activity (human, VERI, AI agent, module, API, automation, workflow, report, dashboard, chat, integration, scheduled job, third-party app) begins with a Mode Pill + Dynamic Chain selection. No business activity may exist without a Dynamic Chain -- mandatory, no exceptions (task/workflow/report/approval/communication/automation/AI execution/API execution/scheduled job)."
            sources: ["03:1. Vision", "03:3. Core Principle"]
          - id: D5.B1.S2
            requirement: "Five strategic objectives: Software First (target 99% of activities eventually software-executable), Predictable AI (no vague instructions), Standardized-yet-customizable Business Operations, Continuous Learning, Enterprise Governance (traceable/measurable/auditable/searchable)."
            sources: ["03:2. Purpose -- five strategic objectives"]
          - id: D5.B1.S3
            requirement: "Closing constitutional mandate: DMP-DCF is the operating language of VERIDIAN AI OS -- every task/communication/workflow/decision/approval/report/automation/audit/API call/AI interaction/software operation shall be governed by a Dynamic Chain; the framework shall continuously learn/evolve/optimize itself while preserving governance/auditability/predictability/business consistency; compliance is mandatory for every component and is a foundational constitutional requirement (same authority tier as D1's other frameworks)."
            sources: ["03:19. Constitutional Principles"]
      - id: D5.B2
        name: "Mode Pill / Chain taxonomy and behavior"
        sub_branches:
          - id: D5.B2.S1
            requirement: "Mode Pills = highest-level business domain classification (Sales, CRM, Finance, HR, Compliance, Projects, Procurement, Support, Legal, Administration, Knowledge, Communication, Reports, Analytics). Each Pill expands into a progressively specific Dynamic Chain (worked example: Sales -> Lead Management -> ... -> Collection, 11 levels)."
            sources: ["03:4. Dynamic Mode Pills", "03:5. Dynamic Chain"]
          - id: D5.B2.S2
            requirement: "Once selected, the Dynamic Chain becomes the 'Business DNA' controlling: Software Module, Business Rules, Permissions, Workflow, AI Behaviour, Automation, Approvals, Notifications, Reports, Audit Rules, Monitoring Rules, Knowledge Capture, Escalation Matrix, KPIs, SLAs."
            sources: ["03:6. Dynamic Chain is the Business DNA"]
          - id: D5.B2.S3
            requirement: "UX requirements: predict likely selections, learn user behaviour, prioritize frequent chains, minimize clicks, support keyboard/Tab navigation and search, recommend previous selections, auto-select obvious options -- maximum intelligence, minimum effort."
            sources: ["03:7. User Experience"]
          - id: D5.B2.S4
            requirement: "Two-tier library: Global Library (every approved chain, centrally maintained) + per-user Library (auto-generated from Role/Department/Projects/Permissions/History/Behaviour/Teams/Location/Organization, continuously evolving)."
            sources: ["03:8. Personalized Dynamic Library"]
      - id: D5.B3
        name: "Application: task/object creation"
        sub_branches:
          - id: D5.B3.S1
            requirement: "Every task/object creation begins with Dynamic Chain selection (system may recommend, user may modify); once submitted the chain becomes part of the permanent record and every future action references it."
            duplication_resolved: "03 §9 'Task Creation' and 08's 'Requirement Anchor' state the identical rule from two documents -- merged into this one sub-branch rather than split across D5 and a separate D13/D25 branch (corrected in round 2: round 1's text wrongly implied the 08 source lived in a different domain branch labeled 'D8', which does not hold this content -- it was already merged here)."
            input: "A new task/Work Object (D4) or automation-eligible request (D25) being created."
            output: "The selected Dynamic Chain, permanently attached to the object's Identity field group (D4.B1.S1)."
            sources: ["03:9. Task Creation", "08:Topic 1 -- Requirement Anchor (per-task Mode Pill/Chain selection)"]
      - id: D5.B4
        name: "Application: VERI and VERI Chat"
        duplication_resolved: "03 §10/§11 state VERI's and VERI Chat's relationship to the Dynamic Chain; 04 restates the VERI Chat minimum-2-level-selection rule near-verbatim. Canonical statement kept here in D5 (chain-selection rule); VERI/VERI Chat's own identity and behavior live in D7/D8, not duplicated here."
        sub_branches:
          - id: D5.B4.S1
            requirement: "VERI uses the Dynamic Chain to understand Business Context/Expected Outcome/Business Rules/Required Software/Applicable AI Agents/Escalation/Monitoring/Reports/Approvals/Knowledge Updates -- VERI never guesses business context, the chain provides it."
            sources: ["03:10. VERI -- Your Assistant"]
          - id: D5.B4.S2
            requirement: "Every new VERI Chat conversation requires minimum 2-level Dynamic Chain selection before communication begins, establishing business context for interpretation/recommendations/linkage/searchability/auditability."
            sources: ["03:11. VERI Chat", "04:Dynamic Mode Pill & Dynamic Chain Requirement (for VERI Chat conversations)"]
      - id: D5.B5
        name: "Missing chain handling ('My Option Is Not Available')"
        sub_branches:
          - id: D5.B5.S1
            requirement: "Missing-chain flow."
            input: "User selection of 'My Option Is Not Available' during chain selection (D5.B3)."
            output: "VERI captures the requirement, analyzes business need, proposes a new chain, routes for governance+audit (D15), on approval adds to the Global Library (D5.B2.S4) and auto-updates relevant User Libraries."
            sources: ["03:15. Missing Dynamic Chain"]
      - id: D5.B6
        name: "Visibility and integration requirements"
        sub_branches:
          - id: D5.B6.S1
            requirement: "Interface must always display Task Number, Selected Mode Pill, Complete Chain, Workflow Status, Priority, Owner, visible throughout execution. The chain is the common language across VERI, VERI Chat, all software modules, AI/audit/monitoring agents, workflows, reports, dashboards, approvals, notifications, knowledge mgmt, APIs, integrations, automation engines -- no component operates outside the framework."
            sources: ["03:17. Visibility", "03:18. Integration"]
      - id: D5.B7
        name: "Context-aware / adaptive UI application"
        duplication_resolved: "03's addendum ('Context-Aware Dynamic User Interface') and 09's 'Changes Part 2' both state the SAME requirement (Mode Pill/Chain options auto-change per module/webpage/function) independently. Merged to one sub-branch."
        sub_branches:
          - id: D5.B7.S1
            requirement: "Mode Pill/Chain options must automatically change based on the module/webpage/function the user is currently on (Automatic Context Switching, Module-Driven Chains, Function-Level Adaptation), while still allowing manual software operation without forced chain selection at every step; system should intelligently preselect the likely chain and stay synchronized with on-screen activity in real time. Framed as a hard blocker in 09 ('without the right option menu, the user cannot work') and 'a very important feature' -- a permutation table for this is claimed to already exist and needs verification it works properly."
            sources: ["03:Addendum -- Context-Aware Dynamic User Interface (Adaptive Dynamic Mode Pills)", "09:Changes Part 2"]
      - id: D5.B8
        name: "Rigid-vs-open balance principle (cross-cutting design constraint)"
        sub_branches:
          - id: D5.B8.S1
            requirement: "The Dynamic Chain framework, its guardrails (D12/D13), and its automation (D25) must not make the system rigid, and must not make the system 'open' (unconstrained) either -- a deliberate balance, not a default toward either extreme. Applies as a design constraint across D5 (chain selection), D12/D13 (guardrails), and D25 (automation/calculators/processes/reports): every implementation decision in those domains should be checked against both failure modes, not just the more obvious one (over-rigidity)."
            sources: ["08:Preamble / operating instructions (not a requirement itself, the framing for all items below)", "08:Closing instruction (repeats the preamble, reinforcement not a new requirement)"]

  - id: D6
    name: "Dynamic Chain Master Directory (DCMD)"
    branches:
      - id: D6.B1
        name: "Directory purpose and required fields"
        sub_branches:
          - id: D6.B1.S1
            requirement: "DCMD is the authoritative, centrally maintained directory of every valid Dynamic Chain. Every chain entry must contain: Chain ID, Mode Pill/domain, full hierarchical path, linked software module(s), linked business rules, linked permissions, linked workflow definition, linked AI behaviour/instructions, linked reports/KPIs/SLAs, version history/audit trail."
            sources: ["03:Addendum -- Dynamic Chain Master Directory (DCMD)"]
      - id: D6.B2
        name: "Directory intelligence and modeling approach"
        sub_branches:
          - id: D6.B2.S1
            requirement: "Directory must support intelligent search/recommendation (not static lookup), missing-chain detection (feeds D5.B5), and version control as chain definitions evolve."
            sources: ["03:Addendum -- Dynamic Chain Master Directory (DCMD)"]
          - id: D6.B2.S2
            requirement: "RECOMMENDATION (not yet a settled requirement): model DCMD as a graph structure (nodes/edges, traversable paths) rather than an enumerated permutation table, to avoid combinatorial explosion of mode-pill x level x downstream-option rows. This supersedes the base addendum's literal 'Complete Permutation Library' language, not the underlying goal."
            sources: ["03:Addendum -- graph-based improvement note (chat-pasted, framed as 'a better idea than the enumerated-permutation approach')"]
      - id: D6.B3
        name: "Dynamic Chain as the primary system object (architectural recommendation)"
        sub_branches:
          - id: D6.B3.S1
            requirement: "RECOMMENDATION: elevate the Dynamic Chain to the primary system object in VERIDIAN AI OS. Instead of tasks/chats/reports/approvals/workflows/AI agents each maintaining their own context, all of them reference the same Dynamic Chain ID, so a task, its VERI Chat discussion, AI interactions, approvals, reports, audit records, and knowledge updates are linked through one immutable business context. Claimed benefit: end-to-end traceability, no duplicated context, more predictable/auditable platform at scale. This is the architectural rationale behind D4.B1.S1's 'Dynamic Chain ID' field -- the field alone does not capture why it exists."
            guardrail: "Every object type listed (task, chat, approval, report, audit record, knowledge update) must carry the Dynamic Chain ID field before this recommendation can be considered implemented -- a partial rollout (e.g. tasks only) does not satisfy the stated end-to-end-traceability goal."
            output: "A single immutable Chain ID value, propagated and queryable across every referencing object type."
            sources: ["03:Closing note -- 'One addition I would make' (Source A)"]

  - id: D7
    name: "VERI -- Your Assistant: Identity & Behavior"
    branches:
      - id: D7.B1
        name: "Official identity"
        duplication_resolved: "03 §10 and 04's identity section both assert VERI is an assistant, not a communication platform, and both state VERI never guesses/assumes business context. 04 is more complete (naming convention, ecosystem role) and is treated as canonical; 03's chain-specific framing is folded into D5.B4."
        sub_branches:
          - id: D7.B1.S1
            requirement: "Official name 'VERI -- Your Assistant' (aka VERI AI, VERI -- all synonyms); preferred UI display name is the full form. VERI is an AI participant within the VERIDIAN AI OS ecosystem, responsible for guidance/workflow execution/AI coordination/task monitoring/knowledge retrieval/recommendations/decision support. Explicitly: VERI is an intelligent assistant, NOT a communication platform (see D8 for that distinction)."
            sources: ["04:VERI -- Your Assistant: Official System Identity"]
      - id: D7.B2
        name: "Human authority & AI delegation (default posture)"
        duplication_resolved: "01's Guardrail 11 (Human Override) states the constitutional-layer version of this rule ('human decisions always override AI'); 05's closing addendum 2 states a far more detailed, VERI-specific version (explicit delegation scoping/revocability/auditability). 05's version is adopted as canonical for VERI's behavior; 01's Guardrail 11 is kept as the underlying constitutional guarantee this implements."
        sub_branches:
          - id: D7.B2.S1
            requirement: "By default VERI does not make business decisions for the human -- VERI's default role is analyze/recommend/prepare/coordinate/execute-approved-work/monitor/communicate/improve. Human retains authority to Approve/Reject/Modify/Prioritize/Delegate/Escalate/Assign/Complete/Cancel/decide."
            sources: ["05:Closing addendum 2 -- Constitutional Principle: Human Authority & AI Delegation", "01:Guardrail 11 -- Human Override"]
          - id: D7.B2.S2
            requirement: "Humans may explicitly delegate decision authority to VERI for a specific Task/Workflow/Project/Module/Business Function/Communication Type/Approval Type/Time Period/Category of Work. VERI never assumes delegated authority -- delegation must be explicitly granted, clearly scoped/documented, time- or event-bound where appropriate, fully auditable, and revocable at any time. Absent valid delegation, VERI always seeks approval before judgment-requiring actions."
            sources: ["05:Closing addendum 2 -- Constitutional Principle: Human Authority & AI Delegation"]
      - id: D7.B3
        name: "Work-execution behavior (the Constitutional Principle of WGIEF)"
        sub_branches:
          - id: D7.B3.S1
            requirement: "VERI continuously: Reads, Understands, Analyzes, Classifies, Recommends, Drafts, Executes approved actions, Monitors, Follows up, Reports, Learns. Human primarily: Approves, Rejects, Modifies, Delegates, Escalates, Prioritizes, Decides."
            sources: ["05:2. Constitutional Principle"]
          - id: D7.B3.S2
            requirement: "Human-Centric Design Principle: VERIDIAN AI OS is designed to reduce administrative effort so the end user spends the majority of their time making informed business decisions, not performing repetitive operational activities. VERI shall proactively perform preparation, coordination, monitoring, drafting, scheduling, organizing, communicating, documenting, and follow-up activities, leaving the human to exercise judgment, provide approvals, and make strategic decisions."
            sources: ["05:17. Human-Centric Design Principle"]

  - id: D8
    name: "VERI Chat: Platform Identity & Governance"
    branches:
      - id: D8.B1
        name: "Platform identity and relationship to VERI"
        duplication_resolved: "03 §11's framing ('VERI Chat is the business communication platform... VERI participates as an intelligent business assistant') is materially the same claim as 04's dedicated identity sections, stated more thoroughly in 04. 04 adopted as canonical; 03's version treated as a restatement, not separately tracked."
        sub_branches:
          - id: D8.B1.S1
            requirement: "VERI Chat is VERIDIAN's enterprise business communication platform (individuals/teams/departments/orgs/authorized externals/VERI). VERI Chat and VERI are two distinct components: VERI Chat can function without VERI participating (if policy permits); VERI does not own VERI Chat; VERI Chat is not merely an interface to VERI -- it is a shared collaboration environment. This distinction must hold consistently across architecture/UI/APIs/docs/governance."
            sources: ["04:VERI Chat: Official System Identity", "04:Relationship Between VERI Chat and VERI -- Your Assistant", "03:11. VERI Chat"]
      - id: D8.B2
        name: "VERI's participation role within VERI Chat"
        sub_branches:
          - id: D8.B2.S1
            requirement: "When participating, VERI may: read conversations (permission-subject), understand business context, answer questions, provide recommendations, identify action items, summarize discussions, suggest follow-ups, recommend workflows, identify approvals, detect deadlines/commitments, recommend task creation. VERI shall NEVER automatically create/assign/modify/execute business tasks from a conversation alone -- must present the recommendation and obtain explicit user approval first."
            sources: ["04:VERI's Role Within VERI Chat", "03:11. VERI Chat"]
      - id: D8.B3
        name: "Chain requirement for conversations"
        duplication_resolved: "Merged into D5.B4.S2 -- kept as cross-reference."
        sub_branches:
          - id: D8.B3.S1
            requirement: "See D5.B4.S2 -- min. 2-level chain selection before a new VERI Chat conversation begins."
            sources: ["04:Dynamic Mode Pill & Dynamic Chain Requirement (for VERI Chat conversations)"]

  - id: D9
    name: "Approval & Confirmation UX"
    branches:
      - id: D9.B1
        name: "RECONCILIATION NEEDED -- two divergent option vocabularies for the same UX pattern"
        duplication_resolved: "04 defines a 9-option vocabulary specifically for VERI-drafted COMMUNICATIONS (Approve Once/Edit & Approve/Reject/Approve Similar/Approve for This Conversation/Approve for This Task/Approve for This Workflow/Always Approve for This Communication Type/Cancel), plus a separate 9-option 'quick' vocabulary (Yes/Yes to All/Approve All for This Task/.../Always Approve/No/Not Now/Review Before Sending). 05 defines a DIFFERENT 16-option vocabulary for general WORK OBJECT actions (Approve/Approve All/Approve Similar/Edit/Delegate/Change Priority/Change Timeline/Assign/Share/Reject/Ignore/Merge/Split/Archive/Delete/Mark Not Required). These are NOT stated as the same list anywhere in the source material, and both are asserted as mandatory. This is flagged as an open reconciliation item, not silently merged: implementation must either (a) treat these as two genuinely separate, purpose-scoped option sets [communication approval vs. work-object action], each complete on its own terms, or (b) the Owner must decide on a single unified vocabulary. Not resolved by this tree -- carried forward as a named decision point."
        sub_branches:
          - id: D9.B1.S1
            requirement: "Communication-approval option set."
            input: "A VERI-drafted communication (D10) awaiting send."
            output: "One of 9 options: Approve Once, Edit & Approve, Reject, Approve Similar Communications, Approve for This Conversation, Approve for This Task, Approve for This Workflow, Always Approve for This Communication Type, Cancel."
            sources: ["04:User Approval Protocol"]
          - id: D9.B1.S2
            requirement: "Quick/simplified option set, minimizes interruption."
            input: "Same trigger as D9.B1.S1 -- a lower-friction presentation of the same underlying decision point."
            output: "One of 9 options: Yes, Yes to All, Approve All for This Task, Approve All for This Workflow, Approve All Similar Requests, Always Approve, No, Not Now, Review Before Sending."
            sources: ["04:Simplified Approval Experience"]
          - id: D9.B1.S3
            requirement: "Work-object decision option set, general-purpose, not communication-specific."
            input: "A proposed Work Object action (D4/D21) awaiting user decision."
            output: "One of 16 options: Approve, Approve All, Approve Similar, Edit, Delegate, Change Priority, Change Timeline, Assign, Share, Reject, Ignore, Merge, Split, Archive, Delete, Mark Not Required."
            sources: ["05:6. Human Decision Protocol"]
      - id: D9.B2
        name: "Approval learning (persistent preferences)"
        duplication_resolved: "04's 'Intelligent Approval Learning' section is the only source stating this mechanism in detail; not duplicated elsewhere, kept as single branch."
        sub_branches:
          - id: D9.B2.S1
            requirement: "VERI learns communication preferences and may recommend creating a reusable approval preference (e.g. weekly status reports, daily team updates, meeting reminders) when a user repeatedly approves the same type. VERI shall never activate a persistent approval automatically -- every persistent approval must be explicitly granted by the end user."
            sources: ["04:Intelligent Approval Learning"]
      - id: D9.B3
        name: "Approval speed/friction requirement"
        sub_branches:
          - id: D9.B3.S1
            requirement: "The approval experience must be fast and minimally intrusive -- stated independently in both the communication context (04) and the general work-object context (05)."
            sources: ["04:Simplified Approval Experience", "05:6. Human Decision Protocol"]

  - id: D10
    name: "Communication Governance (VERI-assisted messaging)"
    branches:
      - id: D10.B1
        name: "Communication authority (assist, not initiate independently)"
        sub_branches:
          - id: D10.B1.S1
            requirement: "VERI acts as a communication assistant FOR the end user, never as an independent decision-maker -- shall never initiate business communications independently unless explicitly authorized through approved automation rules."
            sources: ["04:VERI-Assisted Communication Protocol -- Communication Authority"]
      - id: D10.B2
        name: "Assisted communication types"
        duplication_resolved: "04's 'Assisted Communication Capabilities' list (25 comm types) and 05's §13 'Communication Governance' typical-communications list overlap heavily (status/progress/reminders/approval requests/meeting invites/reports). Merged into one list; 05's Email Intelligence (§9) is a distinct, richer sub-branch (D10.B3) not folded in here."
        sub_branches:
          - id: D10.B2.S1
            requirement: "Upon instruction, VERI may prepare/send: task/progress/status updates, daily/weekly/monthly reports, meeting summaries/MoM, follow-up messages, action item notifications, approval requests/reminders, deadline reminders, escalation notifications, information/clarification requests, document/report sharing, dashboard links, schedule updates, meeting invitations, customer/vendor communications, internal announcements. VERI may PREPARE automatically, but sending requires user approval unless prior authorization exists."
            sources: ["04:Assisted Communication Capabilities", "05:13. Communication Governance"]
      - id: D10.B3
        name: "Email intelligence -- send/draft half"
        duplication_resolved: "ROUND 2 STRUCTURAL FIX: this branch now holds only the outbound/compose half of Email Intelligence. Its detection half (understanding context, identifying commitments/follow-ups/approvals/deadlines from an incoming email) moved to D21.B4, alongside the structurally identical MoM (D21.B2) and Document (D21.B3) intelligence branches."
        sub_branches:
          - id: D10.B3.S1
            requirement: "For composed email: VERI prepares responses, drafts replies, recommends recipients/attachments/follow-up reminders/Work Objects. See D21.B4 for the detection half (reading and understanding an incoming email)."
            input: "A detected commitment/follow-up/approval/deadline (from D21.B4) or a user instruction to compose."
            output: "A drafted reply/recipient list/attachment set, held for user approval (D9) before send."
            guardrail: "No outgoing communication sent without user approval unless policy-authorized (same guardrail as D10.B2)."
            sources: ["05:9. Email Intelligence"]
      - id: D10.B4
        name: "Mandatory communication governance rules"
        sub_branches:
          - id: D10.B4.S1
            requirement: "VERI shall never: send messages pretending to be the user without authorization, modify the intent of a user's communication, send to unauthorized recipients, forward confidential info without permission, escalate without approval/policy, send external comms without explicit permission. All VERI-initiated communications must be fully traceable and audit-logged."
            sources: ["04:Mandatory Governance Rules"]
      - id: D10.B5
        name: "Closing constitutional framing"
        sub_branches:
          - id: D10.B5.S1
            requirement: "VERI is an intelligent communication ASSISTANT, not an autonomous communicator -- may draft/organize/schedule/recommend, but intent-bearing sends stay under a governed user-approval mechanism that must be fast/intuitive/minimally intrusive. Goal: increase productivity without removing accountability or control."
            sources: ["04:Constitutional Principle (closing statement)"]

  - id: D11
    name: "Human Authority & AI Delegation (constitutional layer)"
    branches:
      - id: D11.B1
        name: "Cross-reference only"
        duplication_resolved: "Fully merged into D7.B2 -- this domain intentionally left as a pointer, not a duplicate, because the requirement is VERI-specific behavior (D7) grounded in a constitutional guarantee (Guardrail 11), not a separate requirement set."
        sub_branches:
          - id: D11.B1.S1
            requirement: "See D7.B2 for the full human-authority/AI-delegation requirement (05's detailed version) and its constitutional grounding (01's Guardrail 11)."
            sources: ["05:Closing addendum 2 -- Constitutional Principle: Human Authority & AI Delegation", "01:Guardrail 11 -- Human Override"]

  - id: D12
    name: "Guardrail Framework -- Constitutional Layer (30 Mandatory Guardrail Protocols)"
    branches:
      - id: D12.B1
        name: "Architecture and applicability"
        sub_branches:
          - id: D12.B1.S1
            requirement: "Guardrails are a constitutional layer applying to 100% of AI Models/Agents/Human Users/APIs/Modules/Workflows/Background Jobs/Customer Interactions. Three-layer architecture: Pre-Execution -> Execution -> Post-Execution Guardrails. Failure at any stage pauses execution and triggers escalation. No task may bypass these guardrails; bypass attempts are logged, blocked where technically possible, and treated as a governance incident (Guardrail 30)."
            sources: ["01:Mandatory Guardrail Protocols (MGP) -- framing", "01:Guardrail 30 -- Constitutional Compliance"]
      - id: D12.B2
        name: "Pre-execution guardrails (1-6)"
        sub_branches:
          - id: D12.B2.S1
            requirement: "1. Identity guardrail."
            guardrail: "No anonymous execution -- verified User/AI/Agent identity, Workspace, Org, Session, Auth, Role, Permissions required before any task admits a request."
            sources: ["01:Guardrail 1 -- Identity"]
          - id: D12.B2.S2
            requirement: "2. Authority guardrail."
            guardrail: "Before acting, check 'can I legally perform this task' (Authority/Permission/Delegation/Business Rules/Org Policies); insufficient authority = STOP + escalate, never proceed on assumed authority."
            sources: ["01:Guardrail 2 -- Authority"]
          - id: D12.B2.S3
            requirement: "3. Scope guardrail."
            guardrail: "If a task falls outside the agent's defined scope, do not guess or improvise -- escalate instead."
            sources: ["01:Guardrail 3 -- Scope"]
          - id: D12.B2.S4
            requirement: "4. Objective guardrail."
            guardrail: "A task objective must be explicit (clear objective/expected outcome/success criteria/completion definition) before execution -- ambiguous objectives are clarified first, never inferred."
            sources: ["01:Guardrail 4 -- Objective"]
          - id: D12.B2.S5
            requirement: "5. Instruction Validation guardrail."
            guardrail: "Validate missing inputs/contradictions/ambiguity/conflicting instructions/unsupported requests/missing dependencies before execution -- block execution until resolved. See D13 for the per-task/per-selection implementation of this guardrail."
            sources: ["01:Guardrail 5 -- Instruction Validation"]
          - id: D12.B2.S6
            requirement: "6. Knowledge guardrail."
            guardrail: "Before proceeding, confirm sufficient knowledge exists and referenced documentation is current/available -- if not, retrieve first or escalate; never proceed on stale or absent knowledge."
            sources: ["01:Guardrail 6 -- Knowledge"]
      - id: D12.B3
        name: "Execution guardrails (7-20)"
        sub_branches:
          - id: D12.B3.S1
            requirement: "7-9. Evidence / Hallucination Prevention / Confidence guardrails."
            guardrail: "Every significant claim needs supporting evidence, no fabrication; never invent facts/files/APIs/users/executions/test results/approvals -- state uncertainty and clarify/escalate instead of guessing; every task carries a confidence score with a defined action band."
            input: "A claim, decision, or completion statement requiring evidence backing."
            output: "Confidence score with action band: 98-100% auto-proceed (low-risk only), 95-97% self-review required, 90-94% peer review required, below 90% escalation required. Confidence never replaces verification for critical tasks."
            sources: ["01:Guardrail 7 -- Evidence", "01:Guardrail 8 -- Hallucination Prevention", "01:Guardrail 9 -- Confidence", "01:Hallucination Prevention Framework"]
          - id: D12.B3.S2
            requirement: "10-11. Risk Classification / Human Override guardrails."
            guardrail: "Every task classified Low/Medium/High/Critical, driving review requirements/approval authority/escalation level/audit depth. Human decisions always override AI along the Owner->Super Boss->COO->AI Agents chain -- AI cannot overrule human-approved governance decisions, ever, regardless of confidence score."
            sources: ["01:Guardrail 10 -- Risk Classification", "01:Guardrail 11 -- Human Override"]
          - id: D12.B3.S3
            requirement: "12-15. Prompt Integrity / Tool Usage / Model Selection / Coding guardrails."
            guardrail: "Agents may not remove mandatory instructions, ignore governance, modify system prompts, bypass safety rules, or rewrite constitutional documents; tool use requires pre-verification of availability/permissions/expected output/failure handling/timeout; model routing must follow D3's allocation policy -- agents must not substitute models without authorization; code generation requires pre-validation and post-generation checks, no production deploy without approvals."
            sources: ["01:Guardrail 12 -- Prompt Integrity", "01:Guardrail 13 -- Tool Usage", "01:Guardrail 14 -- Model Selection", "01:Guardrail 15 -- Coding"]
          - id: D12.B3.S4
            requirement: "16-17. Security / Privacy guardrails."
            guardrail: "Never expose passwords/API keys/tokens/secrets/certificates/private keys/internal credentials in any output (mask in logs/reports); never disclose customer/employee/financial/personal data without authorization."
            sources: ["01:Guardrail 16 -- Security", "01:Guardrail 17 -- Privacy"]
          - id: D12.B3.S5
            requirement: "18-20. Audit / Monitoring / Loop Prevention guardrails."
            guardrail: "Nothing executes without an audit trail -- every action produces Timestamp/Agent ID/Model/Inputs/Outputs/Decisions/Escalations/Approvals/Evidence/Logs (see D15); every task continuously monitored (see D14); loop prevention trips a circuit breaker at threshold on infinite recursion/circular delegation/duplicate execution/repeated retries/deadlocks/task storms (see D14)."
            sources: ["01:Guardrail 18 -- Audit", "01:Guardrail 19 -- Monitoring", "01:Guardrail 20 -- Loop Prevention"]
      - id: D12.B4
        name: "Post-execution guardrails (21-29)"
        sub_branches:
          - id: D12.B4.S1
            requirement: "21-22. Quality Assurance / Handover guardrails."
            guardrail: "Before completion, verify business objective met/output complete/acceptance criteria satisfied/validation passed/reviews completed. No task transfers without current status/completed+pending work/known risks/required actions/evidence/validation results/acceptance checklist, and the receiving agent must explicitly acknowledge acceptance (see D17)."
            sources: ["01:Guardrail 21 -- Quality Assurance", "01:Guardrail 22 -- Handover"]
          - id: D12.B4.S2
            requirement: "23-25. Reporting / Continuous Improvement / Governance Compliance guardrails."
            guardrail: "Every completed task generates a completion report + performance metrics + failure analysis + improvement recommendations + lessons learned; no task fully closed until improvement opportunities captured/reusable knowledge extracted/enhancements proposed/documentation updated/reviewer approval recorded (see D16); before closure, verify SOP/Policy/Guardrail/Escalation-rule compliance, audit completed, documentation updated."
            sources: ["01:Guardrail 23 -- Reporting", "01:Guardrail 24 -- Continuous Improvement", "01:Guardrail 25 -- Governance Compliance"]
          - id: D12.B4.S3
            requirement: "26-27. Self-Evaluation / Peer Review guardrails."
            guardrail: "Every agent completes a mandatory structured self-assessment after each task (objective achieved? instructions sufficient? cause of delays? what changes next time? can this be automated?); a designated reviewer independently evaluates technical correctness/policy compliance/output quality/evidence quality, comments become part of the permanent record."
            sources: ["01:Guardrail 26 -- Self-Evaluation", "01:Guardrail 27 -- Peer Review"]
          - id: D12.B4.S4
            requirement: "28-29. Knowledge Evolution / Failure Containment guardrails."
            guardrail: "Approved improvements are version-controlled (previous/new version, reason, expected benefit, approver, effective date, rollback procedure) -- no instruction/prompt/SOP/workflow modified without traceability; on failure, stop propagation, preserve logs/evidence, notify the right escalation level, root-cause, recommend corrective+preventive action."
            sources: ["01:Guardrail 28 -- Knowledge Evolution", "01:Guardrail 29 -- Failure Containment"]

  - id: D13
    name: "Guardrail Framework -- Per-Task / Per-Selection Layer"
    branches:
      - id: D13.B1
        name: "Predefined, backend-injected validation keyed to Mode Pill/Chain selection"
        sub_branches:
          - id: D13.B1.S1
            requirement: "For every Mode Pill/Chain selection, distinct predefined Input/Process/Output/Logic validation rules apply. This is D5's chain framework supplying the SCOPE KEY that D12.B2.S5 (Instruction Validation Guardrail)'s per-task check is applied against -- an implementation detail of the constitutional guardrail, not a separate guardrail system."
            input: "The current Mode Pill/Chain selection (D5) plus the task's declared Input/Process/Output field values (D4.B1)."
            guardrail: "Validation rules are injected server-side (backend), not left to AI improvisation -- the AI does not author its own validation logic per request."
            output: "Either a pass, or a preloaded/predefined (not generated), polite violation message stating what was violated and what action to take."
            sources: ["08:Topic 2 -- Per-task Guardrails (Input / Process / Output / Assumption / Logic validation)"]
          - id: D13.B1.S2
            requirement: "Assumption validation."
            guardrail: "Before AI makes any input/output/process assumption, it must validate that assumption with the user via chat, with logic scoped to the current Mode Pill/Chain selection -- assumptions are never silently made."
            sources: ["08:Topic 2 -- Per-task Guardrails (Input / Process / Output / Assumption / Logic validation)"]
          - id: D13.B1.S3
            requirement: "Validation-failure handling."
            input: "Any validation failure (input/process/output/logic/assumption) from D13.B1.S1/S2."
            output: "A learning-loop entry scoped to that selection's guardrails (feeds D16). Objective throughout: lower token usage, maximize deterministic software over AI."
            sources: ["08:Topic 2 -- Per-task Guardrails (Input / Process / Output / Assumption / Logic validation)"]

  - id: D14
    name: "Monitoring (multi-scope)"
    branches:
      - id: D14.B1
        name: "Task-level monitoring dimensions"
        sub_branches:
          - id: D14.B1.S1
            requirement: "Every task monitored for: Execution Time, Retries, Failures, Token Usage, Reasoning Quality, Hallucination Risk, Loop Risk, Dependency Health, Tool Health, Instruction Compliance, Policy Compliance, Security Compliance, Performance Score."
            sources: ["01:Mandatory Monitoring"]
      - id: D14.B2
        name: "Chain-scoped monitoring"
        sub_branches:
          - id: D14.B2.S1
            requirement: "Every Dynamic Chain contains predefined monitoring rules; GPT-OSS-120B Monitoring Agents continuously verify Task Progress/Missing Inputs/Missing Outputs/Loop Detection/Hallucination Detection/Policy Violations/SLA Violations/Workflow Deviations/Failure Prediction/Resource Utilization, until formal closure. Same dimensions as D14.B1, applied per-chain rather than globally."
            sources: ["03:13. Monitoring"]
      - id: D14.B3
        name: "Organization-scoped continuous monitoring"
        sub_branches:
          - id: D14.B3.S1
            requirement: "Lightweight 'control room' monitoring agents run as-needed watching Hallucinations/False completion/Infinite loops/Stuck workflows/Long-running tasks/Missing docs/Missing tests/Security violations/Failed handovers/SLA breaches, distinct from D15's audit cadence (this is continuous, not scheduled)."
            sources: ["02:Level 2 -- Continuous AI Monitoring, detail"]
      - id: D14.B4
        name: "Infinite loop prevention mechanics"
        sub_branches:
          - id: D14.B4.S1
            requirement: "Every workflow includes: max execution depth, max retry count, max recursive delegation count, max elapsed execution time, duplicate task detection, circular dependency detection, deadlock detection, automatic circuit breaker, escalation after threshold breach. Monitoring agent terminates loops, records root cause, initiates corrective actions before similar tasks re-execute."
            sources: ["01:Infinite Loop Prevention", "01:Guardrail 20 -- Loop Prevention"]

  - id: D15
    name: "Audit & Review Governance"
    branches:
      - id: D15.B1
        name: "7-level audit cadence (L1-L7)"
        sub_branches:
          - id: D15.B1.S1
            requirement: "L1 Real-Time Audit -- the mandatory completion gate."
            input: "A task/change event where confidence score (D4.B1.S4) is below 95%, and/or any process or code change, regardless of confidence."
            guardrail: "No completed task bypasses this gate -- there is no confidence threshold or task type exempt from it once triggered."
            output: "Sequential gate: Task Created -> Requirements Verified -> Engineering Audit -> Functional Audit -> Knowledge Audit -> Governance Audit -> Completion Certificate -> Closed. Any stage failure blocks progression to the next."
            sources: ["02:Level 1 -- Continuous Task Audit (Mandatory), detail"]
          - id: D15.B1.S2
            requirement: "L2 Continuous Monitoring -- see D14.B3 (this cadence level and that monitoring branch are the same mechanism, not two)."
            sources: ["02:Level 2 -- Continuous AI Monitoring, detail"]
          - id: D15.B1.S3
            requirement: "L3 Rolling Health Audit (~30-60 min): examines the whole organization for patterns -- which agent/prompt/department/workflow/report/coding-task-type is failing repeatedly."
            sources: ["02:Level 3 -- Rolling Health Audit (Every 30-60 Minutes), detail"]
          - id: D15.B1.S4
            requirement: "L4 Executive Audit Review (every 3 hours): Claude reviews open critical issues/escalations/productivity/model utilization/audit findings/hallucination trends/cost/queue health/agent performance/improvement proposals, and can reassign/escalate/pause/approve/investigate. Same cadence as D1's Three-Hour Governance Cycle (01) -- these are the same review, described from the audit-organization side (02) and the constitution side (01) respectively."
            sources: ["02:Level 4 -- Executive Audit Review (Every 3 Hours), detail", "01:Three-Hour Governance Cycle"]
          - id: D15.B1.S5
            requirement: "L5 Daily Governance Review (strategic: did we improve today, which SOPs/prompts need revision, what caused failures, KPI trend); L6 Weekly Executive Review (org-level: architecture/security posture/tech debt/cost/capacity/agent lifecycle/roadmap -- prose says weekly, table says daily, a known source inconsistency); L7 Monthly Organizational Audit ('Board Meeting': progress toward 99% goal, governance effectiveness, workload distribution, escalation trend, cost, knowledge base, department restructuring -- prose says monthly, table says daily, same known inconsistency)."
            sources: ["02:Level 5 -- Daily Governance Review, detail", "02:Level 6 -- Weekly Executive Review, detail", "02:Level 7 -- Monthly Organizational Audit, detail", "02:Audit Cadence Table -- 7 levels (summary row-by-row)"]
          - id: D15.B1.S6
            requirement: "Rationale for continuous-plus-periodic over daily-only: daily audit suits traditional ERP systems, not an AI-native OS where agents decide continuously; the model (continuous audit + scheduled executive reviews) is explicitly analogized to how modern cloud platforms, cybersecurity systems, and financial exchanges operate."
            sources: ["02:Universal Task Lifecycle -- audit cadence framing"]
      - id: D15.B2
        name: "Event-based audit triggers (not schedule-only)"
        sub_branches:
          - id: D15.B2.S1
            requirement: "Audits trigger automatically on events, not only on schedule: Code Changed->Engineering Audit, Feature Completed->Functional Audit, Report Generated->Report Audit, Knowledge Updated->Knowledge Audit, SOP Changed->Governance Audit, Revenue Posted->Revenue Audit, AI Escalation->Decision Audit, Customer Complaint->Root Cause Audit, Deployment->Release Audit, New Prompt->Prompt Audit."
            sources: ["02:Continuous Audit Triggers"]
      - id: D15.B3
        name: "Re-audit conditions and 'never permanently complete' principle"
        sub_branches:
          - id: D15.B3.S1
            requirement: "A task is re-audited whenever: code changes after approval, requirements change, a production bug/security issue is reported, a customer reports incorrect behavior, a report produces wrong numbers, a prompt is modified, a new model version is deployed. Constitutional rule: no task is EVER permanently complete -- every completed task remains eligible for re-audit if new evidence/changed requirements/incidents/architecture/governance changes suggest the original approval may no longer be valid."
            sources: ["02:Event-Based Re-Audit", "02:Closing recommendation -- 'no task ever permanently complete'"]
      - id: D15.B4
        name: "Object-scoped review governance (applied to Work Objects)"
        duplication_resolved: "05's 'Review Governance' (§10) names 9 review types nearly identical to 02's cross-references (Individual/Team/Functional/Technical/Management/Executive/Compliance/Audit Review) but frames them as applying to the general Work Object, not specifically to code/tasks as 02 does. Kept as a distinct sub-branch since it's the object-level application, cross-referenced to D15.B1/D2.B4 as the org apparatus that performs these reviews."
        sub_branches:
          - id: D15.B4.S1
            requirement: "Every significant Work Object passes through governed review stages as applicable (Individual/Team/Functional/Technical/Cross-functional/Management/Executive/AI/Audit Review); each review records Reviewer/Decision/Observations/Required changes/Approval status/Timestamp. Executed by the D2.B4 audit organization."
            sources: ["05:10. Review Governance"]
      - id: D15.B5
        name: "Chain-scoped audit (applied to Dynamic Chains)"
        sub_branches:
          - id: D15.B5.S1
            requirement: "Every completed task is independently verified for: Correct Chain, Correct Workflow, Correct Software, Correct AI Behaviour, Correct Outputs, Correct Documentation, Correct Evidence, Correct Reports, Correct Learning, Correct Governance. Results become organizational knowledge (feeds D16). This is D15.B1's L1 gate applied with the Dynamic Chain as the reference object."
            sources: ["03:14. Audit"]
      - id: D15.B6
        name: "Peer validation stage (constitutional lifecycle placement)"
        sub_branches:
          - id: D15.B6.S1
            requirement: "'Peer Validation' is an explicit, non-skippable stage in the Universal Task Lifecycle (D4.B2) -- performed by the L1/L2 escalation-chain agents (D2.B1), distinct from but feeding into the independent CAO audit apparatus (D2.B4/D15.B1-B3)."
            sources: ["01:Universal Task Lifecycle (18 stages)"]
      - id: D15.B7
        name: "Approval governance (defining approval authority itself)"
        sub_branches:
          - id: D15.B7.S1
            requirement: "Every approval defines: Approval authority, Delegation rules, Escalation rules, Time limits, Reminder frequency, Auto-escalation policy, Approval history. VERI continuously monitors pending approvals and sends reminders per org policy. Distinct from D9 (the UX/option-set for presenting an approval) -- this is the underlying authority/policy model an approval instance is defined against."
            sources: ["05:11. Approval Governance"]

  - id: D16
    name: "Continuous Improvement & Knowledge Evolution"
    branches:
      - id: D16.B1
        name: "CANONICAL improvement cycle (merges 4 near-identical statements)"
        duplication_resolved: "This is the single largest duplication cluster in the corpus. 01 states the update-target list three times (Continuous Learning Policy, AI Agent Task Directory / Improvement Framework template, Self-Evolving AI Organization) plus Guardrail 24/28; 02 states essentially the same cycle as 'Continuous Improvement Loop'; 03 §16 restates it again nearly verbatim; 05 §16 restates it again. All four/five statements name the same update targets (Knowledge, Prompts/Prompt Libraries, SOPs, Templates, Automation Rules, Workflow Definitions/Logic, Guardrails, Business Rules) and the same principle ('nothing learned should be lost' / 'nothing should be learned twice'). Consolidated into ONE canonical cycle below; 02's version is kept as the fullest sequential statement (it alone names the explicit flow order) and adopted as canonical, with the others as corroborating sources, not separate requirements."
        sub_branches:
          - id: D16.B1.S1
            requirement: "Canonical cycle: Task/Work Object Completed -> Audited -> Approved -> Lessons Learned -> Knowledge Updated -> Prompt Updated -> Workflow Updated -> Guardrails Updated -> SOP Updated -> Future Tasks Improve. Every completed unit updates: Knowledge Base, Dynamic Chains, Templates, SOPs, Prompt Libraries, Automation Rules, Workflow Definitions, Business Rules, Guardrails, Lessons Learned. Principle: nothing learned should be lost / nothing learned twice. Every improvement becomes available to future tasks only after approval (version-controlled per Guardrail 28: previous version/new version/reason/benefit/approver/date/rollback)."
            sources: ["02:Continuous Improvement Loop", "01:Continuous Learning Policy", "01:Self-Evolving AI Organization", "01:Guardrail 24 -- Continuous Improvement", "01:Guardrail 28 -- Knowledge Evolution", "03:16. Continuous Improvement", "05:16. Continuous Learning"]
      - id: D16.B2
        name: "Loop Engineering (the reflective-question mechanism)"
        sub_branches:
          - id: D16.B2.S1
            requirement: "Every completed task automatically enters Loop Engineering, requiring the AI to answer: what succeeded/failed and why; can this become faster/cheaper; can hallucinations/retries reduce; can instructions/templates/automation/delegation/validation/prompts improve; should escalation occur earlier/later; should another AI do this; should this become reusable. Every answer becomes structured knowledge feeding D16.B1."
            sources: ["01:Loop Engineering Framework"]
      - id: D16.B3
        name: "Improvement reporting artifact"
        sub_branches:
          - id: D16.B3.S1
            requirement: "Every completed task generates an Improvement Report (fixed template: Task/Outcome/Root Cause/Performance/Failure Analysis/Success Analysis/Instruction-Prompt-Workflow-Guardrail-Validation Improvements/Knowledge Updates/Automation Opportunities/Risk Reduction/Confidence/Reviewer Approval) -- no task closes until this report exists. This is the artifact D16.B1's cycle produces at each task boundary."
            sources: ["01:AI Improvement Framework"]
      - id: D16.B4
        name: "AI Agent Task Directory (per-agent learning record)"
        sub_branches:
          - id: D16.B4.S1
            requirement: "Every AI Agent owns a permanent directory tracking per task type: Agent, Task, Version, Average Success, Average Time, Failures, Common Errors, Improvement Suggestions, Latest Prompt Version, Validation Rules, Loop Engineering Status -- continuously evolving. Governed by the COO (D2.B3.S3)."
            sources: ["01:AI Agent Task Directory", "01:DeepSeek -- Responsibility 12: AI Task Directory Governance"]

  - id: D17
    name: "AI Handover Protocol"
    branches:
      - id: D17.B1
        name: "Mandatory structured handover"
        duplication_resolved: "01's dedicated 'Mandatory AI Handover Protocol' section and its own 'Handover Guardrail' (22) state the identical rule twice within the same source document -- merged to one branch."
        sub_branches:
          - id: D17.B1.S1
            requirement: "Mandatory structured handover -- no AI Agent may simply say 'Done'."
            input: "A task at completion, or at any ownership-transfer point in its lifecycle (D4.B2)."
            output: "Task Status, Output Produced, Validation Passed, Known Risks, Pending Items, Confidence, Next Responsible AI, Required Action, Escalation Required (yes/no) -- all nine fields required, none optional."
            guardrail: "Ownership transfers only after the receiving agent explicitly acknowledges acceptance -- a handover sent but not acknowledged does not transfer ownership."
            sources: ["01:Mandatory AI Handover Protocol", "01:Guardrail 22 -- Handover"]

  - id: D18
    name: "Hallucination & Evidence Discipline"
    branches:
      - id: D18.B1
        name: "Verification requirements for critical tasks"
        duplication_resolved: "01's 'Hallucination Prevention Framework' section and Guardrails 7-9 state the same discipline from two angles (process checklist vs. per-guardrail rule) -- merged, cross-referenced to D12.B3.S1 which already carries the guardrail text in full."
        sub_branches:
          - id: D18.B1.S1
            requirement: "Every critical task undergoes: input completeness validation, policy/instruction validation, retrieval/source validation where applicable, self-review against success criteria, independent peer review for medium/high risk, escalation if confidence is low or evidence insufficient. No model is assumed infallible. See D12.B3.S1 for the guardrail-level statement of Evidence/Hallucination/Confidence."
            sources: ["01:Hallucination Prevention Framework"]

  - id: D19
    name: "Reporting Framework"
    branches:
      - id: D19.B1
        name: "Universal reporting cadence and content"
        sub_branches:
          - id: D19.B1.S1
            requirement: "Every AI model follows identical reporting cadence (Daily, Hourly, Per Task, Weekly, Monthly, Quarterly, Annual); each report contains Performance, Quality, Failures, Escalations, Token Usage, Learning, Knowledge Updates, Recommendations, Risk Trends. Distinct from D2.B4.S1's CAO Executive Reporting (audience: Claude specifically, content: Audit Findings/Critical Risks/Escalations/Repeat Failures/Process Improvements/Fraud Indicators/Hallucination Trends) -- the two are complementary reporting streams (operational vs. assurance), not duplicates."
            sources: ["01:Universal Reporting Framework", "01:Guardrail 23 -- Reporting"]

  - id: D20
    name: "Customer/Business Task Governance"
    branches:
      - id: D20.B1
        name: "Cross-reference only"
        duplication_resolved: "Fully merged into D4.B6 -- kept as a named domain per the source's own section heading, but not a separate requirement set."
        sub_branches:
          - id: D20.B1.S1
            requirement: "See D4.B6 -- customer actions follow the identical Task/Work Object lifecycle."
            sources: ["01:Customer Task Governance"]

  - id: D21
    name: "Intelligent Work Detection & Source Intelligence"
    branches:
      - id: D21.B1
        name: "General detection principle"
        sub_branches:
          - id: D21.B1.S1
            requirement: "VERI automatically detects actionable work from structured/unstructured sources (MoM, transcripts, emails, uploaded docs/PDFs/Word/Excel/Presentations, OCR images, VERI Chat, voice transcripts, API payloads, customer tickets, external integrations), identifying Action items/Decisions/Responsibilities/Deadlines/Risks/Follow-ups/Dependencies/Approvals/Deliverables, then prepares PROPOSED Work Objects. No object is created without user approval unless policy-authorized."
            sources: ["05:5. Intelligent Work Creation"]
      - id: D21.B2
        name: "Minutes of Meeting intelligence"
        sub_branches:
          - id: D21.B2.S1
            requirement: "On MoM upload/generation: read fully, identify attendees/decisions/action items/owners/due dates, detect unresolved issues/risks/follow-up meetings/dependencies, prepare a proposed Action Register for user review/edit/approval -- only approved items become Work Objects."
            sources: ["05:7. Minutes of Meeting Intelligence"]
      - id: D21.B3
        name: "Document intelligence (uploaded files)"
        sub_branches:
          - id: D21.B3.S1
            requirement: "On file upload (by user/agent/API/external system): read, classify using the Dynamic Chain (D5), extract business info, identify actionable items, generate summaries, identify approvals required, recommend workflows/reports, create proposed tasks, link related Work Objects. User approves/edits/rejects/shares before execution."
            sources: ["05:8. Document Intelligence"]
      - id: D21.B4
        name: "Email intelligence -- detection half (structural fix, round 2)"
        duplication_resolved: "ROUND 2 STRUCTURAL FIX: Email Intelligence (05 §9) was originally filed entirely under D10 (Communication Governance), inconsistent with its two sibling sections MoM Intelligence (§7, D21.B2) and Document Intelligence (§8, D21.B3), which sit in D21 because they are the same 'read a source, propose Work Objects' pattern. Email Intelligence's DETECTION half (understand context, identify commitments/follow-ups/approvals/deadlines) belongs here in D21 alongside MoM/Document; its SEND/DRAFT half (prepare responses, draft replies, recommend recipients) remains in D10.B3 since that is a communication-governance concern, not a work-detection one. Both halves cross-reference each other."
        sub_branches:
          - id: D21.B4.S1
            requirement: "For received email: VERI understands context, identifies commitments, detects follow-up actions/approvals/deadlines -- same detect-then-propose pattern as D21.B2 (MoM) and D21.B3 (Documents), applied to email as the source type. See D10.B3 for the outbound/send-side half of Email Intelligence (drafting and sending replies)."
            input: "An incoming email (subject, body, sender, thread context)."
            output: "Identified commitments/follow-ups/approvals/deadlines, feeding into a proposed Work Object (D4) subject to user approval (D9)."
            sources: ["05:9. Email Intelligence"]
      - id: D21.B5
        name: "Consumer relationship to the Connector layer"
        sub_branches:
          - id: D21.B5.S1
            requirement: "D21's Document/Email Intelligence is the CONSUMER of whatever the Universal Connector layer (D26) normalizes and surfaces -- cross-referenced, not duplicated, since D26 defines how a file/table/document/presentation/communication reaches VERI in the first place, while D21 defines what VERI does once it has it."
            sources: ["05:8. Document Intelligence", "06:Universal Connector Architecture"]

  - id: D22
    name: "Follow-up, SLA & Continuous Planning"
    branches:
      - id: D22.B1
        name: "Intelligent follow-up monitoring"
        sub_branches:
          - id: D22.B1.S1
            requirement: "VERI continuously monitors Pending tasks/approvals, Missed timelines, SLA breaches, Blocked/Delegated tasks, Waiting dependencies, Inactive Work Objects, and recommends Reminders/Escalations/Reassignment/Extensions/Closure/Cancellation -- user approval obtained where required."
            sources: ["05:12. Intelligent Follow-up"]
      - id: D22.B2
        name: "Continuous re-planning"
        sub_branches:
          - id: D22.B2.S1
            requirement: "VERI continuously reprioritizes work based on Deadlines/Business priorities/Dependencies/Resource availability/Org objectives/User preferences/Risk/SLA, and recommends revised execution plans whenever conditions change."
            sources: ["05:15. Continuous Planning"]

  - id: D23
    name: "Universal Dashboard"
    branches:
      - id: D23.B1
        name: "Live work dashboard"
        sub_branches:
          - id: D23.B1.S1
            requirement: "VERI maintains a live, real-time-updating Work Dashboard presenting: To Do, Pending, Work In Progress, Reviews, Approvals, Blocked, Delegated, Completed, Achieved, Overdue, Upcoming Deadlines, Recently Completed, High Priority, Critical Risks, Escalations."
            sources: ["05:14. Universal Dashboard"]

  - id: D24
    name: "Response Engine & Predefined Short Responses"
    branches:
      - id: D24.B1
        name: "Short, predefined, polite chat responses"
        sub_branches:
          - id: D24.B1.S1
            requirement: "Chat responses (AI or software) must be short and precise -- max 4 words plus any specific requirement/observation appended, no long sentences, exception only for research/analysis answers. A Response Engine with predefined polite short responses (Yes/No/OK/Pending/Completed/Need Clarity/Require Input/Wrong Data/Incomplete Instructions, etc.) is required -- most responses should already be predefined, not generated. Software (without AI) should SUGGEST the response; AI's role is to evaluate/confirm/select it. Design goal: 'so that even a lower model AI can do the job with higher confidence.'"
            sources: ["08:Topic 4 continued -- Response Engine (the one genuinely new, concrete idea in this document)"]
          - id: D24.B1.S2
            requirement: "Relationship to D9's quick-approval options: both are instances of the same UX principle (minimize chat friction via predefined short options) but serve different scopes -- D9's quick options are approval-decision-specific; D24's Response Engine is the general-purpose chat short-response mechanism. Related, not duplicate."
            sources: ["08:Topic 4 continued -- Response Engine (the one genuinely new, concrete idea in this document)", "04:Simplified Approval Experience"]
          - id: D24.B1.S3
            requirement: "Relationship to D13's predefined violation messages (found independently in this round's fresh dedup pass, not by Round 1's audit): both are instances of 'use predefined/canned text instead of generating fresh text' -- D13's predefined text is specifically a guardrail-violation explanation (why + what to do), scoped per Mode Pill/Chain selection; D24's Response Engine is the general-purpose short-answer mechanism for ordinary chat turns. Related, not duplicate -- a shared underlying mechanism (a text library keyed by situation) could plausibly serve both, but the source material treats them as two requirements, not one."
            sources: ["08:Topic 4 continued -- Response Engine (the one genuinely new, concrete idea in this document)", "08:Topic 2 -- Per-task Guardrails (Input / Process / Output / Assumption / Logic validation)"]

  - id: D25
    name: "Task Automation, Predefined Calculators/Processes/Reports"
    branches:
      - id: D25.B1
        name: "Software-first automation and task tracking"
        sub_branches:
          - id: D25.B1.S1
            requirement: "Software (without AI) tracks completed vs. pending tasks; keeps pushing incomplete software-handled tasks toward completion; regular/recurring AI-assisted tasks should be evaluated for conversion to software automation rather than remaining AI-dependent. Software should be able to send AI a single batched ping about ALL tasks together (token-efficient), and must be able to multi-task for a user without AI, driven by the Dynamic Chain selection (D5). All of D25 is the concrete instantiation of D3.B2's 'software executes first, AI only where software cannot' principle -- found independently in this round's fresh dedup pass, not flagged by Round 1's audit -- applied specifically to calculators/processes/reports/task-tracking."
            sources: ["08:Topic 2 continued -- Task Automation, Task Lists, Hallucination Prevention, Software-first, Calculators"]
      - id: D25.B2
        name: "Predefined calculators"
        sub_branches:
          - id: D25.B2.S1
            requirement: "Predefined calculators exist in software for all calculations -- no AI needed. Whenever new functionality/features are added, a corresponding calculator must be created and linked into the Mode Pill/Chain Options (D5)."
            sources: ["08:Topic 2 continued -- Task Automation, Task Lists, Hallucination Prevention, Software-first, Calculators"]
      - id: D25.B3
        name: "Predefined processes"
        sub_branches:
          - id: D25.B3.S1
            requirement: "Predefined processes exist in software to run all processes without AI. New functionality/features must have a corresponding process created and linked into the Mode Pill/Chain Options."
            sources: ["08:Topic 3 -- Predefined Processes"]
      - id: D25.B4
        name: "Predefined reports"
        sub_branches:
          - id: D25.B4.S1
            requirement: "All predefined report types must be viewable/downloadable (PDF/Excel/Word/email) without AI, most already exist; selecting the relevant Mode Pill/Chain option surfaces the report URL directly on the main screen. New reports must be created and linked into the Mode Pill/Chain Options."
            sources: ["08:Topic 4 -- Predefined Reports"]
      - id: D25.B5
        name: "Given-task tracking and modification"
        sub_branches:
          - id: D25.B5.S1
            requirement: "User-given tasks are clickable, user can communicate with AI about a specific task and modify it; software (not AI) tracks their status."
            sources: ["08:Topic 4 -- Predefined Reports"]

  - id: D26
    name: "Universal Connector Architecture / VERIDIAN Universal Workspace"
    branches:
      - id: D26.B1
        name: "Four integration layers"
        sub_branches:
          - id: D26.B1.S1
            requirement: "Layer 1 Cloud APIs (Microsoft Graph + Google Workspace APIs, the backbone): Excel/Word/PPT/Outlook/Teams/OneDrive/SharePoint/Calendar + Docs/Sheets/Slides/Gmail/Drive/Meet/Calendar, OAuth-based, persistent connection."
            sources: ["06:Layer 1 -- Cloud APIs (Microsoft Graph + Google Workspace APIs), 'the backbone'"]
          - id: D26.B1.S2
            requirement: "Layer 2 Office Add-ins: ONE single add-in (not per-app), runs inside Excel/Word/PowerPoint/Outlook, ribbon button 'VERIDIAN' with actions Click/Analyze/Review/Compliance/Sync/Ask AI."
            sources: ["06:Layer 2 -- Office Add-ins"]
          - id: D26.B1.S3
            requirement: "Layer 3 Browser Extensions (Chrome/Edge/Firefox): must work on M365 Online, Google Workspace, Web ERP, Bank portals, GST portal, Government sites, Vendor portals -- same panel experience as the Office add-in."
            sources: ["06:Layer 3 -- Browser Extensions"]
          - id: D26.B1.S4
            requirement: "Layer 4 Desktop Companion: for offline/desktop-only Office installs (2019/2021) -- a lightweight agent watches files, syncs changes, sends events, indexes documents."
            sources: ["06:Layer 4 -- Desktop Companion"]
          - id: D26.B1.S5
            requirement: "Usability bar for the whole connector layer: must be simple enough that a non-technical user can connect a source in one click. Applies across all 4 layers (D26.B1.S1-S4), not just one -- a technically-correct OAuth flow that takes a non-technical user multiple steps/screens does not satisfy this requirement."
            sources: ["06:Preamble / operating instructions"]
      - id: D26.B2
        name: "Google Workspace app-specific behavior"
        sub_branches:
          - id: D26.B2.S1
            requirement: "Sheets: understand business category (Sales/Inventory/Payroll/GST/Forecast/Margins), create Workflow/Approvals/Alerts/ERP updates from that understanding. Docs: extract Policies/Responsibilities/Approval/Effective Date/Department/Compliance from documents like HR policies, create Knowledge/Tasks/Reviews/Version History. Slides: supply KPIs/Graphs/Forecasts/Risks for AI-formatted board presentations. Gmail: read metadata (permission-subject), identify type (Invoice/Complaint/PO/Legal Notice/Escalation), create a workflow. Drive: every document becomes a 'VERIDIAN Asset' storing Owner/Department/Projects/Risks/Approvals/Knowledge Links/AI Summary/Business Entities."
            sources: ["06:Google Workspace Support -- Google Sheets", "06:Google Workspace Support -- Google Docs", "06:Google Workspace Support -- Google Slides", "06:Google Workspace Support -- Gmail", "06:Google Workspace Support -- Google Drive"]
      - id: D26.B3
        name: "Universal Connector normalization layer"
        sub_branches:
          - id: D26.B3.S1
            requirement: "Do NOT write per-vendor connectors -- build one Universal Connector Layer."
            input: "A source file/data object from any connected ecosystem (D26.B1/B6), in its original vendor format."
            guardrail: "VERIDIAN never cares about the original file format, only the normalized Business Object type -- no downstream code may branch on 'is this Excel or Google Sheets.'"
            output: "One of four normalized Business Object types: 'Table' (Excel/Sheet/CSV/ERP-Table), 'Document' (Word/Doc/PDF/Markdown/Email), 'Presentation' (PowerPoint/Slides/Canva), 'Communication' (Outlook/Gmail/IMAP/Teams/Slack) -- consumed downstream by D21 (Document/Email Intelligence)."
            sources: ["06:Universal Connector Architecture"]
      - id: D26.B4
        name: "Business Digital Twin"
        sub_branches:
          - id: D26.B4.S1
            requirement: "Every document receives a Digital Twin: Document ID, Department, Financial Year, Business Objects, Linked Projects, Approvals, Risk, Compliance, Workflow, AI History, Discussion, Related Emails, Meeting References, Users, Permissions, Knowledge Graph -- the document becomes a living business object, not just a file."
            sources: ["06:Business Digital Twin"]
      - id: D26.B5
        name: "AI routing across connected sources"
        sub_branches:
          - id: D26.B5.S1
            requirement: "Routing is fully automatic: Excel -> Microsoft AI; Google Sheet -> Gemini/Google Workspace AI; PDF -> OCR Worker -> Knowledge Worker -> Compliance Worker (chained pipeline)."
            sources: ["06:AI Routing Engine"]
      - id: D26.B6
        name: "Roadmap and vision"
        sub_branches:
          - id: D26.B6.S1
            requirement: "Roadmap ecosystems targeted: M365, Google Workspace, LibreOffice, ODF, PDF, CSV, Tally, ERPNext, SAP, Oracle, Zoho Office, Dropbox, Box, OneDrive, SharePoint, Drive, Slack, Teams, Notion, Confluence, GitHub, Email(IMAP/SMTP). Vision: 'VERIDIAN Universal Workspace (VUW)' -- connect every document/spreadsheet/presentation/email/meeting/knowledge source into a unified Business Digital Twin, vendor-neutral so VERIDIAN benefits automatically as Microsoft/Google improve their own AI. Connections persist for the user once established."
            sources: ["06:Future Connectors -- ecosystem support roadmap table (all marked checked in the source)", "06:The Vision -- VERIDIAN Universal Workspace (VUW)"]

  - id: D27
    name: "User Registration, Licensing & Adoption Dashboard"
    branches:
      - id: D27.B1
        name: "Registration, licensing, and misuse controls"
        sub_branches:
          - id: D27.B1.S1
            requirement: "Org-level user registration management; a defined org-account-opening process; license management (assign/revoke/track); active-user-count enforcement per license; misuse control -- one license = max 2 concurrent sessions (1 laptop + 1 mobile) per user email, EXCEPT for VERIDIAN's own internal use/testing."
            sources: ["07:Requirement 1 -- User Registration Management", "07:Requirement 2 -- Organization Account Opening Management", "07:Requirement 3 -- License Management", "07:Requirement 4 -- Number of Users Management", "07:Requirement 5 -- Misuse Management"]
      - id: D27.B2
        name: "Adoption dashboard"
        sub_branches:
          - id: D27.B2.S1
            requirement: "Two dashboard views (individual user + Org Master Admin/CEO), visually engaging, showing per-user fields (Name/Email/Activation status/dates) plus org metrics: Adoption %, AI Adoption %, Meetings Managed, Tasks Completed, Hours Saved, Reports Generated, AI Conversations, Departments Active, Top Performing Team, Lowest Adoption."
            sources: ["07:Requirement 6 -- Adoption Dashboard"]
      - id: D27.B3
        name: "Onboarding invitation paths (4 distinct)"
        sub_branches:
          - id: D27.B3.S1
            requirement: "Path A: Master Admin sends Secure Invite Link (WhatsApp+email), user clicks and confirms email. Path B: Master Admin adds user email directly, auto-activation + activation email. Path C: user self-registers via a Settings-entered code given by Master Admin. Path D: user self-registers via a peer-provided code."
            sources: ["07:User Onboarding Flows (unlabeled sub-section, describes 4 distinct paths into the system)"]

  - id: D28
    name: "Onboarding & Sign-up UX"
    branches:
      - id: D28.B1
        name: "Positioning and first-run flow"
        sub_branches:
          - id: D28.B1.S1
            requirement: "VERIDIAN is no longer positioned as a compliance tool -- positioning driven by the user's stated requirement, not a fixed compliance-first assumption; replace 'Get Started with VERIDIAN AI' as the opening CTA. Keep the VERI welcome line unchanged ('I am VERI, your assistant, you are my boss...'), then flow into Mode Pills + Chain Selector for the user's roles with NO typing required -- system infers work/profile/gender/age. After profile setup, connectors (e.g. Gmail) should already be connected, not a separate later step."
            sources: ["09:Changes part 1"]
          - id: D28.B1.S2
            requirement: "'Invite a team member' control (minimalist, English, '+' icon) must appear on every screen, upper-right corner. Remove 'Set up AI configuration' from onboarding (relocate to Settings) and remove the 'Upload the document' onboarding step entirely."
            sources: ["09:Changes part 1"]
      - id: D28.B2
        name: "Chat box copy"
        sub_branches:
          - id: D28.B2.S1
            requirement: "Chat box copy: 'I am your Assistant VERI, select a task above to tell me what to do.'"
            sources: ["09:Changes 3"]
      - id: D28.B3
        name: "Sign-up/auth flow"
        sub_branches:
          - id: D28.B3.S1
            requirement: "First-time account creation: 'Sign in with Google' as the FIRST option (target users are mostly Gmail-based small businesses), then email/magic-link as second option. Manual email entry shows 'check your email' (Supabase-auth-confirmed) with click-to-authenticate instructions. Replace password auth with a 4-digit emailed passcode. Sign-up must be very fast and easy."
            sources: ["09:Changes 4"]
      - id: D28.B4
        name: "Adaptive Mode Pills (cross-reference)"
        duplication_resolved: "Fully merged into D5.B7 -- kept as pointer."
        sub_branches:
          - id: D28.B4.S1
            requirement: "See D5.B7 -- Mode Pill/Chain options auto-change per module/function; framed here as a hard onboarding/usability blocker."
            sources: ["09:Changes Part 2"]

