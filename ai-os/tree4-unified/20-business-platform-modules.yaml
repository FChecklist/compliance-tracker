# 4TH TREE (Unified) -- Section 20: Business Platform Modules
#
# These 46 domains are carried forward VERBATIM from Tree 3
# (ai-os/system-tree/50-merged-tree.yaml), unchanged in content, with two
# fields added: `tree1_requirement` (confirms none of the 9 requirement
# documents describe this domain -- see 01-COMPARISON.md Section B) and
# `source` (traceability back to Tree 3).
#
# This is real, built, live platform capability -- ERP, PMS, The Firm,
# Construction/PROJEXA, HR, CRM, GST reconciliation, the GRC suite
# (board/legal/risk/POSH/BCM/whistleblower/sector-regulators/secretarial/
# MCA/ESG/cap-table/CLM), and Facilities/Tickets. It exists independently
# of the AI-governance framework the 9 documents specified, and this tree
# does not force a false requirement-vs-gap narrative onto it.

tree_version: 1
domains:
- id: API-01
  name: Core compliance (8 routes)
  objects:
  - GET,POST /api/compliance -- requireAuthOrApiKey + requireRoleOrScope(member,write) on POST
  - GET,PATCH,DELETE /api/compliance/[id] -- requireAuth
  - POST /api/compliance/[id]/comments
  - GET,POST /api/compliance/[id]/costs
  - POST /api/compliance-costs/[id]/payments
  - POST /api/compliance/import
  - POST /api/compliance/overdue, POST /api/compliance/recur
  - GET /api/compliance/stats
  input: A compliance item (title, type, dueDate, department, assignee, org/client scope) or a batch import
    file.
  output: compliance_items rows; on /overdue and /recur, batch status-transition/recurrence-instance side
    effects.
  rules:
  - compliance is one of the few internal-app domains ALSO exposed at API-key scope (both compliance/route.ts
    and v1/compliance/route.ts exist, independently).
  - recurrenceType drives /recur's batch job -- generates the next instance of a recurring compliance
    obligation.
  guardrails:
  - requireRoleOrScope(member,write) gates creation -- read-only roles cannot POST.
  workflow:
  - Create/import -> assign -> track status -> (if overdue) flagged by /overdue sweep -> comments/costs
    attached -> closed.
  source: system-tree/50-merged-tree.yaml#API-01
  repo: compliance-tracker
  tree1_requirement: none -- not described by any of the 9 requirement documents
- id: API-02
  name: v1/* -- external/API-key surface, 77 routes
  objects:
  - v1/compliance, v1/compliance/[id], v1/compliance/stats
  - v1/tasks, v1/tasks/[id], v1/tasks/[id]/status
  - v1/notices, v1/notices/[id], v1/notices/stats
  - v1/documents, v1/documents/expiring
  - v1/brain/capabilities, v1/brain/entity-relationships (read-only AI-agent introspection)
  - v1/erp/budgets(*), v1/erp/inventory/{issues,ledger,receipts}, v1/erp/procurement/requisitions
  - v1/pms/meetings, v1/pms/time-entries
  - 'v1/construction/* (8 routes: attendance, boq, kpi-definitions, kpi-entries, labour-roster, predictions/[activityId],
    progress, site-diary)'
  - 'v1/projexa/* (47 routes -- the largest single subtree, real-estate/interior-design rebrand of the
    construction domain: floor-plans + rooms/placements/scene, ffe + margin-summary, mood-boards, design-materials,
    change-orders, punch-list, submittals, rfis, schedule/{baselines,gantt,workload}, dashboard, expenses,
    project-budgets, vendors, capability-tree, discuss, assistant, reports/[reportName], ai/*)'
  - v1/openapi.json (public API spec)
  input: Session cookie OR a vk_... API key against the api_keys table.
  output: JSON matching the shapes documented in v1/openapi.json.
  rules:
  - requireAuthOrApiKey() + requireRoleOrScope() on writes -- this is THE external-integrator surface
    (third-party integrations, GPT Actions, MCP).
  - 12 of the 47 v1/projexa/* routes are pure one-line re-export aliases onto v1/construction/*'s already-authenticated
    implementations -- not independently implemented.
  - This is the API surface PROJEXA (the sibling repo) calls via its veridian-client.ts (see 20-projexa.yaml
    GOV cross-reference).
  - This is the API surface PROJEXA (the sibling repo) calls via its veridian-client.ts -- see PRX-06
    for the client-side consumer of this exact route family.
  guardrails:
  - Every write requires requireRoleOrScope -- an API key with read-only scope cannot mutate.
  workflow:
  - External caller authenticates with API key -> calls the versioned endpoint -> gets a documented response
    shape, independent of internal app UI changes.
  source: system-tree/50-merged-tree.yaml#API-02
  repo: compliance-tracker
  tree1_requirement: none -- not described by any of the 9 requirement documents
- id: API-03
  name: erp/* -- accounting/ops ERP, 138 routes
  objects:
  - 'buying/ (20): suppliers + bank-accounts/qualifications/sanction-checks/scorecards/portal-links/tax-withholding,
    purchase-orders + submit/three-way-match, goods-receipts + submit/putaway/landed-costs'
  - 'payroll/ (11): employees/[id]/{income-tax-slab,tax-exemptions}, income-tax-slabs, payslips/[id]/{finalize,tds},
    runs/[id]/{payslips,process}, salary-components, salary-structures, statutory-rules'
  - 'inventory/ (11): abc-classification, cycle-count-lines/[id]/{adjust,count}, cycle-count-plans, issues,
    ledger, receipts, reorder-levels, reorder-suggestions, valuation'
  - 'returns/ (10): purchase/[id]/{approve,credit-note,dispatch,reject}, sales/[id]/{approve,credit-note,receive,reject}'
  - 'contracts/ (9): [id]/{amendments,billing-schedules,generate-from-template,negotiation-rounds,obligations,revenue-schedules}'
  - 'periods/ (7): [id]/{checklist,close,reopen,sign-off}, checklist/[itemId]/complete, generate -- month-end
    close workflow'
  - stock/ (6), procurement/ (6), bank-reconciliation/ (6)
  - 'budgets/ (5): [id], cancel, submit, variance'
  - 'reports/ (4, read-only): balance-sheet, cash-flow, profit-and-loss, trial-balance'
  - parties/[type]/[id]/{addresses,contacts} (4, polymorphic customer/supplier)
  - '24 single/double-route master-data leaves: accounts, companies, cost-centers, currencies, fiscal-years,
    tax-templates, tax-withholding-categories, pricing-rules, subscription-plans, sales-invoices, purchase-invoices,
    sales-credit-notes, purchase-credit-notes, cash-vouchers, e-invoice-logs, exchange-rates, auctions'
  input: Document-type CRUD payloads (invoices, POs, journal entries, payslips) or workflow-action triggers
    (submit/approve/close).
  output: erp_* table rows; status enum transitions (draft -> submitted -> approved -> closed, per document
    type).
  rules:
  - 'Uniform CRUD-plus-submit pattern: collection route (GET list/POST create) + [id] route (GET/PATCH/DELETE)
    + a /submit or workflow-action sub-route that transitions the document''s status enum.'
  - periods/ implements the actual month-end close checklist workflow, mapping directly to erpAccountingPeriods/erpPeriodClosingChecklistItems.
  guardrails:
  - requireAuth uniformly; a handful of routes additionally require requireAuthOrApiKey for external ERP
    integrations.
  workflow:
  - Create document (draft) -> submit (validation + status transition) -> approval workflow if configured
    (see API-11's approval-workflows) -> posted to ledger -> period close sweeps it into the checklist.
  source: system-tree/50-merged-tree.yaml#API-03
  repo: compliance-tracker
  tree1_requirement: none -- not described by any of the 9 requirement documents
- id: API-04
  name: pms/* -- internal project-management suite, 31 routes
  objects:
  - issues, issues/[id], issues/[id]/relations, issue-statuses, issue-types, workflow-transitions, labels
  - milestones, sprints, sprints/[id], sprints/[id]/issues, estimate-schemes
  - saved-views, saved-views/[id]
  - budgets, budgets/[id], budgets/[id]/line-items, billable-rates, time-entries, time-entries/[id]
  - meetings, meetings/[id], meetings/[id]/outcomes
  - wiki, wiki/[id], wiki/by-slug
  - schedule/{baselines,baselines/[id],gantt,resource-allocations}
  - enablement (GET/POST/DELETE -- module on/off toggle for an org)
  input: Issue/sprint/meeting/time-entry data, or a schedule query.
  output: pms_* rows; a Gantt/critical-path payload for the schedule/gantt route.
  rules:
  - requireAuth uniformly.
  - enablement is opt-in per org -- the PMS module doesn't appear at all for orgs that haven't enabled
    it (pmsEnabled flag).
  guardrails:
  - Both pms/* and the-firm/* (API-05) are opt-in per org (pmsEnabled/firmEnabled) -- an org that hasn't
    enabled the module gets zero routes/pages, not a disabled/greyed-out view. This is an access guardrail
    enforced at the feature-flag level, not per-request auth.
  workflow:
  - Issue created -> assigned -> moved through workflow-transitions -> tracked in a sprint -> time logged
    against it -> rolled into schedule/budget reporting.
  source: system-tree/50-merged-tree.yaml#API-04
  repo: compliance-tracker
  tree1_requirement: none -- not described by any of the 9 requirement documents
- id: API-05
  name: the-firm/* -- professional-services practice management, 29 routes
  objects:
  - clients/[clientId]/{engagements,invoices,portal-links,service-lines,staff-assignments,tax-cases}
  - engagements/[engagementId], engagements/[engagementId]/deliverables, deliverables, deliverables/[deliverableId]/complete
  - invoices/[invoiceId]/{fixed-fee-line,paid,send,void}, billable-rates, time-entries, time-entries/start,
    time-entries/[timeEntryId], time-entries/[timeEntryId]/stop
  - staff/[userId]/{assignments,utilization}, staff-assignments/[assignmentId]/end
  - tax-cases/[caseId]/stage, tax-cases/limitations
  - dashboard/{deadlines,realization,utilization}
  - portal-links/[linkId]/revoke, enablement
  input: Client/engagement/tax-case data, time-entry start/stop events.
  output: firm_* rows; dashboard aggregates (deadlines/realization/utilization).
  rules:
  - requireAuth uniformly; opt-in per org (firmEnabled flag), same pattern as PMS's enablement.
  guardrails:
  - Same opt-in guardrail as API-04 (firmEnabled) -- see API-04, not restated.
  workflow:
  - Client onboarded -> engagement created -> deliverables tracked -> time logged (start/stop) -> billed
    via invoices -> staff utilization/realization reported on dashboard.
  source: system-tree/50-merged-tree.yaml#API-05
  repo: compliance-tracker
  tree1_requirement: none -- not described by any of the 9 requirement documents
- id: API-06
  name: construction/* + v1/construction + v1/projexa -- construction/interior-design domain, 32 direct
    routes (+ 47 aliased, see API-02)
  objects:
  - boq + 5 sub-actions (approve, compare, revisions, submit, [id])
  - ai/{diff-drawings,estimate-progress,progress-summary,risk-detection} -- AI-assisted site analysis
  - dashboard, dashboard/[projectId], kpi-entries, kpi-entries/[id]/approve, site-diary, reports/[reportName],
    progress, predictions/[activityId], labour-roster, kpi-definitions, expenses, categories, attendance,
    activities
  input: Site data, BOQ line items, drawing images (for AI diff), progress reports.
  output: construction_* rows; AI-assisted analysis reports for the 4 ai/* routes.
  rules:
  - This is the domain PROJEXA (the sibling repo) proxies almost entirely -- see 20-projexa.yaml for the
    client side -- see PRX-06 for the client-side implementation.
  - boq has a full approve/revise/compare workflow, not just CRUD.
  guardrails:
  - kpi-entries/[id]/approve gates KPI entries behind an approval step before they count toward reporting.
  workflow:
  - 'BOQ drafted -> revised -> compared -> submitted -> approved. Separately: site-diary/attendance/progress
    logged daily -> AI routes analyze drawings/progress -> KPIs entered -> approved -> dashboard aggregates.'
  source: system-tree/50-merged-tree.yaml#API-06
  repo: compliance-tracker
  tree1_requirement: none -- not described by any of the 9 requirement documents
- id: API-09
  name: HR / recruitment / performance, 30 routes
  objects:
  - hr/employees, hr/employees/[userId], hr/leave-requests(+[id]), hr/leave-balances, hr/org-chart
  - recruitment/job-openings(+[id]), recruitment/candidates, recruitment/applications(+[id]), applications/[id]/{hire,interviews,stage},
    interviews/[id]/feedback
  - performance-reviews/cycles(+[id]/{activate,close}), reviews(+[id]/{acknowledge,submit})
  - hr-compliance (labour-law compliance items, distinct from core compliance)
  input: Employee/candidate/review data, leave requests, interview feedback.
  output: employee_profiles / job_openings / candidates / performance_reviews rows.
  rules:
  - applications/[id]/hire is the terminal action converting a candidate into an employee -- a real state-machine
    step, not just a status flag flip.
  guardrails: []
  workflow:
  - 'Job opening posted -> candidates apply -> stage-tracked through interviews -> feedback collected
    -> hire decision -> employee onboarded. Separately: performance review cycles activated -> reviews
    submitted -> acknowledged -> cycle closed.'
  source: system-tree/50-merged-tree.yaml#API-09
  repo: compliance-tracker
  tree1_requirement: none -- not described by any of the 9 requirement documents
- id: API-10
  name: CRM / Sales-HQ, 18 routes
  objects:
  - crm/leads(+[id]), leads/[id]/{convert,follow-up-task,score}
  - crm/opportunities(+[id]), opportunities/[id]/{analyze,follow-up-task}
  - sales-hq/overview, partners(+[id]), commission-plans, commission-accruals/[id]/{mark-paid,void}, referral-links,
    visitors(+/analyze)
  input: Lead/opportunity data, or a partner referral event.
  output: crm_leads/crm_opportunities rows; commission accrual records.
  rules:
  - leads/[id]/score and opportunities/[id]/analyze are AI-assisted endpoints (lead scoring, opportunity
    analysis) -- not plain CRUD.
  - sales-hq is the internal partner/commission engine, admin-scoped, distinct from customer-facing CRM.
  guardrails: []
  workflow:
  - 'Lead captured -> scored -> converted to opportunity -> analyzed -> won/lost. Separately: partner
    refers a customer -> referral tracked -> commission accrued -> marked paid.'
  source: system-tree/50-merged-tree.yaml#API-10
  repo: compliance-tracker
  tree1_requirement: none -- not described by any of the 9 requirement documents
- id: API-11
  name: GST reconciliation, 10 routes
  objects:
  - import (+[batchId], confirm, findings, mapping)
  - reconcile (+[runId])
  - returns (+[returnPeriodId], ai-review)
  input: A GST/bank statement file (Excel/Tally XML) or an existing import batch.
  output: gst_canonical_invoices, gst_reconciliation_matches, gst_ai_review_reports.
  rules:
  - 'This is a staged pipeline, not single-call CRUD: import (stage/map/confirm) -> reconcile (match)
    -> returns (track period, AI-review).'
  - 'ai-review is the ONE AI-touched step in the whole GST engine per the services inventory (GOV cross-reference:
    src/lib/gst/ai-review-report.ts) -- it explains/prioritizes but never recomputes numbers.'
  guardrails:
  - The deterministic GST engine (GOV-07) does all actual computation; AI is confined to the review/explanation
    layer, by design.
  workflow:
  - 1. File imported and staged. 2. Column-mapped, confirmed. 3. reconcile matches invoices/payments.
    4. returns tracks the period and generates an AI review report explaining findings.
  source: system-tree/50-merged-tree.yaml#API-11
  repo: compliance-tracker
  tree1_requirement: none -- not described by any of the 9 requirement documents
- id: API-13
  name: Governance / risk / legal / board, ~95 routes
  objects:
  - board, board-evaluation, committees, directors, doa, rpt, policies, risks, litigation, legal-matters,
    legal-opinions, legal-vendors, ip-portfolio, whistleblower, posh, bcm, fraud-cases, it-dr, incidents,
    contract-compliance, secretarial-audit, mca-filings, access-review, frameworks, audit, audit-engagements,
    audit-findings, audit-points, esg, cap-table, charges, sebi, rbi, irdai, vendor-risk, clm
  - 'Notable AI-assisted sub-routes: legal-opinions/[id]/generate, mca-filings/[id]/generate, vendor-risk/[id]/assess'
  input: Governance-object data (a board meeting, a policy draft, a legal matter, a risk entry).
  output: The corresponding table row; AI-generated drafts for the 3 generate/assess sub-routes.
  rules:
  - Almost entirely GET(list)/POST(create) + GET/PATCH(+DELETE) per governance domain object -- one CRUD
    family per audit-tree D2's Audit Organization concept made concrete in code (board, risk, legal, whistleblower,
    POSH, BCM, fraud, IT-DR, incidents, secretarial, MCA, access-review, frameworks, audit engagements/findings/points,
    ESG, cap-table, sector regulators SEBI/RBI/IRDAI, vendor-risk, CLM).
  - sebi/rbi/irdai are sector-gated in the UI (SectorGateNotice) even though the API routes themselves
    are plain CRUD -- gating happens at the entity-type check, not the route.
  guardrails:
  - requireAuth uniformly across this domain.
  workflow:
  - Domain object created -> reviewed/tracked through its own status lifecycle -> where applicable, AI
    drafts a first pass (legal opinion, MCA filing, vendor-risk assessment) for human review.
  source: system-tree/50-merged-tree.yaml#API-13
  repo: compliance-tracker
  tree1_requirement: none -- not described by any of the 9 requirement documents
- id: API-14
  name: Facilities / tickets / ops, 15 routes
  objects:
  - tickets (+[id]/{dispatches,guest-access,installed-product,surveys})
  - problem-records (+[id]/tickets)
  - field-service-dispatches/[dispatchId]
  - installed-products
  input: A support ticket, or a field-service dispatch event.
  output: tickets/problem_records/field_service_dispatches rows.
  rules:
  - problem-records groups related tickets ITIL-style (one problem, many linked incidents/tickets) --
    a real grouping relationship, not just a tag.
  guardrails: []
  workflow:
  - Ticket raised -> linked to an installed product -> if it recurs, grouped under a problem record ->
    field service dispatched if needed -> satisfaction survey on close.
  source: system-tree/50-merged-tree.yaml#API-14
  repo: compliance-tracker
  tree1_requirement: none -- not described by any of the 9 requirement documents
- id: API-17
  name: Cron/service-secret-gated internal jobs (7 routes)
  objects:
  - internal/metric-alerts/run, internal/loops/run, internal/instruction-audit/run, internal/secrets-audit/run
  - internal/the-firm/deadline-digest/run, internal/the-firm/recur-engagements/run, internal/fm-ppm/generate-occurrences/run
  - ai/team/log-usage (AI_TEAM_LOG_SECRET, not CRON_SECRET, but same category)
  input: 'A scheduled cron trigger with Authorization: Bearer ${CRON_SECRET}.'
  output: Side effects specific to each job (alert evaluation, loop execution, digest email, engagement
    recurrence, PPM occurrence generation).
  rules:
  - These are the only routes gated by a shared service secret rather than a per-user session/API-key
    -- correctly excluded from the requireAuth() count, not a gap.
  guardrails:
  - CRON_SECRET is the sole gate -- if leaked, all 7 jobs are triggerable externally; standard shared-secret
    risk, not flagged as a defect here, just noted.
  workflow:
  - Vercel Cron (or equivalent scheduler) fires -> Bearer-authenticated request -> job runs -> side effects
    applied.
  source: system-tree/50-merged-tree.yaml#API-17
  repo: compliance-tracker
  tree1_requirement: none -- not described by any of the 9 requirement documents
- id: DB-02
  name: Compliance core (9 tables)
  objects:
  - compliance_items
  - challans
  - notices
  - notice_dispatches
  - audit_points
  - compliance_costs
  - cost_payments
  - documents
  - contract_compliance_items
  input: A compliance obligation, a government notice, a payment challan.
  output: The compliance_items row that API-01 operates on.
  rules:
  - 'compliance_items verified in full: id, title, description, complianceType(enum), status(enum), priority(enum),
    dueDate, completedAt, filedDate, paidDate, departmentId, assignedToId, orgId, clientId, period, financialYear,
    acknowledgementNumber, registrationNumber, recurrenceType(enum), recurrenceParentId (self-ref), isTemplateSuggested,
    amount.'
  - 'compliance_type enum: GST, TDS, MCA, PF, ESIC, INCOME_TAX, ROC, LABOUR, ENVIRONMENTAL, OTHER.'
  - 'compliance_status enum: pending, in_progress, completed, overdue, not_applicable, draft.'
  guardrails: []
  workflow:
  - See API-01's workflow -- this is the table it operates on.
  source: system-tree/50-merged-tree.yaml#DB-02
  repo: compliance-tracker
  tree1_requirement: none -- not described by any of the 9 requirement documents
- id: DB-05
  name: Access review, ingestion (4 tables)
  objects:
  - access_review_cycles
  - access_review_certifications
  - ingestion_batches
  - ingestion_items
  input: A periodic access-review cycle trigger; a bulk-import file.
  output: Certification records; staged ingestion items awaiting confirm/reject.
  rules:
  - ingestion_batch_status / ingestion_item_status enums drive the shared staged-import pattern reused
    by both compliance/import (API-01) and gst-reconciliation/import (API-11) and documents/ingest (API-12).
  guardrails: []
  workflow:
  - File uploaded -> staged as ingestion_items -> reviewed row-by-row -> confirmed/rejected -> confirmed
    rows promoted into their real target table.
  source: system-tree/50-merged-tree.yaml#DB-05
  repo: compliance-tracker
  tree1_requirement: none -- not described by any of the 9 requirement documents
- id: DB-06
  name: Board / governance (13 tables)
  objects:
  - board_meetings
  - board_action_items
  - committees
  - related_party_transactions
  - delegation_of_authority
  - directors_kmp
  - board_evaluations
  - policies
  - approval_requests
  - cap_table_entries
  - cap_table_events
  - company_charges
  - secretarial_audits
  - mca_filings
  input: Board meeting minutes/agendas, RPT disclosures, policy drafts, cap-table events.
  output: The rows behind API-13's board/committees/rpt/doa/directors/board-evaluation/policies/cap-table/charges/secretarial-audit/mca-filings
    routes.
  rules:
  - 'policy_status enum drives the draft -> publish -> attestation lifecycle (audit-tree-adjacent: ''publish
    requires approval'').'
  - rpt_approval_status enum separately gates related-party transaction disclosures.
  guardrails:
  - policy_status enum enforces draft -> publish -> attestation with publish requiring approval -- a policy
    cannot go live by a single unilateral edit.
  workflow:
  - Governance object created -> reviewed -> approved per its own status enum -> visible in the relevant
    page.
  source: system-tree/50-merged-tree.yaml#DB-06
  repo: compliance-tracker
  tree1_requirement: none -- not described by any of the 9 requirement documents
