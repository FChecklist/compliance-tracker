  name: HR compliance / risk / frameworks (14 tables)
  objects:
  - hr_compliance_items
  - leave_policy_entries
  - holiday_list_filings
  - posh_committee
  - posh_complaints
  - posh_annual_reports
  - risks
  - sebi_compliance_items
  - rbi_compliance_items
  - irdai_compliance_items
  - compliance_frameworks
  - framework_controls
  - audit_engagements
  - audit_findings
  input: A labour-law obligation, a POSH complaint, a sector-regulator (SEBI/RBI/IRDAI) obligation, an
