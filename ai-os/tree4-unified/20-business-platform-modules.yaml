- id: PRX-01
  name: Architecture -- thin client, owns no construction database
  objects:
  - src/lib/veridian-client.ts
  input: A construction-domain request from any PROJEXA page/API route.
  output: A Bearer-authenticated fetch to VERIDIAN's API (default https://veridian-compliance-ai.vercel.app/api/v1/projexa).
  rules:
  - callVeridian(path, {method, body, apiKey, organizationId}) is the single chokepoint for all construction-domain
    data/AI in this repo.
  - getVeridianApiKey(organizationId) exists to look up a per-org key from veridian_credentials, but EVERY
    route currently calls callVeridian with no apiKey/organizationId -- confirmed by grepping every route
    -- so it silently falls back to the single shared process.env.VERIDIAN_API_KEY. This matches the codebase's
    own 'MVP note' comments, not a hidden bug.
  - 'PROJEXA''s own Postgres schema (Drizzle+postgres.js) holds ONLY tenant/auth/collaboration plumbing:
    organizations, memberships, veridianCredentials, assistantQueries, conversations, conversationParticipants,
    messages, profiles, todos. No BOQ/schedule/RFI/budget tables exist locally -- confirmed by the schema
    file''s own header comment.'
  - Zero direct LLM-provider calls anywhere in PROJEXA -- no OpenAI/Anthropic/etc. SDK or key found in
    src/ or .env.local. /api/assistant and /api/discuss are pure proxies to VERIDIAN's /assistant and
    /discuss endpoints.
  guardrails:
  - Auth is Supabase Auth (cookie-based), enforced in src/middleware.ts (route-prefix redirect) and requireAuth()
    in src/lib/supabase/auth-guard.ts (RLS-scoped session read, not a service-role key).
  workflow:
  - Client component -> PROJEXA API route -> requireAuth() -> callVeridian() -> VERIDIAN's /api/v1/projexa/*
    -> JSON passed back, occasionally reshaped.
  source: system-tree/50-merged-tree.yaml#PRX-01
  repo: projexa
  tree1_requirement: none -- not described by any of the 9 requirement documents
