  repo: compliance-tracker
  tree1_requirement: none -- not described by any of the 9 requirement documents
- id: DB-09
  name: Risk / resilience (9 tables)
  objects:
  - vendor_risk_profiles
  - esg_metrics
  - whistleblower_cases
  - bcm_plans
  - bcm_business_impact_analyses
  - bcm_recovery_procedures
  - bcm_exercises
  - fraud_cases
  - it_dr_plans
  - it_dr_backup_verifications
  - it_dr_failover_tests
  input: A vendor onboarding event (triggers risk assessment), a whistleblower report, a BCM plan/exercise,
    an IT-DR test.
  output: Rows behind API-13's vendor-risk/esg/whistleblower/bcm/fraud-cases/it-dr routes.
  rules:
  - vendor_risk_profiles/[id]/assess (API-13) is AI-assisted; bcm exercises/it-dr failover-tests model
    real business-continuity testing cadence, not just static plans.
  guardrails:
  - whistleblower_cases implies anonymity/confidentiality handling -- not verified at the DB-constraint
