        files: ["src/lib/guardrail-registrations.ts (new _resetRegisteredForTests export)", "src/lib/guardrail-engine.test.ts (beforeEach now calls it)"]
        finding: "CI failed 4 unrelated closureReviewCheck tests on the Handover PR -- NOT caused by that PR's own code. guardrail-engine.test.ts's beforeEach() clears the shared REGISTRY Map (guardrail-engine.ts) but guardrail-registrations.ts's own `registered` idempotency flag is a separate module-level variable that clear had no way to reset. Since bun runs all test files in one shared process, once any file called registerAllGuardrails() once, `registered` stayed true for the rest of the run -- a later clear left the registry genuinely empty while the guard silently no-op'd every subsequent call, and an unregistered leaf always passes by design. Adding handover-protocol.test.ts (which also calls registerAllGuardrails() at module scope) shifted bun's file-load order enough to expose this pre-existing fragility for the first time."
