  - date: "2026-07-11 (subagent dispatch, branch subagent/invitation-paths)"
    session_summary: "Area 15's 3rd of 4 spec'd invitation paths (U-D27.B3.S1): Requirement.docx's exact source text ('User Onboarding Flows' section) located and re-read directly rather than trusting the tracker's paraphrase -- it names 4 paths (A: Secure Invite Link, B: Master-Admin-direct-add, C: admin-code self-registration, D: peer-provided-code self-registration). A and B were already shipped by prior dispatches. Built C (admin-code) end to end; D (peer-code) deliberately deferred per this dispatch's own scope-discipline instruction ('build the ONE most clearly-specified, highest-value remaining path completely... rather than 2 shallow ones') -- D is not ambiguous (found in the same source paragraph as C), but it changes WHO may mint a code (any user, not just an admin/manager), which is a real, distinct security-surface decision this dispatch was not scoped to make unreviewed. Worked in an isolated git worktree per dispatch instructions; PR opened against main, not self-merged."
    phase2_code_changes_area15:
      - change: "Self-registration via admin code -- an admin/manager generates a reusable, human-typeable code (org+role fixed at generation); a new user types it into the /signup form (not a link they click) and, on completing real Supabase Auth signup, joins that org at that role. Same end state as the other 2 invitation paths, reached by typing rather than clicking."
        design_summary: "New compliance.org_join_codes table (codeHash unique + codePrefix for display, same shape as org_invite_links/api_keys), plus compliance.org_join_code_attempts (IP-keyed rate-limit log, org_id nullable since an attempt against an unresolved code has no org yet). RLS on both (app_runtime_tenant_isolation + service_role_bypass, matching every other new table this session). src/lib/org-join-code-service.ts: generateJoinCode() (crypto.randomBytes, rejection-sampled against a 30-symbol alphabet that excludes 0/O/1/I/L/U to survive being read aloud or handwritten, formatted XXXX-XXXX-XXXX), pure evaluateJoinCodeStatus(row, now) (valid/expired/revoked -- no 'exhausted' state, unlike the invite link, since these codes are reusable by design), createJoinCode/listJoinCodes/revokeJoinCode (tenant-scoped, admin/manager only, mirrors invite-link-service.ts's shape exactly), checkJoinCodeRateLimit (raw-db count query over the trailing 15-minute window, same pattern as api-key-auth.ts's per-key rate limit), previewJoinCode (raw-db, public, rate-limit-checked first, returns only orgName+role), redeemJoinCodeAndProvisionUser (raw-db: rate-limit check, then code lookup/status/seat-capacity checks, then creates the compliance.users row + 5 AI Assistants, mirroring consumeInviteLinkAndProvisionUser's shape -- no atomic-UPDATE race to guard since codes aren't use-budgeted). Wired into auth-guard.ts's autoProvisionUser as a new orgJoinCode branch (checked after the pre-existing inviteToken branch, same early-return-either-way posture -- never falls through to brand-new-org creation on a bad/expired/revoked/seat-full/rate-limited code), reading the requester's IP via next/headers' headers() inside the same request-scoped call tree, the identical mechanism the pre-existing sales-referral (ref) branch already established for this exact 'need the IP but requireAuth() takes no Request param' problem. New routes: POST/GET /api/join-codes (admin/manager, create + list), DELETE /api/join-codes/[id] (revoke), POST /api/join-code/preview (public, code in the request body rather than a GET/URL param -- deliberate, since a typed-in secret shouldn't land in browser history/server access logs/referrer headers the way a clicked link's token is expected to). /signup gained a collapsed 'Have an organisation join code?' toggle (only shown when no invite-link is already active) that reveals a code input, debounced 500ms into the preview endpoint, showing the same 'You're joining <org> as <role>' banner pattern as the invite-link flow once a valid code is detected."
        security_properties_for_review: "org-scoped + role-fixed at creation (identical posture to org_invite_links). Long-lived by default (expiresAt nullable, unlike the invite link's forced 7-day default) since these codes are meant to be shared verbally/in a doc, not clicked -- admin can still set an expiry or revoke early. Admin-only minting (only admin/manager dbUser.role can create/revoke, enforced in the route handlers) -- this is what makes it 'admin-code' and not 'peer-code' (Path D). Real entropy despite being human-typeable: 12 characters from the 30-symbol alphabet above = 30^12 ≈ 5.3×10^17 possibilities (~59 bits), formatted for readability, well past the '8+ chars' floor the dispatch brief named. Hashed at rest (SHA-256 via the same hashSHA256 api-keys.ts/invite-link-service.ts already use) -- raw code returned to the creating admin exactly once. Rate-limited: every preview/redemption attempt (success or failure) is logged to org_join_code_attempts by requester IP; 10 failed attempts inside a trailing 15-minute window blocks further attempts from that IP with a generic response, checked BEFORE the code lookup runs so a blocked IP gets no valid/invalid signal either way. Named honestly, not oversold: this rate limit is IP-keyed, not code-keyed -- a distributed attacker rotating source IPs isn't stopped by it alone; combined with the ~59-bit code space the realistic brute-force cost is still prohibitive (rate limiting turns a fast online guess into a slow one; the entropy is what makes 'slow' actually matter). Redemption still requires a real Supabase Auth signup, identical to the invite link -- this mechanism only decides which ORG an already-authenticating identity lands in, it is never reachable by a caller with no Supabase identity at all. Guardrail Presence Check re-run after this change: still passes (55/55 markers) -- nothing in auth-guard.ts's existing checks (isActive/seat/revocation logic) was weakened, only a new early-return branch was added alongside the pre-existing inviteToken branch, before the brand-new-org-creation code."
        honest_scope_limitation: "Path D (peer-provided-code self-registration -- any existing user, not just an admin, can hand out a join code) was deliberately NOT built this dispatch, per its own explicit scope-discipline instruction. This is not an ambiguity finding -- Requirement.docx's source text is completely clear about what Path D is (it's in the same paragraph as Path C, one sentence apart). It's deferred because it is a genuinely different security decision (who may MINT a code) layered on the identical redemption mechanism just built, and building it in the same pass would have meant either shipping two shallow paths or silently reusing org_join_codes' 'admin/manager only' creation gate for a feature whose whole point is that non-admins can create codes too -- that gate change deserves its own review, not a same-PR bundling. No admin UI was built either (list/revoke API endpoints exist and are correct, matching the invite link's identical honest_scope_limitation from the prior dispatch) -- not surfaced in InviteUserModal yet."
        files:
          - "src/lib/db/schema.ts (orgJoinCodes + orgJoinCodeAttempts tables + relations)"
          - "drizzle/0146_org_join_codes.sql (renumbered from 0145 by Super Boss during merge -- 0145 was independently claimed by the concurrently-merged audit-cadence PR #181 -- NEW, not applied to the live DB by this dispatch, per instructions)"
          - "src/lib/org-join-code-service.ts (NEW)"
          - "src/lib/org-join-code-service.test.ts (NEW, 23 tests -- pure evaluateJoinCodeStatus expiry/revocation boundary cases incl. no-expiry-at-all, generateJoinCode format/alphabet/uniqueness, formatJoinCode/normalizeJoinCode round-tripping, role allowlist)"
          - "src/app/api/join-codes/route.ts (NEW)"
          - "src/app/api/join-codes/[id]/route.ts (NEW)"
          - "src/app/api/join-code/preview/route.ts (NEW, public, POST not GET)"
          - "src/app/signup/page.tsx (join-code toggle/input, debounced preview, org-join banner, mutually exclusive with an active invite link)"
          - "src/lib/supabase/auth-guard.ts (autoProvisionUser: new orgJoinCode branch, reuses next/headers()-based IP extraction already established by the ref branch)"
        verification: "tsc --noEmit -p . -> exit 0. eslint . -> 0 errors on every new/edited file (targeted run) and 0 errors project-wide via tsc. node scripts/check-guardrail-presence.mjs -> 'Guardrail Presence Check passed -- all 55 markers present' (unchanged count -- this dispatch added no new named guardrail, it extended an existing auth-adjacent call site without touching any manifest entry). DATABASE_URL=placeholder APP_RUNTIME_DATABASE_URL=placeholder bun test src/lib/org-join-code-service.test.ts src/lib/invite-link-service.test.ts -> 36 pass, 0 fail, 50 expect() calls across 2 files (confirms the pre-existing invite-link path has zero regression). Not visually confirmed in a running browser (headless dispatch, no live DATABASE_URL/Supabase credentials in this isolated worktree) and the migration was NOT applied to the live Supabase DB (left for Super Boss/an agent with DB-apply authority, same posture as every other new-table entry in this file). To verify the actual redemption flow once the migration is applied: as an admin, POST /api/join-codes with a role, copy the returned code; in an incognito window go to /signup, click 'Have an organisation join code?', type the code (with or without dashes, any case), confirm the 'You're joining <org> as <role>' banner renders, complete signup, confirm the resulting compliance.users row has the right orgId/role and 5 aiAssistants rows; separately confirm 11 consecutive wrong-code submissions from the same session return a rate_limited reason on the 11th."

