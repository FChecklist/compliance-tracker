  - date: "2026-07-12 (subagent dispatch, branch subagent/peer-code)"
    session_summary: "Area 15's 4th and final spec'd invitation path (U-D27.B3.S1 Path D): peer-provided-code self-registration -- any existing org user, not just an admin/manager, may now mint a join code. Same redemption mechanism as Path C (org-join-code-service.ts, PR #182); this dispatch's real scope was the security-surface decision the prior dispatch explicitly deferred -- WHO may mint a code, for WHICH role, and under what limits. Worked in an isolated git worktree (subagent/peer-code) per dispatch instructions; PR opened against main, not self-merged."
    phase2_code_changes_area15_pathD:
      - change: "POST/GET /api/join-codes and DELETE /api/join-codes/[id] opened to any authenticated org member, replacing the old flat admin/manager gate with a rank-ceiling check -- and this also FIXES a pre-existing privilege-escalation gap in Path C itself, not just adds Path D."
        finding: "The old gate on all 3 endpoints was `dbUser.role === 'admin' || dbUser.role === 'manager'`, with NO further check on which role the created code could grant -- meaning any 'manager' could already mint a code granting the full 'admin' role to whoever redeemed it. That was live in main before this dispatch (PR #182)."
        design_summary: "src/lib/org-join-code-service.ts gained 3 new pure functions built on this codebase's EXISTING role hierarchy (ROLE_RANK/UserRole, src/lib/supabase/auth-guard.ts -- already used for exactly this 'can this user act at rank X' purpose in approval-workflow-service.ts, not a new invention): isPrivilegedMinter(role) (rank >= manager -- the bar that preserves Path C's exact old behavior for admin/manager), resolveAllowedMintRoles(role) (every INVITE_ROLES value at or below the requester's own rank -- for 'manager' this is now [manager, member, viewer], NOT admin; for 'member' it's [member, viewer]; for 'viewer' it's [viewer] only), and resolvePeerExpiryDays(requested) (clamps a peer's requested expiry to [1, 30] days, defaulting to 14 when omitted -- never null, unlike the privileged path's indefinite default). ROLE_RANK covers all 10 dbUser.role values (not just the 4 INVITE_ROLES), so a Wave-1 role like senior_professional (rank 3, same as manager) is correctly treated as privileged too -- rank governs, not the literal role string. Import is circular with auth-guard.ts (auth-guard imports redeemJoinCodeAndProvisionUser from this file); safe because ROLE_RANK is only read inside function bodies here, never at this module's own top level (documented inline to prevent a future edit from hoisting it unsafely). createJoinCode() gained a required createdByRole param, persisted to a new orgJoinCodes.createdByRole column (schema.ts + drizzle/0147_peer_join_codes.sql, NOT NULL DEFAULT 'admin' for backward compat with every pre-existing Path-C-only row) -- this is what makes peer-minted and admin-minted codes distinguishable in the data (`created_by_role NOT IN ('admin','manager')`), without a second table. listJoinCodes()/revokeJoinCode() gained optional creator-scoping params so a non-privileged caller only ever sees/revokes codes THEY created, never the whole org's -- privileged callers are completely unaffected (full org-wide list/revoke-any, unchanged). New countActiveCodesForCreator() backs the peer-mint cap below. InviteUserModal.tsx gained a 3rd 'Join Code' tab, reachable by every role; 'Direct Add' and 'Shareable Link' (both still admin/manager-only server-side) are now hidden client-side for a non-privileged user instead of shown-and-then-403'd -- fetches /api/me once per open to compute a client-side mirror of the rank ceiling (UX only, server route is the real gate) and defaults straight to the Join Code tab for a peer. This also happens to give Path C's admin-minted flow a UI it never had before (PR #182's own honest_scope_limitation noted 'not surfaced in InviteUserModal yet') -- a natural side effect of building the one tab Path D actually needs, not separately-scoped work."
        privilege_escalation_reasoning_for_review: "Two decisions, stated plainly per the dispatch brief's explicit ask: (1) Role ceiling -- peer-minted codes do NOT get the same role freedom as admin-minted ones. A minter may only grant a role at or below their own ROLE_RANK, enforced uniformly for every minter (not just 'peers') via resolveAllowedMintRoles -- this is a strictly narrower rule than before, and it closes the manager-can-mint-admin gap described above as a direct consequence, not a separate change. (2) Blast-radius limits -- non-privileged (rank < manager) mints additionally get a forced expiry (14-day default, 30-day max, resolvePeerExpiryDays) and a hard cap of 3 simultaneously-active codes per creator (PEER_MAX_ACTIVE_CODES, countActiveCodesForCreator, checked in the POST route before every peer mint, 429 once hit). Rationale: a peer account is far more numerous and far less vetted than an admin/manager account, so a compromised or malicious one can only ever leave a small number of short-lived doors open, never an indefinite stockpile -- admin/manager minting is completely unchanged (nullable expiry, no cap), since that trust bar was already established by Path C. The pre-existing IP-keyed redemption rate limit (10 failed attempts/15min, unchanged) is a separate, already-adequate mitigation for brute-forcing a code's VALUE; the new active-code cap is the previously-absent limit on how many codes a single account can mint in the first place -- the two are complementary, not redundant."
        files:
          - "src/lib/db/schema.ts (orgJoinCodes: +createdByRole column)"
          - "drizzle/0147_peer_join_codes.sql (NEW -- ALTER TABLE ADD COLUMN + supporting index; NOT applied to the live DB by this dispatch, per instructions; verified 0146 was still the highest migration on origin/main immediately before push, no renumbering needed)"
          - "src/lib/org-join-code-service.ts (isPrivilegedMinter/resolveAllowedMintRoles/resolvePeerExpiryDays/countActiveCodesForCreator NEW; createJoinCode/listJoinCodes/revokeJoinCode signatures extended, backward-compatible)"
          - "src/lib/org-join-code-service.test.ts (+17 tests covering all 3 new pure functions, incl. the manager-cannot-mint-admin regression case)"
          - "src/app/api/join-codes/route.ts (GET/POST: rank-ceiling replaces the flat admin/manager gate; POST adds the peer active-code-cap check)"
