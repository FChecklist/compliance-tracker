# Every item below closes one or more of Tree 4's non-fully-implemented
# sub-branches (`covers_subbranches`). Phase order is the recommended
# execution sequence, not a rigid gate -- items within a phase can run in
# parallel unless a `depends_on` says otherwise.
#
# Phase 1 = cheap verification (read code/UI, confirm or refute status --
#   several of these may turn out to already be done, in which case the
#   "build" step is skipped and the sub-branch is simply reclassified).
# Phase 2 = foundational builds that unblock later phases.
# Phase 3 = feature builds, mostly independent of each other.
# Phase 4 = large, separately-scoped initiatives (weeks, not days).
#
# Every plan item has: instruction (narrow, tightened directive), input,
# output (the 100%-completion definition), guardrails (constraints during
# the work), depends_on (other plan items or Phase-0 decisions this needs
# first), covers_subbranches (the Tree-4 U-D ids this closes).

