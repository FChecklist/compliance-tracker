budget_calculation:
  rate: "z-ai/glm-5.2 via DeepInfra (src/lib/llm-client.ts:162): $0.00042 / 1K prompt tokens, $0.00132 / 1K completion tokens"
  iteration_cap: "MAX_ITERATIONS = 40 (scripts/ai-workforce-agent.mjs:30) -- the same iteration budget that, on Claude Sonnet's much higher per-token rate, caused the 93%-of-spend incident. On GLM-5.2's rate this is not the same risk class."
  per_dispatch_estimate:
    typical_case: "A well-scoped mechanical task (narrow file scope, pattern given directly in the prompt rather than requiring the model to re-derive it from a large file) should finish in 2-4 tool-calling iterations. Estimated ~6,000-15,000 cumulative prompt tokens (conversation history replays each iteration) + ~1,500-3,000 completion tokens -> roughly $0.005-0.026 per dispatch."
    worst_case: "If a dispatch runs the full 40-iteration budget without calling finish (the exact historical failure mode), assuming ~15K average prompt tokens/iteration (history replay) and ~500 completion tokens/iteration: ~600,000 prompt tokens + ~20,000 completion tokens -> approx $0.252 + $0.026 = ~$0.28. Still small relative to budget because GLM-5.2's rate is roughly 2 orders of magnitude cheaper than what burned the Sonnet incident (that comparison is qualitative -- Sonnet's exact OpenRouter rate wasn't pulled from a live source for this calculation, the conclusion rests on the documented 93%-of-spend-in-3-dispatches fact alone, not a re-derived Sonnet price)."
  conclusion: >-
    Even at worst-case cost per dispatch (~$0.28), the $3 effective budget
    covers roughly 10 runaway dispatches, or 100+ typical-case dispatches.
    Budget is not the binding constraint for this round -- the binding
    constraint is how many results can be meaningfully audited and how many
    engine categories are actually left. Sized this round's batch to 4
    dispatches (Costing, Fixed Asset, CRM, Sales -- the next 4
    largest/well-scoped remaining engine categories) to keep review load
    manageable and leave room for a second round based on how round 1 goes,
    per the Owner's own framing (more rounds after reviewing how it goes).

