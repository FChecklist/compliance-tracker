  (1) area 7 first -- smallest gap, no Owner decision needed, self-contained file.
  (2) area 8 -- mechanical, well-proven pattern, highest volume of real progress per hour spent.
  (3) area 6 -- monitoring additions are additive, no architectural risk.
  (4) area 3's Handover Protocol (D17) -- clearly scoped, no Owner decision needed for the core mechanism.
  (5) areas 15/16/18 together -- overlapping onboarding/lifecycle work, do once.
  (6) area 1 -- DCMD is a real, large, well-scoped build.
  (7) areas 4/9/10/8's-second-item -- all depend on the SAME underlying executive-hierarchy-as-code build; sequenced together once that foundation exists.
  (8) area 5 -- blocked on DEC-03 (Owner decision: retrofit vs. ratify Work Object model) -- flag for Owner before deep investment.
  (9) area 12 -- Loop Engineering, depends on area 5's task lifecycle groundwork existing first for real per-task hooks.
  (10) area 11 -- Cost management, needs an Owner decision on limit scope/values before the "100%" target is even defined.
  (11) area 2's remaining item folds into area 1's chain-selection gate work.
