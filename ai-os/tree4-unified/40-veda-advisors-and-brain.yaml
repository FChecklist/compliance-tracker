- id: VA-07
  name: Stage 0 lead-capture funnel -- the ONE real interactive business flow
  objects:
  - code-by-zai/src/app/stage0/page.tsx
  - stage0_submissions (Supabase table)
  input: 'A multi-step wizard: intro -> 7 questions (startup name/problem, current stage, investor-approach
    history, biggest fear, funding urgency, amount+use, self-rated readiness 1-10) -> contact capture
    (name/email required, WhatsApp optional).'
  output: A row in stage0_submissions; on success, a 'what happens next' screen (acknowledgement email,
    personalized-observation + free-session-booking email within 24h) + a WhatsApp fallback (wa.me/919650397480).
  rules:
  - No payment step anywhere in the code -- Stage 0 and the initial session are explicitly free/no-commitment.
    No course-purchase/checkout flow exists (the only mention of payments is in docs/build-prompt.md,
    which itself says the login/payments/portal backend is explicitly non-functional in the demo).
  guardrails:
  - Submits directly to Supabase REST client-side -- no server-side validation route sits between the
    form and the DB write, meaning any RLS misconfiguration on stage0_submissions would be directly exploitable.
    Not verified either way in this pass; flagged as worth checking, not asserted as broken.
  workflow:
  - Intro -> 7 questions -> contact info -> submit to Supabase -> confirmation screen with WhatsApp fallback.
  source: system-tree/50-merged-tree.yaml#VA-07
