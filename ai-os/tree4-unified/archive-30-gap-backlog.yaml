    output: "A deterministic computed result, zero LLM calls, same shape as the 2 already-wired engines."
    guardrails:
      - "Keep dispatchEngine()'s explicit-allowlist pattern -- do NOT switch to dynamic-import-by-DB-value, per the existing (correct) security rationale already documented in GOV-07."
