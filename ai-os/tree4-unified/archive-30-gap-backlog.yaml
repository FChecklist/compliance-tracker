      - "2. Add its functions to dispatchEngine()'s allowlist switch, one engine at a time."
      - "3. Define/verify the corresponding capability-tree leaf(ves) so the function is actually reachable via the Dynamic Chain UI."
      - "4. Repeat per the repo's own CAPABILITY_COVERAGE.md tracking document (already exists, referenced by GOV-07)."
    instruction: "Narrow, tightened: do NOT redesign the calculator infrastructure. The task is purely 'extend an allowlist and define matching leaves,' repeated ~23 times, prioritized by real customer value."

