  - id: GAP-06
    priority: P1
    effort: M
    name: "Build a genuine draft-then-approve Communication Governance flow"
    reconciled_from: "U-D10 / Tree1 D10"
    priority_rationale: "Real gap, but composable from existing pieces -- not a from-scratch subsystem."
    current_state: "Only system-triggered fixed-template transactional email exists (email.ts). No AI-drafts-then-user-approves pattern exists for any communication type."
    input: "A trigger for a communication that should be AI-drafted (e.g. a weekly status report, a follow-up reminder)."
    output: "A drafted communication held in a pending state until approved, then sent via the existing email.ts mechanism."
    guardrails: ["VERI must never send without approval unless a persistent always_approve preference exists for that exact scope -- reuse GOV-14's approval_preferences mechanism exactly, do not build a parallel approval system."]
    workflow:
      - "1. AI-drafting step: reuse GOV-06's runRole() to generate the draft content for a given communication type/role."
      - "2. Hold step: persist the draft in a pending state, check GOV-14's checkApprovalPreference() for an existing always-approve shortcut."
      - "3. Approval step: if no shortcut, present the draft to the user via the existing D9/GOV-14 approval UI pattern."
      - "4. Send step: on approval, call email.ts's sendEmail() (or the appropriate channel) with the approved content."
    instruction: "Narrow, tightened: this is a composition of 3 existing mechanisms (runRole, approval_preferences, sendEmail), not a new one. Resist the temptation to build a bespoke drafting/approval pipeline -- the pieces already exist and are proven."

