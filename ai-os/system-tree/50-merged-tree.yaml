  repo: compliance-tracker
- id: API-15
  name: Settings / platform admin, 30 routes
  objects:
  - settings/{ai-config, api-keys(+[id],usage), model-config(+[id],pool-usage), modules, module-rules,
    page-agent-config, prompts, sso, webhooks(+[id])}
  - automation-rules(+[id],[id]/runs), metric-alert-rules(+[id])
  - connectors(+[toolkit]/sync)
  - mdm/duplicates(+scan,[id]/merge,[id]/review), quality-scores
  - capability-registry/{backfill,duplicates}, capability-tree
  input: Org/user configuration changes, or a trigger-condition-action automation rule.
  output: Updated org settings; automation_rule_runs; MDM merge/review decisions.
  rules:
  - automation-rules implements deterministic (no-AI) trigger->condition->action rules -- the explicit
    software-first counterpart to AI dispatch.
  - mdm (Master Data Management) runs duplicate-detection scans over Customers/Suppliers and tracks merge/review
    decisions -- a real dedup workflow, not just a report.
  guardrails:
  - settings routes are generally expected to be admin-role-gated, consistent with the platform's general
    pattern, though not individually re-verified for all 14 files.
  workflow:
  - Admin configures org settings/connectors/automation rules -> MDM periodically flags duplicates ->
    admin merges/reviews -> capability-registry backfill keeps the AI capability catalog in sync with
    real registered capabilities.
