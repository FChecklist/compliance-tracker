  - 'erp_journal_entries + erp_journal_entry_lines verified in full: entries carry entryNumber, postingDate,
    referenceType/referenceId (polymorphic source-document link, same pattern reused by conversations/veriMeetings),
    status(enum), totalDebit/totalCredit, companyId (nullable, multi-company). Lines carry accountId,
    partyType(enum)/partyId (polymorphic customer-or-supplier), debit/credit, costCenter (legacy free
    text) + costCenterId (a real FK added later, additive, alongside the legacy free-text field rather
    than replacing it).'
  - 10 of the platform's 11 total explicit FK constraints are in this ERP payroll/inventory block (e.g.
    erpSalaryStructureComponents.employeeId -> employeeProfiles.id, erpPayslipLines.payslipId -> erpPayslips.id
