    erp_stock_valuation_layers, erp_reorder_levels, erp_abc_classifications, erp_cycle_count_plans(+lines),
    erp_item_uom_conversions, erp_item_batches, erp_item_serials'
  - 'Periods/approvals: erp_accounting_periods, erp_period_closing_checklist_items, approval_workflow_definitions(+step_definitions,instances,step_instances,step_approvals)'
  - 'Companies/cost-centers/cash: erp_companies, erp_cost_centers, erp_cash_accounts, erp_cash_vouchers'
  - 'Parties: erp_addresses, erp_contacts'
  - 'Contracts: erp_contracts, erp_contract_amendments, erp_contract_billing_schedules, erp_contract_revenue_schedules,
    erp_contract_obligations, erp_subscription_plans, erp_subscriptions, erp_contract_negotiation_rounds'
  - 'Bank reconciliation: erp_bank_statement_imports, erp_bank_statement_lines'
  - 'Payroll: erp_salary_components, erp_salary_structures(+components with an explicit FK), erp_statutory_rules,
    erp_payroll_runs, erp_payslips(+lines, FK+cascade), erp_income_tax_slabs(+rates), erp_employee_tax_exemptions,
    erp_tax_withholding_categories(+rates)'
  - 'Pricing: erp_pricing_rules'
  input: See API-03.
