# ---------------------------------------------------------------------------
# registries -- every mechanism whose job is to index/track/govern
# something. Query the specific registry for its own domain instead of
# grepping files. (Prefer quick_reference above for a first pass -- this
# section is the full-detail drill-down, not the starting point.)
# ---------------------------------------------------------------------------
registries:

  - id: rules_articles_198
    type: guardrail_ruleset
    path: ai-os/RULES_ARTICLES_198.json
    scope: >-
      Owner directive 2026-07-21: the 99 Rules + 99 Articles governing
      the complete VERIDIAN AI OS system, supplied by the Owner
      (RULES.xlsx), extracted losslessly. THIS IS A LIVE, SYSTEM-WIDE
      GUARDRAIL -- every AI agent (Mother Router, Superboss, Supervisor,
      any worker doing software development) shall keep these 198 items
      in consideration WHILE doing work, not just as something audited
      after the fact. Complements ai_engineering_policy (the HOW, a
      build-vs-buy playbook) and ai-os/CONSTITUTION.yaml (a differently-
      numbered, separately-sourced rule registry, zero literal overlap
      confirmed via grep) -- this file is the Owner's own canonical
      198-point checklist, distinct from both.
    status: live
    mandatory_before: >-
      doing any work on this system -- FChecklist, VERIDIAN AI OS,
      compliance-tracker, PROJEXA, server, GitHub, Vercel, Supabase,
      product, project, brands, AI models, end user
    verification_mechanism: registries.audit198_framework (re-runnable,
      evidence-based scoring against this exact file)

  - id: audit198_framework
    type: verification_mechanism
    path: ai-os/scripts/audit198/ (run-audit.mjs, evidence-engine.mjs,
      category-checkers.mjs, rules-taxonomy.mjs, constitution-index.mjs,
      results/audit198-results.json, results/audit198-summary.md)
    scope: >-
      Re-runnable, software-driven gap-audit engine for
      rules_articles_198 (above) -- run: node
      ai-os/scripts/audit198/run-audit.mjs. Groups the 198 items into
      33 thematic categories, each backed by a generic evidence-
      gathering + verdict engine (file-marker checks, repo-wide grep
      with file:line citations, cross-reference against
      ai-os/CONSTITUTION.yaml's own status vocabulary). Verdict
      vocabulary: ENFORCED / PARTIALLY_ENFORCED / POLICY_ONLY /
      NOT_APPLICABLE_YET / NOT_YET_BUILT / NEEDS_HUMAN_JUDGMENT /
      EVIDENCE_UNAVAILABLE. THIS is the objective proof mechanism for
      whether the system-wide guardrail above is actually being
      honored -- re-run it, don't just assert compliance.
    status: live, real 198/198 run completed 2026-07-21, actively
