# ---------------------------------------------------------------------------
# tree_lineage -- the requirement-vs-built-status document chain. Read this
# before assuming audit-tree/system-tree/tree4-unified are duplicates --
# they are a documented derivation chain, not parallel copies.
# ---------------------------------------------------------------------------
  - id: credit_spend_governance
    type: python_script
    path: /opt/veridian/scripts/credit-accountant.py
    mirror: /opt/veridian/repos/compliance-tracker/ai-os/scripts/credit-accountant.py
    integrates_with: /opt/veridian/scripts/preflight-guard.py (propose gate, universal choke point) and /opt/veridian/scripts/worker-entrypoint.sh (report calls, both main invocation and auto-fix retry loop)
    rule: >-
      ZERO TOLERANCE on credit wastage -- Owner directive 2026-07-20, verbatim:
      "the system will spend $1 after that spend is over, the software will
      tell to mother router, mother router will tell to Claude Code CLI
      subscription via SSH Session. Claude Code CLI subscription will analyze
      the spend of that $1... Will check if that is not being wasted. Then
      Claude Code CLI subscription will release another $1 to the system...
      without Claude Code CLI subscription permission, the mother router
      cannot spend any credit... Claude Code CLI subscription need not take
      any permission from the owner. This is an auto process... Claude Code
      CLI subscription will check if work could have been completed without
      AI and via software package... ZERO TOLERANCE on credit wastage." This
      is a strict, standing rule: no metered AI credit spend (OpenRouter/
      GLM-5.2) may occur anywhere in this system without a prior propose
      approval and a following report outcome, enforced automatically, with
      no owner-in-the-loop step required for routine operation.
    mechanism: >-
      Two-gate ledger (SQLite, /opt/veridian/ai-os/memory/credit-ledger.sqlite):
      propose runs BEFORE metered spend, report runs AFTER. The accountant is
      the Claude Code CLI subscription itself (CLAUDE_CODE_OAUTH_TOKEN,
      flat-rate, verified separate from the metered OpenRouter pool --
      ANTHROPIC_API_KEY is explicitly disabled on this server, no
      ANTHROPIC_BASE_URL override exists) -- gating the metered resource with
      the unmetered one, per the Owner's own "software first, AI second,
      minimal credits only when needed" principle. Deterministic, zero-cost
      checks run first every time: OpenRouter real balance (fails closed
      below $0.10), existing-capability search via superboss-register.py
      check-duplicate (rejects if software/a prior mechanism already covers
      the plan), and increment-sequencing (hard-blocks only on an explicit
      prior REJECTED outcome, not a merely-pending report, to avoid
      permanently deadlocking a task on an unrelated crash). Only when none
      of those can decide does it escalate to a real, bounded (--max-budget-usd
      0.05, 60s timeout) claude -p judgment call, which must answer exactly
      PASS, FAIL, or REDIRECT (REDIRECT = "use existing software instead of
      AI").
    fails_closed: >-
      Deliberate asymmetry from every other guardrail in this codebase (which
      mostly fail OPEN on their own infrastructure hiccups, e.g.
      check_proxy_health/check_openrouter_balance in preflight-guard.py, to
      avoid blocking legitimate work on a check's own flakiness). This gate
      fails CLOSED: any accountant-call timeout/error/unparseable response is
      treated as a REJECTION, never a pass-through. An approval gate whose
      entire purpose is preventing waste must default to NO SPEND under
      ambiguity, not the reverse -- a broken accountant halting all metered
      spend server-wide is the intended, safe failure mode, surfaced as a
      high-priority health-check-15min.py anomaly (check_credit_accountant_health,
      built and live-verified 2026-07-20) so it gets fixed fast rather than
      silently blocking work forever.
    enforcement_point: >-
      Wired into preflight-guard.py's check_credit_accountant_approval(),
      called from __main__ for BOTH the proxy path and the --no-proxy
      (doc-worker) path -- every dispatcher (worker-entrypoint.sh,
      doc-worker-entrypoint.sh, and anything else that calls
      preflight-guard.py, which is every dispatch path in this system) is
      covered automatically without needing to be individually taught about
      the accountant. The auto-fix quality-gate retry loop in
      worker-entrypoint.sh is a second, separate real-spend event not
      covered by the single upfront preflight call -- it has its own
      propose/report pair wired directly into the retry loop.
    tested: >-
      Live-tested end-to-end on the real server AND on the real worker
      fleet: deterministic balance rejection (real, then-exhausted
      OpenRouter balance), deterministic existing-capability rejection, real
      claude -p PASS/FAIL/REDIRECT verdicts on both a thin/trivial test plan
      (correctly rejected) and a genuinely substantive real-task plan
      (correctly approved), full preflight-guard.py chain end-to-end via a
      throwaway test task directory, and confirmed post-deploy that the live
      ledger (credit-ledger.sqlite) already has real accumulated entries
      from the live worker fleet using the gate in production. 3 real bugs
      found and fixed during testing before trusting it: keyword-extraction
      over-matching (fixed by requiring explicit caller-supplied
      --search-terms, never auto-derived from plan prose), missing
      CLAUDE_CODE_OAUTH_TOKEN propagation in a non-systemd subprocess
      context (fixed via get_claude_oauth_env()), and an
      increment-sequencing deadlock risk (fixed to hard-block only on an
      explicit prior rejection, not a merely-pending report).
    status: >-
      Complete and live: propose gate deployed in preflight-guard.py, report
      gate deployed in worker-entrypoint.sh (main invocation success/failure
      + auto-fix retry loop) AND doc-worker-entrypoint.sh (single report
      call, --actual-spend-usd always 0 since that task family draws $0
      from the metered pool by design -- CLI's own cost estimate kept in
      the outcome text for informational value only, never conflated with
      real metered spend), health check deployed in health-check-15min.py,
      ledger pruning deployed (credit-accountant.py prune subcommand,
      30-day retention, daily cron via run-logged.sh), all mirrored to
      compliance-tracker and committed (docs/cost-control-2026-07-20
      branch). Deployment was interrupted mid-pass by an unrelated SSH
      outage (ssh.service found disabled on the server, fixed via Hetzner
      Rescue System -- see [[feedback_ssh_outage_diagnostic_procedure]] in
      assistant memory, not a MASTER_INDEX.yaml concern) -- resumed and
      completed same day.
    audit_findings_2026_07_20: >-
      3-round audit (same day) found and fixed 1 real production bug:
      credit_accountant_rejected was missing from worker-entrypoint.sh's
      hard-stop list, so the new gate's rejections fell through to the
      "transient, let systemd retry" branch -- confirmed live: 163 real
      tasks stuck in a restart-storm, 1954 rejected propose calls in ~40
      minutes for the identical real reason (exhausted OpenRouter
      balance). Fixed by adding it to the hard-stop condition, same
      treatment as circuit_breaker_tripped/budget_exhausted/
      openrouter_balance_exhausted (all 4 share the same property: blind
      retry reproduces the identical rejection until a human intervenes).
      Also closed 2 disclosed-but-not-yet-fixed gaps from that same audit:
      doc-worker-entrypoint.sh's missing report call, and credit-ledger.sqlite's
      missing pruning mechanism (both described above). No metered money
      was ever actually wasted by the restart-storm bug -- every rejection
      happens before any real spend -- but the churn itself was real,
      unnecessary load, now stopped.
