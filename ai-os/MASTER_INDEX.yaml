# system_boundary -- Owner directive 2026-07-20: "ONE INTEGRATED SYSTEM
# WITH TWO SUBSYSTEMS... ALL REPOSITORIES UNDER FCHECKLIST comes under this
# one integrated system." Verified against real server state (not assumed)
# before recording: all 7 named repos are cloned at /opt/veridian/repos/,
# confirmed via directory listing. This section did not exist before this
# pass -- a real documentation gap, now closed.
# ---------------------------------------------------------------------------
system_boundary:
  name: VERIDIAN AI OS
  subsystems:
    subsystem_1_software_dev_and_ai:
      description: >-
        Software Development & AI System -- this ops server
        (VERIDIAN-DEV, Hetzner 167.233.220.35), the autonomous worker
        fleet, its own SQLite register, and every mechanism this file
        itself indexes. See registries.system_diagram for the full
        component diagram.
    subsystem_2_software_and_end_user_management:
      description: >-
        Actual Software & End-User Management -- the deployed product
        (compliance-tracker + PROJEXA, treated as one integrated
        software per earlier Owner directive), running on Vercel with
        a Supabase Postgres backend.
    integration_note: >-
      Both subsystems act as ONE integrated system, not two separate
      ones -- see registries.ops_task_sync_bridge (subsystem 1 writes
      task state into subsystem 2's own database) and
      registries.app_layer_failure_visibility (subsystem 1 reads
      subsystem 2's failure state directly) for the concrete bridges
      that make this true in code, not just in this document.
  repos:
    core_veridian_and_customer_products:
      note: For running VERIDIAN AI OS and developing customer products/projects.
      members:
        - repo: FChecklist/compliance-tracker
          local_path: /opt/veridian/repos/compliance-tracker
          role: Brain repo -- holds every module and function (per its own CONSTITUTION.yaml control_model.rule). The app half of subsystem 2.
        - repo: FChecklist/projexa
          local_path: /opt/veridian/repos/projexa
          role: Construction-industry product branch, governed through compliance-tracker's modules (verified via veridian-client.ts + /api/v1/projexa/* calls, see CONSTITUTION.yaml control_model).
        - repo: FChecklist/veridian-ui-kit
          local_path: /opt/veridian/repos/veridian-ui-kit
          role: Shared UI component package (@fchecklist/veridian-ui-kit), 0 runtime deps, consumed by the product repos.
        - repo: FChecklist/claude-control
          local_path: /opt/veridian/repos/claude-control
          role: Outermost cross-project requirements/decision catalog (registries.cross_project_controller) -- config/YAML only, no application code.
    reverse_engineering:
      note: >-
        For reverse-engineering features -- these hold scraped
        documentation of THIRD-PARTY systems (Infisuite, Odoo, Zoho),
        not VERIDIAN's own application code. Verified 2026-07-20: all
        3 repos contain only docs/ and screenshots/ directories, no
        source code -- correctly excluded from the code
        catalogs (registries.database_catalog /
        registries.function_catalog only cover real app codebases).
      members:
        - repo: FChecklist/odoo-reverse-engineering
          local_path: /opt/veridian/repos/odoo-reverse-engineering
        - repo: FChecklist/infisuite-reverse-engineering
          local_path: /opt/veridian/repos/infisuite-reverse-engineering
          role: >-
            Reverse-engineered across bharatnet/indyanet/cityline Infisuite
            tenants (CRM, Billstack, Contracts, Ticketing modules). Updated
            2026-07-20: merged 2 fully-documented cityline worker branches
            (CRM+Billstack, Contracts -- both had succeeded earlier the same
            day but were left unmerged on origin/worker/* branches) into
            main, then closed the 3rd (Ticketing), whose 6 role-account
            logins had all genuinely failed automated auth, by riding the
            Owner's already-authenticated real Chrome session (Claude in
            Chrome) to reach it directly -- same real-session-reuse pattern
            that separately unblocked Odoo's Cloudflare Turnstile gate (see
            odoo-reverse-engineering/PROGRESS.md). Notable finding preserved
            in docs/cityline-contracts/contracts.md: a reproducible crash
            bug makes the Contract entity's own list/create/view UI
            unreachable in that tenant.
        - repo: FChecklist/zoho-reverse-engineering
          local_path: /opt/veridian/repos/zoho-reverse-engineering
          role: >-
            Zoho CRM + Zoho Projects field/screen documentation, built
            2026-07-20 by navigating a live Owner-authenticated session
            via Claude in Chrome (read-only -- forms opened to
            enumerate fields then cancelled, no records
            created/edited/deleted). docs/crm/fields.md and
            docs/projects/fields.md.
    personal_advisory_not_active:
      note: >-
        Personal advisory for Owner Rajat Agarwal. Explicitly NOT
        currently being worked on (Owner's own words, 2026-07-20) --
        do not pick up gap-closure work here without a direct
        instruction to resume it.
      members:
        - repo: FChecklist/veda-advisors
          local_path: /opt/veridian/repos/veda-advisors
  repos_outside_the_named_7_and_why:
    note: >-
      3 additional repos are cloned on this server but were NOT named
      in the Owner's 7-repo list -- disclosed here rather than silently
      omitted. See registries.other_repos_classified for the original
      classification (still accurate, re-verified 2026-07-20).
