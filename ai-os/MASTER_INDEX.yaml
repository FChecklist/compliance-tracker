schema_version: 1
audience: ai_and_software_only
protocol: >-
  READ_THIS_FILE_FIRST. Before any grep/find/read across this server or the
  compliance-tracker/projexa/veda-advisors/claude-control repos, before
  writing any new script/table/register, query this file for an existing
  match. If a match exists, use it or extend it -- do not create a parallel
  mechanism. If check-duplicate (system_index) and this file both show no
  match, proceed, then register the new thing in system_index (index-add)
  AND in this file's relevant list.
built_ts: '2026-07-20T08:11:00+00:00'
built_by: superboss_interactive_session
audit_passes_complete: 2
audit_passes_required: 3
canonical_path_live: /opt/veridian/ai-os/MASTER_INDEX.yaml
canonical_path_repo: /opt/veridian/repos/compliance-tracker/ai-os/MASTER_INDEX.yaml

# ---------------------------------------------------------------------------
# root_cause -- why searches were slow / wrong files got picked (2026-07-20)
# ---------------------------------------------------------------------------
root_cause_confirmed:
  finding: >-
    Unscoped filesystem search (find/grep without prune) traverses
    node_modules trees (per-repo, multiple GB) and per-task git-worktree
    copies of the entire repo under ai-os/tasks/*/workspace/ -- both
    contain files with basenames identical to canonical files
    (CONSTITUTION.yaml, CONTROLLER.yaml appear 100+ times each across
    worktree copies alone).
  incident_evidence: >-
    Unscoped `find /opt/veridian -iname CONSTITUTION.yaml` returned 200+
    hits, ~198 of them ai-os/tasks/*/workspace/ worktree copies, 0
    informative. Same command with -prune on the excluded paths returned
    in under 2 seconds with the 1 canonical hit.
  fix: >-
    Apply exclusion_rules below on every search. Single highest-leverage
    fix for search speed and wrong-file selection.

exclusion_rules:
  must_prune_not_just_exclude: true
  reason: >-
    find -not -path still descends into and stats every excluded
    directory; only -prune skips the subtree, which is the actual speed
    fix.
  prune_paths:
    - '*/node_modules/*'
    - '*/.git/*'
    - /opt/veridian/ai-os/tasks/*/workspace/*
    - /opt/veridian/workspace/claude-cli-work/*
    - /opt/veridian/workspace/main-e2e-check/*
  correct_find_pattern: >-
    find <roots> \( -path '*/node_modules' -o -path '*/.git' -o -path
    '*/ai-os/tasks' -o -path '*/workspace/claude-cli-work' \) -prune -o
    -type f -iname '<pattern>' -print

canonical_dirs:
  ops_scripts:
    path: /opt/veridian/scripts/
    contents: >-
      Shell-layer worker fleet entrypoints, preflight/guardrail scripts,
      dispatchers, register CLI. See file_inventory.scripts.
  ai_os_governance_repo_copy:
    path: /opt/veridian/repos/compliance-tracker/ai-os/
    contents: >-
      Git-tracked canonical governance/tracker/tree docs. This is the
      copy to read/edit -- ai-os/tasks/*/workspace/ai-os/ copies are
      ephemeral per-task worktrees, never edit those.
  ai_os_live_runtime_state:
    path: /opt/veridian/ai-os/
    contents: >-
      Non-git runtime state -- dispatched task dirs (tasks/), the live
      task-state ledger (CONTROLLER.yaml, see
      registries.task_state_ledger), cron-fed queues (gap_queue.yaml,
      queues/), the register DB (memory/), response cache (logs/),
      alerts (logs/ATTENTION.md).
  cross_project_controller_repo:
    path: /opt/veridian/repos/claude-control/
    contents: >-
      The real CONTROLLER.yaml (registries.cross_project_controller).
      Separate GitHub-synced repo, one level above every individual
      project.
  ai_os_logs:
    path: /opt/veridian/ai-os/logs/
    contents: >-
      Operational append-only logs and one live alert surface (see
      registries.attention_alerts). Not registers -- do not search these
      for "does X exist," only for historical/incident evidence.
    files_at_build:
      - ATTENTION.md  # live alert surface, see registries.attention_alerts
      - cost-usage-60min.jsonl, cost-usage-60min.log, cost-usage-cron.log
      - glm-proxy-calls.jsonl, glm-proxy.log  # raw GLM proxy call/response log, large
      - glm-response-cache.sqlite  # see databases
      - health-15min.jsonl, health-15min.log, health-check-cron.log
      - reconciliation-alerts.jsonl
      - superboss-supervision-start.txt

# ---------------------------------------------------------------------------
# registries -- every mechanism whose job is to index/track/govern
# something. Query the specific registry for its own domain instead of
# grepping files.
# ---------------------------------------------------------------------------
registries:

  - id: system_index
    type: sqlite_table
    path: /opt/veridian/ai-os/memory/superboss-register.sqlite#system_index
    scope: >-
      Existence-check for real mechanisms (scripts/services/tables/docs)
      across the whole ops layer -- "does X already exist" before
      building.
    query_cmd: >-
      python3 /opt/veridian/scripts/superboss-register.py check-duplicate
      "<query>" [--category <cat>]
    row_count_at_build: 28
    status: live
    mandatory_before: writing any new script, table, service, or doc on this server

  - id: superboss_dialogue_log
    type: sqlite_tables
    path: /opt/veridian/ai-os/memory/superboss-register.sqlite#instructions,work_items,actions
    scope: >-
      Owner<->Superboss instruction/work/action audit trail. Not
      reachable from TypeScript/Vercel app code (different host, no
      bridge built).
    query_cmd: python3 /opt/veridian/scripts/superboss-register.py search "<query>"
    doc: /opt/veridian/repos/compliance-tracker/ai-os/SUPERBOSS_REGISTER.md
    status: live

  - id: cross_project_controller
    type: yaml_file
    path: /opt/veridian/repos/claude-control/CONTROLLER.yaml
    scope: >-
      Outermost requirements+decision catalog, spans every project
      (compliance-tracker, projexa, veda-advisors, claude-control
      itself). One level above any single project's own tracker. Points
      at, never duplicates, project-local trackers (explicit in its own
      header).
    git: github.com/FChecklist/claude-control -- pull before read
    status: live
    read_priority: 1

  - id: task_state_ledger
    type: yaml_file
    path: /opt/veridian/ai-os/CONTROLLER.yaml
    scope: >-
      DIFFERENT FROM cross_project_controller despite identical
      basename -- this is a locked, auto-generated dump of this server's
      291 dispatched worker-task execution states (service names,
      checkpoints, task_dir paths). Not git-tracked, not
      human-maintained.
    name_collision_warning: true
    name_collision_detail: >-
      Two files named CONTROLLER.yaml exist
      (repos/claude-control/CONTROLLER.yaml = cross_project_controller,
      ai-os/CONTROLLER.yaml = this entry). Confirmed 2026-07-20, not yet
      resolved by rename -- deferred because this file is actively
      read-modify-written with a lock (.controller.lock) by
      veridian-task.py (the live dispatch CLI), and renaming safely
      requires updating 3 script references (veridian-task.py,
      repair_controller.py, cost-reconciliation.py) plus re-verifying
      live dispatch end to end. Real open follow-up, not silently
      dropped.
    writer: /opt/veridian/scripts/veridian-task.py (primary, locked read-modify-write)
    rebuild_tool: /opt/veridian/scripts/repair_controller.py (corruption recovery only)
    reader: /opt/veridian/scripts/cost-reconciliation.py
    status: live

  - id: constitution
    type: yaml_file
    path: /opt/veridian/repos/compliance-tracker/ai-os/CONSTITUTION.yaml
    scope: >-
      Canonical governance doc. 30 self-graded guardrail protocols
      (GP-01..GP-30) with code citations. Explicitly the single status
