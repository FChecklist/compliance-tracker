      all agree). Superior in completeness to tree_lineage.tree3_system_tree's
      hand-written domain summary for per-table/per-column detail --
      that file stays useful for domain grouping and workflow narrative,
      this file is the ground-truth column-level reference.
    generator_script: >-
      /opt/veridian/repos/compliance-tracker/ai-os/scripts/extract-db-schema-catalog.mjs
      -- REUSABLE ACROSS REPOS as of 2026-07-20 (dynamic import(), not a
      static import statement). Copy the script into the target repo's
      own tree (module resolution for both the script's own
      `drizzle-orm` import AND the dynamically-imported schema.ts's own
      imports must resolve from the SAME node_modules -- confirmed this
      fails across repos, e.g. compliance-tracker's tsx binary cannot
      resolve projexa's drizzle-orm). Run as `cd <repo> &&
      node_modules/.bin/tsx ai-os/scripts/extract-db-schema-catalog.mjs
      <absolute-path-to-schema.ts>`. Absolute path required -- a
      relative path is treated as a bare module specifier and fails.
    query_examples:
      - jq '.tables[] | select(.table_name=="organisations")' DATABASE_CATALOG.json
      - jq '.table_count, .enum_count' DATABASE_CATALOG.json
      - jq '.enums[] | select(.pg_name=="user_role")' DATABASE_CATALOG.json
    stale_doc_correction: >-
      tree3_system_tree and its own header claimed 377 tables / 106
      enums (stated as a direct schema.ts read at the time). This
      catalog's 3-way-verified count is 444 tables / 124 enums as of
      2026-07-20 -- the schema grew after that doc was last verified;
      it was not wrong when written, it went stale. This is the
      corrected, current, re-verifiable number going forward.
    status: live, generated 2026-07-20
    regenerate: run generator_script anytime schema.ts changes; safe, read-only, no DB connection required

