schema_version: 1
audience: ai_and_software_only
protocol: >-
  READ_THIS_FILE_FIRST. Before any grep/find/read across this server or the
  compliance-tracker/projexa/veda-advisors/claude-control repos, before
  writing any new script/table/register, query this file for an existing
  match. If a match exists, use it or extend it -- do not create a parallel
  mechanism. If check-duplicate (system_index) and this file both show no
  match, proceed, then register the new thing in system_index (index-add)
  AND in this file's relevant list.
built_ts: '2026-07-20T08:11:00+00:00'
built_by: superboss_interactive_session
audit_passes_complete: 3
audit_passes_required: 3
canonical_path_live: /opt/veridian/ai-os/MASTER_INDEX.yaml
canonical_path_repo: /opt/veridian/repos/compliance-tracker/ai-os/MASTER_INDEX.yaml
sync_mechanism:
  script: /opt/veridian/scripts/system-sync.py
  run_on_demand: >-
    python3 /opt/veridian/scripts/system-sync.py [--dry-run] [--check
    mirror|constitution|unindexed|resume-balance|all]. Run this whenever
    you suspect the
    live server, this file, CONSTITUTION.yaml, or the git-tracked script
    mirrors have drifted apart -- it is the single entrypoint for "sync
    the whole system," built 2026-07-20 per Owner directive ("one server,
    one system," see registries.system_sync_mechanism for full detail).
  run_on_schedule: >-
    Wired into crontab via run-logged.sh (registries.auto_execution_wrapper),
    see registries.system_sync_mechanism.cron_schedule.
  do_not_build_a_new_sync_script: >-
    If a future session finds drift/staleness this script's 3 checks
    don't cover, EXTEND this script with a 4th check function -- do not
    write a parallel sync mechanism. This file's own protocol field
    exists precisely to prevent that failure mode.

# ---------------------------------------------------------------------------
# root_cause -- why searches were slow / wrong files got picked (2026-07-20)
# ---------------------------------------------------------------------------
root_cause_confirmed:
  finding: >-
    Unscoped filesystem search (find/grep without prune) traverses
    node_modules trees (per-repo, multiple GB) and per-task git-worktree
    copies of the entire repo under ai-os/tasks/*/workspace/ -- both
    contain files with basenames identical to canonical files
    (CONSTITUTION.yaml, CONTROLLER.yaml appear 100+ times each across
    worktree copies alone).
  incident_evidence: >-
    Unscoped `find /opt/veridian -iname CONSTITUTION.yaml` returned 200+
    hits, ~198 of them ai-os/tasks/*/workspace/ worktree copies, 0
    informative. Same command with -prune on the excluded paths returned
    in under 2 seconds with the 1 canonical hit.
  fix: >-
    Apply exclusion_rules below on every search. Single highest-leverage
    fix for search speed and wrong-file selection.

exclusion_rules:
  must_prune_not_just_exclude: true
  reason: >-
    find -not -path still descends into and stats every excluded
    directory; only -prune skips the subtree, which is the actual speed
    fix.
  prune_paths:
    - '*/node_modules/*'
    - '*/.git/*'
    - /opt/veridian/ai-os/tasks/*/workspace/*
    - /opt/veridian/workspace/claude-cli-work/*
    - /opt/veridian/workspace/main-e2e-check/*
  correct_find_pattern: >-
    find <roots> \( -path '*/node_modules' -o -path '*/.git' -o -path
    '*/ai-os/tasks' -o -path '*/workspace/claude-cli-work' \) -prune -o
    -type f -iname '<pattern>' -print

canonical_dirs:
  ops_scripts:
    path: /opt/veridian/scripts/
    contents: >-
      Shell-layer worker fleet entrypoints, preflight/guardrail scripts,
      dispatchers, register CLI. See file_inventory.scripts.
  ai_os_governance_repo_copy:
    path: /opt/veridian/repos/compliance-tracker/ai-os/
    contents: >-
      Git-tracked canonical governance/tracker/tree docs. This is the
      copy to read/edit -- ai-os/tasks/*/workspace/ai-os/ copies are
      ephemeral per-task worktrees, never edit those.
  ai_os_live_runtime_state:
    path: /opt/veridian/ai-os/
    contents: >-
      Non-git runtime state -- dispatched task dirs (tasks/), the live
      task-state ledger (CONTROLLER.yaml, see
      registries.task_state_ledger), cron-fed queues (gap_queue.yaml,
      queues/), the register DB (memory/), response cache (logs/),
      alerts (logs/ATTENTION.md).
  cross_project_controller_repo:
    path: /opt/veridian/repos/claude-control/
    contents: >-
      The real CONTROLLER.yaml (registries.cross_project_controller).
      Separate GitHub-synced repo, one level above every individual
      project.
  ai_os_logs:
    path: /opt/veridian/ai-os/logs/
    contents: >-
      Operational append-only logs and one live alert surface (see
      registries.attention_alerts). Not registers -- do not search these
      for "does X exist," only for historical/incident evidence.
    files_at_build:
      - ATTENTION.md  # live alert surface, see registries.attention_alerts
      - cost-usage-60min.jsonl, cost-usage-60min.log, cost-usage-cron.log
      - glm-proxy-calls.jsonl, glm-proxy.log  # raw GLM proxy call/response log, large
      - glm-response-cache.sqlite  # see databases
      - health-15min.jsonl, health-15min.log, health-check-cron.log
      - reconciliation-alerts.jsonl
      - superboss-supervision-start.txt

# ---------------------------------------------------------------------------
# registries -- every mechanism whose job is to index/track/govern
# something. Query the specific registry for its own domain instead of
# grepping files.
# ---------------------------------------------------------------------------
registries:

  - id: system_index
    type: sqlite_table
    path: /opt/veridian/ai-os/memory/superboss-register.sqlite#system_index
    scope: >-
      Existence-check for real mechanisms (scripts/services/tables/docs)
      across the whole ops layer -- "does X already exist" before
      building.
    query_cmd: >-
      python3 /opt/veridian/scripts/superboss-register.py check-duplicate
      "<query>" [--category <cat>]
    row_count_at_build: 28
    status: live
    mandatory_before: writing any new script, table, service, or doc on this server

  - id: superboss_dialogue_log
    type: sqlite_tables
    path: /opt/veridian/ai-os/memory/superboss-register.sqlite#instructions,work_items,actions
    scope: >-
      Owner<->Superboss instruction/work/action audit trail. Not
      reachable from TypeScript/Vercel app code (different host, no
      bridge built). Manual logging (an AI agent choosing to call
      log-instruction/log-work/log-action) still exists for milestone
      granularity -- see registries.auto_conversation_log for the
      unconditional, platform-enforced layer added 2026-07-20.
    query_cmd: python3 /opt/veridian/scripts/superboss-register.py search "<query>"
    doc: /opt/veridian/repos/compliance-tracker/ai-os/SUPERBOSS_REGISTER.md
    status: live

  - id: auto_conversation_log
    type: hook_pipeline
    scope: >-
      Root-cause fix for "you not logging every discussion" (Owner,
      2026-07-20). Confirmed the gap first, not assumed: a direct query
      before this fix found 13 instructions / 60 work_items / only 3
      actions logged for the entire day against 150+ real tool calls --
      manual, milestone-granularity logging was the actual cause.
      Replaced with Claude Code's own hook system, which fires
      unconditionally on every prompt and every tool call regardless of
      whether an AI agent remembers to log it.
    components:
      local_hooks:
        path: 'C:\Users\Dell\Downloads\Claude Code\.claude\hooks\log-prompt.ps1, log-tool-use.ps1, log-turn-end.ps1, sync-queue-to-server.ps1'
        registered_in: 'C:\Users\Dell\Downloads\Claude Code\.claude\settings.local.json (hooks.UserPromptSubmit, hooks.PostToolUse[Bash], hooks.Stop)'
        design: >-
          Hooks write instantly to a local NDJSON queue
          (.claude/hooks-queue/conversation-log.ndjson) -- zero network
          I/O in the interactive path, since this session's own SSH
          connection showed real, repeated transient timeouts all
          evening and a live SSH call inside every hook would have made
          every single prompt/tool-call fragile and slow. The Stop hook
          starts a DETACHED background sync process (Start-Process
          -WindowStyle Hidden) that drains the queue asynchronously --
          the interactive turn never waits on it. Every hook script is
          wrapped in try/catch that swallows all errors and always
          exits 0 with no blocking "decision" field -- confirmed via
          Claude Code's hook exit-code semantics that this can never
          block or fail the actual interaction.
      sync_script:
        path: 'C:\Users\Dell\Downloads\Claude Code\.claude\hooks\sync-queue-to-server.ps1'
        design: >-
          Renames the live queue to a timestamped pending-*.ndjson file
          (atomic, avoids a race with hooks still appending), uploads it
          in ONE scp, runs ONE remote batch-import invocation, deletes
          the pending file only on confirmed success. On any failure
          (confirmed live during testing -- a real SSH connection
          timeout hit on the very first sync attempt), the pending file
          is preserved and retried on the next Stop event -- no queued
          event is ever silently lost, errors land in
          hooks-queue/sync-errors.log.
      batch_importer:
        path: /opt/veridian/scripts/batch-import-conversation-log.py
        mirror: /opt/veridian/repos/compliance-tracker/ai-os/scripts/batch-import-conversation-log.py
        design: >-
          Bulk-inserts a whole NDJSON batch into instructions/actions
          directly via sqlite3, reusing superboss-register.py's own
          schema/ID conventions exactly (not a parallel logging path).
          Real bug found and fixed before this was trusted: the first
          real batch run (395 rows) hit a genuine UNIQUE constraint
          collision on action_id -- the CLI's original _new_id()
          (timestamp + 4-hex-random) is safe for one-ID-per-process-
          invocation use but not for a tight loop minting hundreds of
          IDs within the same wall-clock second (a real
          birthday-paradox collision, not a freak accident). Fixed with
          a monotonic per-process counter appended to every ID.
      end_to_end_test: >-
        Full pipeline verified with real data before being trusted:
        (1) manual synthetic payloads through all 3 hook scripts,
        confirmed correct queue writes and exit 0; (2) live background
        sync, which hit and correctly recovered from a real transient
        SSH timeout without losing the pending file; (3) verified the
        synced rows are real and FTS-searchable in the register; (4)
        all manual-test rows cleaned up afterward so they don't pollute
        the real record.
    historical_backfill:
      scope: >-
        This session's own history (this VERY conversation) was
        backfilled retroactively, not just logged going forward --
        answers the Owner's direct question "is our current
        discussion... logged... even after few months."
      method: >-
        backfill-session-transcript.py parses the local Claude Code
        session JSONL transcript directly (12MB, 2812 raw entries for
        this session alone), extracting only genuine user-typed
        messages (string content, not tool_result feedback wrapped as a
        user-role turn) and assistant text blocks (not the individual
        historical tool_use blocks -- that granularity is captured live
        going forward by the hooks, not retroactively reconstructed,
        an explicit, deliberate scope limit, not an oversight).
      result: >-
        39 real user instructions + 395 assistant response excerpts
        imported for this session, tagged
        utm_campaign=conversation-log-backfill (distinct from
        conversation-log-auto, the live hook-captured campaign, so the
        two are never confused). First imported row verified to be this
        session's actual first message.
      scope_not_covered: >-
        Other, earlier Claude Code sessions on this laptop (dozens of
        other .jsonl transcript files exist under
        C:\Users\Dell\.claude\projects\C--Users-Dell-Downloads-Claude-Code\)
        were NOT backfilled this pass -- only the current session. A
        full-history backfill across all prior sessions is real,
        scoped, larger follow-up work, not done here.
    query_examples:
      - python3 superboss-register.py search "<keyword>"  # finds conversation-log-auto and conversation-log-backfill rows same as any other
      - "SQL: SELECT * FROM instructions WHERE utm_campaign IN ('conversation-log-auto','conversation-log-backfill') ORDER BY ts"
    status: live, deployed and verified 2026-07-20
    scope_gap_at_build_time: >-
      This registry entry, as first built, only covered the laptop-side
      interactive Claude Code CLI session -- confirmed by the Owner same
      day ("we are not auto updating everything") to be an incomplete
      fix: the autonomous worker/supervisor/doc-worker fleet dispatched
      ON THIS SERVER (queue-dispatcher.py, module-queue-dispatcher.py,
      master-decompose.py, systemd-run tasks) was never touched. Closed
      by registries.auto_worker_task_log, same day, same pass.

  - id: auto_worker_task_log
    type: python_instrumentation
    path: /opt/veridian/scripts/veridian-task.py
    mirror: /opt/veridian/repos/compliance-tracker/ai-os/scripts/veridian-task.py
    scope: >-
      The server-side half of the auto-logging fix. Owner: "for your
      work that CLAUDE CODE CLI or CLAUDE CODE is doing and ai
      superboss, ai agents, software are doing need to be automatically
      updated in the server." registries.auto_conversation_log only
      covered the interactive laptop session -- this covers every
      dispatched AI worker/supervisor/doc-worker task, regardless of
      what created it.
    design: >-
      veridian-task.py's cmd_create/cmd_checkpoint/cmd_record_usage are
      the single choke point EVERY dispatch path already goes through
      (queue-dispatcher.py, module-queue-dispatcher.py,
      dispatch-docworker-task.sh, a manual CLI call) -- instrumenting
      this one file once, rather than each caller separately, is the
      same "hook the choke point" principle as the interactive
      UserPromptSubmit/PostToolUse hooks, applied to the dispatch layer.
      _auto_log_task_event() shells out to superboss-register.py's own
      already-tested log-work/log-action CLI (not a parallel write
      path), reusing the ai_task_id convention documented in that
      script's own header (the existing task_id reused verbatim, never
      reissued). No network-latency design concern here unlike the
      laptop hooks -- this all runs locally on the server already.
      Wrapped in try/except that swallows all errors: a logging failure
      must never break real task lifecycle management, which is this
      script's actual job.
    tested: >-
      _auto_log_task_event() called directly in isolation against a
      synthetic fake task dict (not a real dispatched task, to avoid
      triggering a real git worktree/systemd service) before trusting
      it -- confirmed correct rows landed in work_items (ai_task_id
      correctly populated, not a new ID) and actions, then cleaned up.
      Confirmed `veridian-task.py status` still runs correctly
      end-to-end against real existing task data post-edit, before
      calling this deployed.
    scope_not_covered: >-
      cmd_resume_context (read-only, no state change, not logged by
      design). The cron-job gap noted here originally is CLOSED as of
      the same day -- see registries.auto_execution_wrapper.
    status: live, deployed and verified 2026-07-20

  - id: auto_execution_wrapper
    type: shell_wrapper
    path: /opt/veridian/scripts/run-logged.sh
    mirror: /opt/veridian/repos/compliance-tracker/ai-os/scripts/run-logged.sh
    scope: >-
      Closes the honest gap stated in registries.auto_worker_task_log
      and registries.auto_conversation_log: the periodic cron jobs that
      never call veridian-task.py and were never covered by the
      interactive-session hooks either. Owner asked directly: "in
      modern software without AI, how do you ensure tasks/actions are
      logged with id and time/date" -- answer applied here is the
      standard middleware/aspect pattern: a single wrapper every job
      runs THROUGH, so coverage does not depend on the wrapped script's
      own author remembering to add logging (the same failure mode
      fixed twice already this session, now fixed at the process-
      supervision layer instead of the application layer).
    design: >-
      Generates a unique exec_id + UTC start timestamp before running
      the real command; logs a job_start action immediately, runs the
      command with combined stdout+stderr capture, logs a job_end
      action (status completed/failed, real exit code, duration,
      output excerpt) after. Echoes the original output and exits with
      the original exit code -- fully transparent to cron and to any
      pre-existing `>> logfile 2>&1` redirect, which all 4 already-
      redirected jobs keep working exactly as before. Each register
      call individually wrapped in a 10s timeout so a slow/broken
      register write can never delay or block the real job -- logging
      is best-effort, never load-bearing.
    crontab_coverage: >-
      All 7 ACTIVE crontab entries as of 2026-07-20 now route through
      this wrapper: sync-repos.sh, sync-vercel-env.sh,
      sync-verdian-ai-data.sh, sync-controller-back.py,
      queue-dispatcher.py, health-check-15min.py, cost-usage-60min.py.
      The 1 explicitly disabled entry (#DISABLED-2026-07-18
      supervisor-sweep.sh) was left untouched, not re-enabled --
      re-enabling a disabled job was never asked for. Original crontab
      backed up to
      /opt/veridian/scripts/crontab-backup-2026-07-20.txt before this
      change (reversible).
    tested: >-
      Wrapper tested standalone with both a success command and a
      deliberately-failing command (exit 7) before touching the real
      crontab -- confirmed correct exec_id/timestamp/status/exit_code/
      duration/output landed in the register for both paths, correct
      exit code propagated back to the caller in both cases. Then run
      manually against the REAL health-check-15min.py through the
      wrapper (not a synthetic stand-in) before trusting it on a live
      schedule -- this real run surfaced a genuine, serious, pre-
      existing production finding unrelated to this fix: 47 systemd
      units in failed state and a 71.9% task failure rate (207/288),
      both already tracked by health-check-15min.py's own alerting
      (registries.attention_alerts), now also correctly logged as a
      real job_end action with that exact output captured.
    real_unattended_cron_verification: >-
      CONFIRMED 2026-07-20T10:40:01Z: queue-dispatcher's real, natural
      10-minute cron tick fired with zero manual intervention (crontab
      was installed ~10:29, prior firing at 10:30 was still the
      old/unwrapped entry, this 10:40 firing was the first fully
      unattended one under the new wrapper). Produced a matching
      job_start/job_end pair (exec_id=1e314ccbb970, status=completed,
      exit_code=0, real output "Running workers: 0, free slots: 5 /
      PROGRESS: 4/25 groups completed") -- proves the crontab entry
      itself works end to end, not just manual invocation of the same
      command line.
    status: live, deployed and verified 2026-07-20 (all 3 auto-logging
      layers -- interactive session, worker-task dispatch, cron -- now
      confirmed with real evidence, not just claimed)

  - id: worker_fleet_rca_fix_2026_07_20
    type: rca_and_permanent_fix
    scope: >-
      Root-causes and permanently fixes the 47-failed-unit/71.9%-task-
      failure-rate incident surfaced by registries.auto_execution_wrapper's
      first real health-check-15min.py run. Not the same incident as
      RCA_OVERNIGHT_DISPATCH_FAILURE_2026-07-20.md (that RCA is about the
      dispatch LOOP not firing overnight due to a laptop-bound Claude
      Desktop scheduled task; this RCA is about dispatched tasks failing
      downstream once running). Both concern the same overnight window,
      different mechanisms, cross-referenced here to prevent conflation.
    root_cause_1: >-
      OpenRouter account genuinely exhausted (total_credits=$40,
      total_usage=$40.07+, confirmed via OpenRouter's own
      /api/v1/credits endpoint -- ground truth, not this proxy's
      internal tracker). preflight-guard.py's existing
      check_proxy_health() only tracked the LOCAL proxy's own
      cumulative spend counter, which had drifted out of sync with the
      real account. Every worker's cheap 5-token canary call kept
      passing preflight (cheap enough to still succeed near-zero
      balance); the real task prompt (up to 64000 max_tokens) then hit
      a live OpenRouter 402, which systemd retried 3x per unit into a
      permanent failed state -- across at least 47 units.
    root_cause_1_deeper_bug: >-
      `claude -p --output-format json` returns process exit code 0
      even when the underlying API call failed (error captured only
      inside the JSON payload as is_error:true /
      api_error_status:402). This silently bypassed
      worker-entrypoint.sh's entire `if [ "$EXIT_CODE" -ne 0 ]` failure
      path -- no failure signature was ever recorded, so
      preflight-guard.py's own circuit breaker (2 identical signatures
      trips it) had zero data to trip on despite 3 real, identical
      failures per unit. Confirmed directly: .failure_signatures.json
      did not exist for a sample failed task.
    root_cause_2: >-
      A genuinely SEPARATE, second root cause found for 2 of the 47
      units (deliberately not assumed to share root_cause_1 --
      verified via recover-failed-workers.py reading each unit's real
      result.json before touching it): these 2 legitimately hit the
      Claude CLI's own --max-budget-usd $10 per-task cap
      (terminal_reason:budget_exhausted, real ~$10.05-10.32 costs,
      42-55 real turns) -- a guardrail working as designed, but
      worker-entrypoint.sh fell through to the same generic
      retry-storm path as any other failure instead of a clean
      hard-stop.
    fix_1: >-
      preflight-guard.py: new check_openrouter_balance() function
      queries https://openrouter.ai/api/v1/credits directly (ground
      truth, cannot drift). Fails OPEN on any network/parse error on
      the check itself (never blocks real work over a check hiccup);
      fails CLOSED (hard stop, no API call made) if real remaining
      balance < $0.10. Ops-layer twin of the app-layer
      checkOpenRouterBalance() in cost-policy.ts. Wired into main()
      between check_proxy_health() and canary_call().
    fix_2: >-
      worker-entrypoint.sh: (a) added "openrouter_balance_exhausted" to
      the hard-stop (non-retryable) reason list; (b) added an
      API_IS_ERROR detection block right after the main claude -p
      invocation that reads $MAIN_OUT's own is_error field and forces
      EXIT_CODE=1 when true despite the process's own exit 0, closing
      the deeper bug above; (c) enhanced record_failure_signature() to
      also hash result.json's real API error text, not just
      worker.log (which is empty for this failure class); (d) added a
      second, distinct hard-stop block detecting
      subtype==error_max_budget_usd / terminal_reason==budget_exhausted
      in $MAIN_OUT, routing to checkpoint(status=blocked) + best-effort
      git commit/push of whatever progress existed +
      systemctl --user disable + explicit kill/wait of the background
      checkpoint loop + exit 0 -- no retry, since a retry would very
      likely spend another full $10 hitting the identical wall.
    fix_3_recovery_script:
      path: /opt/veridian/scripts/recover-failed-workers.py
      scope: >-
        Converts veridian-worker@ units stuck in systemd's permanent
        failed state (pre-dating the fixes above) into an accurate
        blocked state via the now-fixed preflight guard. Safety: reads
        each unit's REAL result.json before touching it -- only
        resets+starts units confirmed to match the 402-balance pattern
        (string match on api_error_status:402), explicitly does NOT
        touch veridian-docworker@ units (different template, different
        entrypoint, --no-proxy mode) or any unit whose result.json
        doesn't match, printing those separately for manual review
        rather than assuming one cause explains everything.
    deployed_and_verified: >-
      Both worker-entrypoint.sh fixes deployed live (2 backups taken:
      .bak-2026-07-20-rca before fix_2a/b/c, a second implicit backup
      via the same pattern before fix_2d). Fix 1+2a/b/c verified via
      one real live systemd unit reset+restarted, reaching a clean
      blocked state instead of retry-storming. Fix 2d verified via
      both previously-excluded max-budget-usd units, reset+restarted,
      both confirmed status:blocked, service disabled cleanly, zero
      retry-storm. recover-failed-workers.py dry-run confirmed 44/46
      as 402-pattern (2 correctly excluded, matching root_cause_2)
      before running for real: all 44 recovered. Final state
      2026-07-20T11:2x: 0 failed veridian-worker@ units remain
      (down from 47); OpenRouter balance itself still exhausted
      ($-0.07 remaining as of this check) so the 44+2=46 recovered
      units now correctly sit in blocked state with an accurate
      diagnostic, not a dead unexplained failure.
    correction_2026_07_20_audit_round_2: >-
      This entry originally claimed here (and in audit_log pass 11)
      that recovered units "will resume automatically once credits are
      added, no further code change needed." VERIFIED FALSE on audit:
      queue-dispatcher.py's retry logic (TERMINAL_BAD handling in
      sync_dispatched_statuses()) only re-touches gap_queue.yaml items
      still in 'dispatched' status -- 21 of the 46 recovered tasks were
      already marked stuck_needs_human (a terminal state it never
      revisits) BEFORE this pass's recovery, and the other 25 were
      never tracked in gap_queue.yaml at all (dispatched via a
      different, one-off mechanism). Neither group would have resumed
      on its own. Corrected by building
      registries.system_sync_mechanism.checks.resume_balance_blocked_check,
      which operates directly on CONTROLLER.yaml/systemd instead of
      gap_queue.yaml's narrower tracking, so it covers both groups
      uniformly. That check now makes the original claim actually true
      going forward (verified via a monkeypatched-balance dry-run:
      correctly identified all 47 balance-blocked tasks as resumable,
      took no action in dry-run mode as designed).
    known_gap_not_fixed_this_pass: >-
      doc-worker-entrypoint.sh (separate script, veridian-docworker@
      template, used for real-Claude-subscription browser
      reverse-engineering tasks, runs preflight-guard.py with
      --no-proxy so check_openrouter_balance() correctly does not
      apply there) does NOT have the same API_IS_ERROR /
      CLI_HIT_BUDGET_CAP detection blocks as worker-entrypoint.sh.
      Currently 0 failed docworker units (not urgent), but the same
      exit-code-0-on-API-error class of bug could affect it too if its
      own claude -p invocation ever hits a real-subscription-side
      error. Not in scope for this RCA (zero failures currently, no
      evidence of the bug manifesting there) -- flagged honestly
      rather than silently left uninvestigated.
    status: live, deployed and verified 2026-07-20

  - id: system_sync_mechanism
    type: python_script
    path: /opt/veridian/scripts/system-sync.py
    mirror: /opt/veridian/repos/compliance-tracker/ai-os/scripts/system-sync.py
    scope: >-
      TASKS 2-6 of the Owner's 2026-07-20 systems-design directive,
      built as ONE unified mechanism deliberately, not 5 separate
      scripts -- the directive itself (TASK 3/4: "System is broken.
      Its working in parts. Make it integrated... You are facing it
      again and again. Though you are updating few files other are
      getting missed.") is a direct complaint about exactly the kind
      of proliferating-parallel-mechanisms failure mode a 5th/6th/7th
      standalone script would repeat. Every check is mechanical (file
      existence, git-log date comparison, path diffing) -- zero AI
      judgment embedded in detection, by design (judgment calls like
      "what should this doc's corrected sentence say" are left to
      whoever reads the findings, not auto-generated).
    checks:
      mirror_drift_check: >-
        Diffs /opt/veridian/scripts/*.py|sh and MASTER_INDEX.yaml
        against their git-tracked repo-mirror counterparts. SAFE to
        auto-fix (pure file copy, staged not committed -- committing
        still requires the same manual verify-then-commit discipline
        used all session). First real run found 17 files with ZERO
        mirror at all -- including queue-dispatcher.py, which fires
        live via cron every 10 minutes and had no git-tracked copy
        whatsoever (a genuine, serious instance of the exact "files
        getting missed" pattern TASK 3/4 named). All 17 copied into
        the mirror and committed same pass.
      constitution_staleness_check: >-
        Extracts every backtick-quoted src/lib/*.ts path from
        CONSTITUTION.yaml's mechanism/evidence fields (same claim
        shape claim-verification.ts already checks for AI OUTPUT,
        GP-08/GP-09 -- reused here to check the DOCUMENT itself, not
        duplicated logic), compares each referenced file's last git-
        commit date against CONSTITUTION.yaml's own last-commit date.
        Report-only, appends to registries.attention_alerts, never
        auto-edits the doc. First real run found 1 apparent broken
        reference (src/lib/veridian-client.ts) that was actually a
        cross-repo false positive -- the file legitimately lives in
        FChecklist/projexa, not compliance-tracker, and
        CONSTITUTION.yaml's control_model.products section correctly
        describes other repos' files as compliance evidence. Fixed by
        checking all 3 known repos (compliance-tracker, projexa,
        veda-advisors) before flagging broken -- 0 genuine findings
        after the fix.
      unindexed_files_check: >-
        Walks canonical_dirs.ops_scripts and
        .ai_os_governance_repo_copy, flags any file MASTER_INDEX.yaml
        never mentions by name. Report-only, appends to
        registries.attention_alerts. First real run found 15 ai-os/
        root .md docs genuinely absent from this file's text (not
        even in file_inventory.ai_os_governance_docs's own
        unannotated_note, which only said "several" without naming
        them) -- see that field's now-explicit list, generated from
        this check's output rather than hand-typed.
      resume_balance_blocked_check: >-
        Added during this file's own audit round 2 (self-audit found a
        false claim in this registry entry's earlier text -- see
        registries.worker_fleet_rca_fix_2026_07_20.correction_2026_07_20_audit_round_2
        for the full finding). Queries the real OpenRouter balance; if
        restored above the safety floor, finds every task whose LAST
        checkpoint note is the openrouter_balance_exhausted hard stop
        (parsed from task.yaml's real checkpoints list, not string-
        matched against the whole file) and restarts its systemd unit
        directly -- covers every balance-blocked task regardless of
        whether queue-dispatcher.py's own gap_queue.yaml ever tracked
        it. Verified via a monkeypatched-balance dry-run (not yet
        verified against a real restored balance, since the account is
        still genuinely exhausted as of this pass -- that real-money
        end-to-end proof can only happen once the Owner adds credits).
    cron_schedule: >-
      Added to crontab via run-logged.sh (same wrapper pattern as the
      other 7 jobs, registries.auto_execution_wrapper):
      `0 */6 * * * python3 /opt/veridian/scripts/system-sync.py --check
      all`. Every 6 hours -- frequent enough to catch drift before it
      compounds, infrequent enough that report-only findings in
      ATTENTION.md do not spam past what a human/AI can realistically
