  tree1_audit_tree:
    path: /opt/veridian/repos/compliance-tracker/ai-os/audit-tree/
    role: Requirement-doc interpretation (9 source docs mapped to 28 domains).
    status: >-
      HISTORICAL_INPUT. archive/ subdir explicitly retired, folded into
      tree4.
  tree3_system_tree:
    path: /opt/veridian/repos/compliance-tracker/ai-os/system-tree/
    role: >-
      Audited live-codebase tree (614 API routes / 377 DB tables / 130
      pages / 57 AI roles, per prior session verification).
    status: >-
      HISTORICAL_INPUT. Evidence source for tree4, not itself re-read by
      tree4.
  tree4_unified:
    path: /opt/veridian/repos/compliance-tracker/ai-os/tree4-unified/
    role: >-
      CANONICAL CURRENT merge of tree1+tree3, 149 sub-branches, granular
      status plus gap backlog plus input/output/guardrail specs.
    status: >-
      live, built 2026-07-11, includes its own 2-round self-audit
      (TREE4-AUDIT-ROUND-1.md, TREE4-AUDIT-ROUND-2.md)
    entrypoint: tree4-unified/00-INDEX.md
    subdirs:
      completion_plan: tree4-unified/50-completion-plan/ (active plan)
      completion_plan_archive: >-
        tree4-unified/50-completion-plan/archive/ -- 13 retired
        priority-tracker files, explicitly archived, folded into
        master_tracker per master_tracker's own header.
  read_order: >-
    tree4_unified.entrypoint first; tree1_audit_tree and
    tree3_system_tree only if tree4 references them for detail.
  basename_collision_note: >-
    00-INDEX.md exists 4 times (audit-tree/, system-tree/, tree4-unified/,
    tree4-unified/50-completion-plan/archive/) and README.md exists 2
    times (audit-tree/source-documents/, tree4-unified/50-completion-plan/archive/).
    Low risk -- each sits in a distinctly-named, already-catalogued
    directory above -- but any search for a bare "00-INDEX.md" or
    "README.md" basename must include the parent dir in the match,
    confirmed 2026-07-20 Pass 2.

# ---------------------------------------------------------------------------
# databases -- every .sqlite file on the server (excl. ephemeral worktree
# copies). Full app-level Postgres/Supabase schema is NOT re-catalogued
# here -- see tree3_system_tree (12-compliance-tracker-database.yaml) for
# that, avoiding duplication of a 377-table catalogue.
# ---------------------------------------------------------------------------
databases:
  - path: /opt/veridian/ai-os/memory/superboss-register.sqlite
    tables: [instructions, work_items, actions, system_index]
    see: registries.system_index, registries.superboss_dialogue_log
  - path: /opt/veridian/ai-os/logs/glm-response-cache.sqlite
    tables: [cache]
    scope: L1 exact-match response cache for the GLM/OpenRouter proxy.
    writer_reader: /opt/veridian/scripts/anthropic_openrouter_proxy_v2.py
  - path: app-level Postgres/Supabase (377 tables)
    see: >-
      tree_lineage.tree3_system_tree path
      system-tree/12-compliance-tracker-database.yaml
    note: >-
      Not re-enumerated here -- query that file, do not re-catalogue 377
      tables in a second place.

