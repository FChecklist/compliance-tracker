name: Sentinel Governance Checks
on:
  pull_request: { branches: [main] }
  push: { branches: [main] }
jobs:
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        continue-on-error: true
  docs-check:
    name: Documentation Sentinel Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check SENTINEL.md exists
        run: |
          if [ ! -f SENTINEL.md ]; then echo "::error::SENTINEL.md missing"; exit 1; fi
          echo "SENTINEL.md present"
  security-pattern-check:
    name: Security Pattern Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check for hardcoded credentials
        run: |
          if grep -rn --include="*.ts" --include="*.tsx" -E "(password|secret|apikey)\s*=\s*[a-zA-Z0-9+/]{20,}" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.git . 2>/dev/null | \
            grep -v "placeholder\|example\|CHANGE_ME" | head -5; then
            echo "::warning::Potential hardcoded credentials detected."
          else
            echo "No hardcoded credential patterns detected."
          fi