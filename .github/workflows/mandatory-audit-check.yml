name: Mandatory Audit Check

# Wave 163 (Boss directive: gap analysis found AGENTS.md Operating Rule 7c
# -- "whichever agent did not implement a task is the mandatory auditor" --
# was a written norm with zero CI enforcement. Every audit this session
# happened because Claude chose to do it by hand, not because anything
# would have stopped a merge otherwise. This closes that gap.
#
# Widened 2026-07-13 (Boss directive, following a same-day incident where a
# fix was silently lost to a concurrent-session git collision, and a
# related finding that this job -- though it ran on every PR -- was never
# actually wired into branch protection's required checks, so it was
# advisory only): every PR into main now requires an audit verdict
# comment, not just cheap-tier AI Workforce dispatch branches. For
# 2026-07-13 through 2026-07-20, Claude Sonnet 5 Desktop is the sole
# auditor per Boss instruction -- this job can't verify *who* posted the
# comment (no per-agent signed identity exists yet, see AGENTS.md), only
# that one exists; the Claude-only window is enforced by instruction and
# procedure, not by this check.
#
# Honest limitation, same class as every other CI gate in this repo
# (guardrail-presence-check.mjs's own header states this precedent): this
# checks for a comment matching a specific marker, not that the audit was
# actually rigorous -- it can't verify the auditor really ran tsc/lint/
# build, only that *someone* explicitly asserted they did. That's a real,
# stated limit, not a claim of more than this can deliver. Merge is only
# actually blocked on a missing verdict once this job's name is added to
# branch protection's required status checks -- a repo access-control
# change, deliberately left for the Owner to make (see PR description).

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  audit-check:
    runs-on: ubuntu-latest
    steps:
      - name: Require an explicit audit verdict comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        # Audit finding (chief_audit_officer's first real dispatch, CAO-001,
        # asked to confirm this without being able to see the file): GitHub
        # Actions `run:` steps execute with `bash -eo pipefail` by default,
        # so `COMMENTS=$(gh api ...)` failing (network error, bad token,
        # rate limit) exits this step non-zero immediately -- the job fails,
        # the check fails, merge stays blocked. This IS fail-closed;
        # verified against actions/runner's documented default shell, not
        # assumed.
        run: |
          COMMENTS=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --jq '.[].body')
          if echo "$COMMENTS" | grep -q "^AUDIT: PASS"; then
            echo "Audit verdict found: PASS"
            exit 0
          fi
          if echo "$COMMENTS" | grep -q "^AUDIT: FAIL"; then
            echo "::error::Audit verdict found: FAIL -- this PR was reviewed and rejected. Address the findings and request a new audit."
            exit 1
          fi
          echo "::error::This PR has no audit verdict yet. Per AGENTS.md Operating Rule 7c (widened 2026-07-13 to cover every PR, not just cheap-tier AI Workforce dispatches), a different agent/reviewer than whoever authored this PR must check out the branch, run tsc/lint/build independently, and post a comment starting with 'AUDIT: PASS' (or 'AUDIT: FAIL' with findings) before this can merge."
          exit 1
