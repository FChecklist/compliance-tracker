name: AI Workforce (repo-write)

# Gives a VERIDIAN AI Workforce role (any OpenRouter model in
# src/lib/ai-team/roster.ts) real read/write access to this repo. Always
# lands on a new branch + PR — never pushes to main directly. This is
# separate from ai-dispatch.yml's zai-task/claude-task events (those are
# AGENTS.md's two full-access authorized agents); ai-team-task is a more
# constrained, file-tools-only agent for the broader AI Workforce roster.
on:
  repository_dispatch:
    types: [ai-team-task]
  workflow_dispatch:
    inputs:
      role_key:
        description: "AI Workforce role_key from src/lib/ai-team/roster.ts"
        required: true
        default: "fullstack_developer"
      task:
        description: "Task description"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create work branch
        id: branch
        env:
          ROLE_KEY: ${{ github.event.client_payload.role_key || github.event.inputs.role_key }}
        run: |
          BRANCH="ai-team/${ROLE_KEY}/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Run AI Workforce agent
        id: agent
        env:
          AI_TEAM_ROLE_KEY: ${{ github.event.client_payload.role_key || github.event.inputs.role_key }}
          AI_TEAM_TASK: ${{ github.event.client_payload.task || github.event.inputs.task }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AI_TEAM_SUPABASE_URL: ${{ secrets.AI_TEAM_SUPABASE_URL }}
          AI_TEAM_SUPABASE_ANON_KEY: ${{ secrets.AI_TEAM_SUPABASE_ANON_KEY }}
          AI_TEAM_LOG_URL: "https://veridian-ai-os.vercel.app/api/ai/team/log-usage"
          AI_TEAM_LOG_SECRET: ${{ secrets.AI_TEAM_LOG_SECRET }}
        run: bun run scripts/ai-workforce-agent.mjs

      # 6th real bug found smoke-testing this pipeline: the agent's own
      # freeform summary text (markdown, backticks, $(...), quotes) was
      # previously interpolated directly into a `run:` shell block via
      # ${{ steps.agent.outputs.summary }} -- GitHub Actions substitutes
      # that as raw text BEFORE bash parses the script, so shell
      # metacharacters inside the LLM's own prose got executed/misparsed
      # (a real command-injection-shaped bug, not just a formatting one).
      # Every step below now passes untrusted text through env vars and
      # references it as "$VAR" inside the script, which bash treats as a
      # literal string, never re-parsed for shell syntax.
      - name: Commit changes
        id: commit
        env:
          ROLE_KEY: ${{ github.event.client_payload.role_key || github.event.inputs.role_key }}
          SUMMARY: ${{ steps.agent.outputs.summary }}
        run: |
          git config user.name "veridian-ai-workforce[bot]"
          git config user.email "ai-workforce@veridian.internal"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git commit -m "AI Workforce (${ROLE_KEY}): ${SUMMARY}"
          fi

      - name: Push and open PR
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          ROLE_KEY: ${{ github.event.client_payload.role_key || github.event.inputs.role_key }}
          TASK: ${{ github.event.client_payload.task || github.event.inputs.task }}
          SUMMARY: ${{ steps.agent.outputs.summary }}
          FILES_CHANGED: ${{ steps.agent.outputs.files_changed }}
        run: |
          git push origin "$BRANCH"
          gh pr create \
            --title "AI Workforce (${ROLE_KEY}): ${SUMMARY:0:100}" \
            --body "**Role:** ${ROLE_KEY}
          **Task:** ${TASK}
          **Files changed:** ${FILES_CHANGED}
          **Summary:** ${SUMMARY}

          Opened automatically by the AI Workforce (repo-write) workflow. Requires Security & Code Reviewer / human review before merge — never auto-merged." \
            --base main \
            --head "$BRANCH"

      - name: No changes made
        if: steps.commit.outputs.changed == 'false'
        run: echo "Agent made no file changes -- nothing to PR. See job summary above for the agent's stated reason."
