name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
  build:
    name: Build
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run db:generate || true
      - run: bun run build
        env:
          DATABASE_URL: postgresql://postgres:placeholder@localhost:5432/postgres
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # Wave 79: real test files now exist (src/lib/*.test.ts), so
      # --passWithNoTests is dropped -- a future PR that deletes all tests
      # should fail CI, not pass silently. Placeholder DB env vars mirror
      # the `build` job's precedent above: importing policy-enforcement-
      # engine.ts transitively constructs the src/lib/db/index.ts client at
      # module-load time, which throws without *some* connection string
      # present, even though these tests never issue a real query.
      - run: bun test
        env:
          DATABASE_URL: postgresql://postgres:placeholder@localhost:5432/postgres
          APP_RUNTIME_DATABASE_URL: postgresql://app_runtime:placeholder@localhost:5432/postgres
  guardrail-presence:
    name: Guardrail Presence Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # AGENTS.md Operating Rule 9 / VERIDIAN_TASK_GOVERNANCE_CONSTITUTION.md
      # Guardrail #30: fails the build if a named guardrail call site
      # (task-tightening, policy enforcement, floor-tier escalation,
      # high-impact-action confirmation, multi-tenant RLS context) has been
      # removed or weakened, forcing that change to be a visible, reviewed
      # PR diff rather than a silent regression. See the script's own
      # header comment for the honest limitation this does and doesn't
      # guarantee.
      - run: node scripts/check-guardrail-presence.mjs
  asset-registry-coverage:
    name: Asset Registry Coverage Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # Priority 4 (09-priority4-umr-universal-tracker.yaml): the mechanical
      # half of "software ensures every action is automatically registered
      # in the Universal Metadata Registry, non-negotiable" -- fails the
      # build if a table in schema.ts has neither an explicit registry
      # registration nor an explicit, real exemption reason recorded in
      # ai-os/registry/asset-registry-coverage.yaml. See the script's own
      # header for the honest limitation this does and doesn't guarantee.
      - run: node scripts/check-asset-registry-coverage.mjs
  metadata-index-coverage:
    name: Metadata Index Coverage Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # Boss directive, 2026-07-13 (metadata/drift investigation): same
      # enforcement class as the Asset Registry Coverage Check just above,
      # applied to governance documents instead of database tables -- fails
      # the build if a real ai-os/ governance file/directory has neither an
      # index entry nor an explicit exemption in ai-os/OS.yaml. See that
      # script's own header for the honest limitation this does and
      # doesn't guarantee.
      - run: node scripts/check-metadata-index-coverage.mjs
  doc-quarantine-banner:
    name: Doc Quarantine Banner Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # GAP-UNIFIED-SOT-REMAINDER (b) (ai-os/MASTER-TRACKER.yaml): same
      # enforcement class as the two coverage checks above, applied to the
      # root-level stale-doc quarantine pass -- fails the build if any file
      # listed in ai-os/registry/stale-doc-manifest.yaml is missing its
      # exact "ARCHIVED / STALE" banner. See that script's own header for
      # the honest limitation this does and doesn't guarantee.
      - run: node scripts/check-doc-quarantine-banner.mjs
  doc-cross-references:
    name: Doc Cross-Reference Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      # Gap closure, 2026-07-13 (Boss directive, metadata/drift investigation
      # follow-up): the coverage checks above verify registration coverage
      # (is X registered in a registry) -- none of them verify that a file
      # path one governance doc names for another (CLAUDE.md, AGENTS.md,
      # ai-os/OS.yaml, docs/master/INDEX.md, ai-os/BRAIN.md,
      # VERIDIAN_TASK_GOVERNANCE_CONSTITUTION.md) still resolves on disk --
      # fails the build if a renamed/deleted file leaves a dangling
      # cross-reference behind. See that script's own header for the three
      # distinct reference styles it parses and the honest limitation this
      # does and doesn't guarantee.
      - run: node scripts/check-doc-cross-references.mjs
  e2e:
    name: E2E Tests
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium || true
      # Honest limitation (AI_OS_CERTIFICATION.md, Wave 79): zero E2E tests
      # exist yet -- writing real Playwright browser tests (server + auth
      # fixtures) is out of scope for this wave's "minimal unit test suite"
      # fix. --pass-with-no-tests stays here deliberately, unlike the
      # unit-tests job above where it was removed because real tests now
      # back it.
      - run: bunx playwright test --pass-with-no-tests
